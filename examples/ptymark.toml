# @dependency-start
# contract configuration
# responsibility Provides a minimal portable configuration fixture.
# upstream design ../README.md documented configuration
# downstream implementation ../src/config.rs configuration parser
# downstream implementation ../tests/cli_contract.rs fixture validation
# @dependency-end

schema_version = 1

[detection]
mermaid = true
math = true
max_block_bytes = 1048576

[rendering]
mode = "preview"
strict = false
columns = 80

[cache]
enabled = true
max_entries = 128
max_bytes = 33554432

# Built-in preview remains dependency-free. Change a backend only after
# installing the corresponding command and the Chafa presenter.
[engines.mermaid]
backend = "preview" # preview | source | mermaid-cli
path = "mmdc"

[engines.math]
backend = "preview" # preview | source | mathjax-cli
path = "tex2svg"

[engines.presenter]
path = "chafa"
