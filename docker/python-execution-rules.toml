# @dependency-start
# contract environment
# responsibility Defines Python execution policy for container workflows.
# upstream environment README.md docker runtime guidance
# downstream implementation ../tools/ci/container_runtime.py selects runtime pack
# @dependency-end
[defaults]
default_pack = "docker/packs/default.toml"

[[rule]]
name = "repo-python"
dockerfile = "docker/Dockerfile"
match_roots = ["python/", "scripts/", "experiments/"]
pack = "docker/packs/default.toml"
python_bin = "python3"
workdir = "/workspace"
