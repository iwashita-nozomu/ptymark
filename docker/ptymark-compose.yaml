# @dependency-start
# contract environment
# responsibility Runs the canonical ptymark development image.
# upstream environment ./ptymark.Dockerfile container toolchain
# downstream environment ../ptymark.mk development commands
# @dependency-end

services:
  dev:
    build:
      context: ..
      dockerfile: docker/ptymark.Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:24.18.0-bookworm}
        RUST_VERSION: ${RUST_VERSION:-1.97.0}
    image: ptymark-dev:${PTYMARK_IMAGE_TAG:-local}
    working_dir: /workspace
    environment:
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      PTYMARK_RENDERER_ROOT: /opt/ptymark-renderers
    volumes:
      - ..:/workspace
    stdin_open: true
    tty: true
