# @dependency-start
# contract workflow
# responsibility Applies validated ptymark dependency manifests, repairs temporary workflow checkout policy, and pushes the resulting PR branch commit with explicit ephemeral authentication.
# upstream workflow ./agent-canon-diagnostic-once.yml contains the reviewed dependency-manifest mapping.
# downstream pull_request PR #35 removes all temporary repair workflows and reruns the ordinary AgentCanon gate.
# @dependency-end
name: Commit AgentCanon Dependency Headers

on:
  pull_request:
    branches: [main, master]
    paths:
      - .github/workflows/agent-canon-header-commit.yml

permissions:
  contents: write

concurrency:
  group: agent-canon-header-commit-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  commit:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out pull request head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz ripgrep
          PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"

      - name: Apply reviewed dependency manifests
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/agent-canon-diagnostic-once.yml')
          lines = workflow.read_text(encoding='utf-8').splitlines()
          start = next(index for index, line in enumerate(lines) if "python3 - <<'PY'" in line)
          end = next(index for index in range(start + 1, len(lines)) if lines[index].strip() == 'PY')
          source = textwrap.dedent('\n'.join(lines[start + 1:end]))
          exec(compile(source, str(workflow), 'exec'), {'__name__': '__main__'})

          text = workflow.read_text(encoding='utf-8')
          old = '          persist-credentials: true\n'
          new = '          persist-credentials: false\n'
          if old not in text:
              raise SystemExit('temporary repair workflow credential setting not found')
          workflow.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Validate repaired tree
        run: |
          git diff --check
          make agent-canon-pr-check

      - name: Commit and push repaired ownership metadata
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            .github/workflows/agent-canon-diagnostic-once.yml \
            .github/workflows/ptymark-ci.yml \
            Cargo.toml \
            distribution/install.sh \
            documents/ptymark-design.md \
            documents/ptymark-installer.md \
            documents/shell-plugin-compatibility.md \
            examples/README.md \
            examples/external-engines.toml \
            examples/ptymark.toml \
            rust-toolchain.toml \
            scripts/check-ptymark-renderers.sh \
            scripts/install-managed-bundle.sh \
            scripts/install.sh \
            scripts/installer.sh \
            scripts/package-release.sh \
            tests/install_smoke.sh \
            tests/managed_renderer_smoke.sh \
            tests/shell_profile_coexistence.sh
          git commit -m 'docs: declare ptymark dependency ownership'
          auth_header="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w0)"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "HEAD:${GITHUB_HEAD_REF}"
