# @dependency-start
# contract workflow
# responsibility Captures one Clippy diagnostic artifact while the configuration skeleton CI is stabilized.
# upstream configuration ../../Cargo.toml declares the Rust package and lints.
# upstream workflow ./ptymark-ci.yml remains the canonical CI workflow.
# downstream implementation ../../src/cli.rs and ../../src/config.rs are diagnosed by this temporary workflow.
# @dependency-end
name: ptymark Clippy Diagnostic Once

on:
  pull_request:
    branches: [main, master]
    paths:
      - .github/workflows/ptymark-clippy-diagnostic-once.yml
      - src/**
      - tests/**
      - Cargo.toml
      - Cargo.lock

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-clippy-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Capture Clippy diagnostics
        id: clippy
        continue-on-error: true
        shell: bash
        run: |
          set +e
          cargo clippy --locked --all-targets -- -D warnings > clippy.log 2>&1
          status=$?
          printf '%s\n' "$status" > clippy.exit
          cat clippy.log
          exit "$status"

      - name: Upload Clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-clippy-diagnostics
          path: |
            clippy.log
            clippy.exit
          if-no-files-found: error
          retention-days: 3

      - name: Preserve failing conclusion
        if: always()
        run: test "$(cat clippy.exit)" = 0
