name: ptymark release lock refresh

on:
  push:
    branches:
      - agent/release-alpha1
    paths:
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/ptymark-release-lock-refresh.yml
  pull_request:
    branches:
      - agent/filter-command-stdout
    paths:
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/ptymark-release-lock-refresh.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lockfile:
    name: Generate Cargo.lock
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup override set 1.97.0

      - name: Regenerate lockfile
        run: cargo generate-lockfile

      - name: Upload generated lockfile
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-release-lockfile
          path: Cargo.lock
          if-no-files-found: error
          retention-days: 1
