name: normalize rooted diagnostic paths

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'agent/diagnostics-redaction-alpha2'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/diagnostics-redaction-alpha2
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt,clippy
          rustup override set 1.97.0

      - name: Apply cross-platform path fix and verify
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: agent/diagnostics-redaction-alpha2
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/diagnostics.rs')
          text = path.read_text()
          old = '        if path.is_absolute() {\n'
          new = '        if path.is_absolute() || path.has_root() {\n'
          if text.count(old) != 1:
              raise SystemExit('expected absolute-path condition exactly once')
          path.write_text(text.replace(old, new))
          PY
          rm -f .github/workflows/fix-windows-diagnostic-path-once.yml
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets
          git add -A
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'fix: normalize rooted diagnostic paths'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${BRANCH}"
