# @dependency-start
# contract workflow
# responsibility Applies the reviewed installer slot-spec refactor, then normalizes and validates it once with the pinned Rust toolchain.
# upstream implementation ../../src/install.rs owns installation-time engine resolution.
# upstream test ../../tests/install_contract.rs and ../../tests/install_cli_contract.rs own installer contracts.
# downstream workflow ./ptymark-ci.yml remains the repeatable validation path.
# @dependency-end
name: ptymark Installer Normalize Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ptymark-installer-normalize-once.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Apply installer slot specification refactor
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/install.rs")
          source = path.read_text(encoding="utf-8")

          marker = '''pub struct Installer<R> {
              resolver: R,
          }
          '''
          replacement = '''#[derive(Clone, Copy, Debug)]
          struct SlotSpec {
              role: &'static str,
              default_program: &'static str,
              external_backend: &'static str,
          }

          const MERMAID_SLOT: SlotSpec = SlotSpec {
              role: "mermaid",
              default_program: "mmdc",
              external_backend: "mermaid-cli",
          };

          const MATH_SLOT: SlotSpec = SlotSpec {
              role: "math",
              default_program: "tex2svg",
              external_backend: "mathjax-cli",
          };

          pub struct Installer<R> {
              resolver: R,
          }
          '''
          if marker not in source:
              raise SystemExit("installer struct marker not found")
          source = source.replace(marker, replacement, 1)

          old_calls = '''        let mut mermaid = self.plan_slot(
                      "mermaid",
                      request.mermaid.clone(),
                      existing,
                      ExistingSlot::from_mermaid(&config),
                      PathBuf::from("mmdc"),
                      "mermaid-cli",
                      &mut warnings,
                  )?;
                  let mut math = self.plan_slot(
                      "math",
                      request.math.clone(),
                      existing,
                      ExistingSlot::from_math(&config),
                      PathBuf::from("tex2svg"),
                      "mathjax-cli",
                      &mut warnings,
                  )?;
          '''
          new_calls = '''        let mut mermaid = self.plan_slot(
                      MERMAID_SLOT,
                      request.mermaid.clone(),
                      existing,
                      ExistingSlot::from_mermaid(&config),
                      &mut warnings,
                  )?;
                  let mut math = self.plan_slot(
                      MATH_SLOT,
                      request.math.clone(),
                      existing,
                      ExistingSlot::from_math(&config),
                      &mut warnings,
                  )?;
          '''
          if old_calls not in source:
              raise SystemExit("installer slot call block not found")
          source = source.replace(old_calls, new_calls, 1)

          old_signature = '''    fn plan_slot(
                  &self,
                  role: &'static str,
                  preference: EnginePreference,
                  existing_config: bool,
                  existing: ExistingSlot,
                  default_program: PathBuf,
                  external_backend: &'static str,
                  warnings: &mut Vec<String>,
              ) -> Result<SlotPlan, InstallError> {
                  match preference {
          '''
          new_signature = '''    fn plan_slot(
                  &self,
                  spec: SlotSpec,
                  preference: EnginePreference,
                  existing_config: bool,
                  existing: ExistingSlot,
                  warnings: &mut Vec<String>,
              ) -> Result<SlotPlan, InstallError> {
                  let role = spec.role;
                  let external_backend = spec.external_backend;
                  let default_program = PathBuf::from(spec.default_program);
                  match preference {
          '''
          if old_signature not in source:
              raise SystemExit("installer plan_slot signature not found")
          source = source.replace(old_signature, new_signature, 1)
          path.write_text(source, encoding="utf-8")
          PY

      - name: Capture normalization and validation
        shell: bash
        run: |
          set +e
          cargo fmt --all >fmt.log 2>&1
          fmt_status=$?
          cargo clippy --fix --locked --all-targets --allow-dirty --allow-staged -- -D warnings >clippy-fix.log 2>&1
          clippy_fix_status=$?
          cargo fmt --all >>fmt.log 2>&1
          cargo fmt --all -- --check >fmt-check.log 2>&1
          fmt_check_status=$?
          cargo clippy --locked --all-targets -- -D warnings >clippy.log 2>&1
          clippy_status=$?
          cargo test --locked --all-targets >test.log 2>&1
          test_status=$?
          git diff -- '*.rs' >rust.diff
          printf 'fmt=%s\nclippy_fix=%s\nfmt_check=%s\nclippy=%s\ntest=%s\n' \
            "$fmt_status" "$clippy_fix_status" "$fmt_check_status" "$clippy_status" "$test_status" \
            >installer-normalize.status
          cat installer-normalize.status
          cat clippy-fix.log
          cat clippy.log
          cat test.log
          exit 0

      - name: Upload installer diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-installer-normalize-diagnostics
          path: |
            installer-normalize.status
            fmt.log
            fmt-check.log
            clippy-fix.log
            clippy.log
            test.log
            rust.diff
          if-no-files-found: error
          retention-days: 3

      - name: Commit passing normalized Rust sources
        env:
          PUSH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          grep -Fx 'fmt=0' installer-normalize.status
          grep -Fx 'clippy_fix=0' installer-normalize.status
          grep -Fx 'fmt_check=0' installer-normalize.status
          grep -Fx 'clippy=0' installer-normalize.status
          grep -Fx 'test=0' installer-normalize.status
          if git diff --quiet -- '*.rs'; then
            echo "No Rust source changes were required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.rs'
          git commit -m "Normalize installer implementation"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${HEAD_BRANCH}"
