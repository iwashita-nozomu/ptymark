# @dependency-start
# contract release diagnostics
# responsibility Applies and verifies the remaining release documentation and package-content changes on the release-candidate branch.
# upstream design documents/release.md defines immutable publication and recovery behavior.
# upstream implementation scripts/check-release-metadata.py validates the resulting tree.
# downstream implementation agent/filter-command-stdout receives only verified release-surface changes.
# @dependency-end

name: Release diagnostics

on:
  push:
    branches:
      - agent/release-diagnostics
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-diagnostics-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  finish-release-surface:
    name: Finish and verify release documentation and packages
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out the release-candidate branch
        uses: actions/checkout@v7
        with:
          ref: agent/filter-command-stdout
          fetch-depth: 0
          submodules: false
          persist-credentials: true

      - name: Apply bounded release-surface changes
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          if 'upstream design documents/release.md' not in '\n'.join(text.splitlines()[:80]):
              text = text.replace(
                  'upstream compatibility documents/shell-plugin-compatibility.md defines shell and rich-plugin coexistence evidence.\n',
                  'upstream compatibility documents/shell-plugin-compatibility.md defines shell and rich-plugin coexistence evidence.\n'
                  'upstream design documents/release.md defines immutable release publication, verification, and recovery.\n',
                  1,
              )
          text = text.replace(
              'downstream test tests, release-package jobs, and GitHub Actions validate the documented behavior.\n',
              'downstream test tests, scripts/check-release-metadata.py, release-package jobs, and GitHub Actions validate the documented behavior.\n',
              1,
          )
          start = text.index('## Install from a GitHub Actions package')
          end = text.index('## Install from a source checkout')
          release_install = '''## Install from a versioned GitHub Release

          Version tags publish smoke-tested native archives for Linux, macOS, and Windows. Asset names include
          the ptymark version, operating system, and architecture:

          ```text
          ptymark-<version>-linux-<architecture>.tar.gz
          ptymark-<version>-macos-<architecture>.tar.gz
          ptymark-<version>-windows-<architecture>.zip
          ```

          Download the archive and its adjacent `.sha256` file, or download `SHA256SUMS` and
          `release-manifest.json` from the same GitHub Release. Verify the checksum before installation. GitHub
          CLI users can also verify the build-provenance attestation:

          ```bash
          gh attestation verify ptymark-*.tar.gz --repo iwashita-nozomu/ptymark
          ```

          ```powershell
          gh attestation verify .\\ptymark-*.zip --repo iwashita-nozomu/ptymark
          ```

          ### Linux or macOS package

          ```bash
          tar -xzf ptymark-*.tar.gz
          cd ptymark-*
          bash install.sh
          ```

          ### Windows package from PowerShell

          ```powershell
          Expand-Archive .\\ptymark-*.zip -DestinationPath .\\ptymark-package
          Set-Location .\\ptymark-package\\ptymark-*
          .\\install.ps1
          ```

          ### Windows package from cmd.exe

          ```bat
          install.cmd
          ```

          The package installer uses the executable shipped in `bin/`; Rust and Cargo are not required for
          this path. Missing default renderer roles may still require network access during the first managed
          bundle installation. Release archives are currently unsigned alpha packages; SHA-256 verification
          and GitHub provenance do not replace Apple Developer ID or Windows Authenticode signing.

          The immutable asset, checksum, compatibility, and rollback rules are documented in
          [`documents/release.md`](documents/release.md).

          '''
          readme.write_text(text[:start] + release_install + text[end:], encoding='utf-8')

          index = Path('documents/README.md')
          text = index.read_text(encoding='utf-8')
          if 'downstream design ./release.md' not in text:
              text = text.replace(
                  'downstream design ./filtered-command.md non-interactive child-stdout filtering contract\n',
                  'downstream design ./filtered-command.md non-interactive child-stdout filtering contract\n'
                  'downstream design ./release.md immutable release publication, verification, and recovery contract\n',
                  1,
              )
          if '[Release And Recovery Contract](./release.md)' not in text:
              marker = '''- [Filtered Command Execution](./filtered-command.md): the pipe-based
            `ptymark run -- COMMAND` contract, stdout-only filtering boundary, inherited
            stdin/stderr behavior, exit-status preservation, and explicit PTY limitations.
          '''
              addition = marker + '''- [Release And Recovery Contract](./release.md): immutable source and tag
            requirements, stable archive names, checksums, provenance attestations, GitHub
            Release publication, rollback, and failed-release recovery.
          '''
              if marker not in text:
                  raise SystemExit('documents index insertion point was not found')
              text = text.replace(marker, addition, 1)
          index.write_text(text, encoding='utf-8')

          shell = Path('scripts/package-release.sh')
          text = shell.read_text(encoding='utf-8')
          header = '''# @dependency-start
          # contract release packaging
          # responsibility Builds one versioned Unix release archive with package-local installers, renderer metadata, documentation, and checksums.
          # upstream design documents/release.md defines release asset contents and naming.
          # upstream configuration Cargo.toml owns the package version.
          # downstream workflow .github/workflows/ptymark-release.yml validates and publishes this archive.
          # @dependency-end

          '''
          if '@dependency-start' not in '\n'.join(text.splitlines()[:80]):
              text = text.replace('#!/usr/bin/env bash\n', '#!/usr/bin/env bash\n' + header, 1)
          if '"$repo_root/CHANGELOG.md"' not in text:
              text = text.replace(
                  'install -m 644 "$repo_root/README.md" "$package_root/README.md"\n',
                  'install -m 644 "$repo_root/README.md" "$package_root/README.md"\n'
                  'install -m 644 "$repo_root/CHANGELOG.md" "$package_root/CHANGELOG.md"\n'
                  'install -m 644 "$repo_root/SECURITY.md" "$package_root/SECURITY.md"\n',
                  1,
              )
          if 'documents/release.md' not in text:
              text = text.replace(
                  'install -m 644 "$repo_root/documents/filtered-command.md" "$package_root/documents/filtered-command.md"\n',
                  'install -m 644 "$repo_root/documents/filtered-command.md" "$package_root/documents/filtered-command.md"\n'
                  'install -m 644 "$repo_root/documents/release.md" "$package_root/documents/release.md"\n',
                  1,
              )
          shell.write_text(text, encoding='utf-8')

          powershell = Path('scripts/package-release.ps1')
          text = powershell.read_text(encoding='utf-8')
          ps_header = '''# @dependency-start
          # contract release packaging
          # responsibility Builds one versioned Windows release archive with package-local installers, renderer metadata, documentation, and checksums.
          # upstream design documents/release.md defines release asset contents and naming.
          # upstream configuration Cargo.toml owns the package version.
          # downstream workflow .github/workflows/ptymark-release.yml validates and publishes this archive.
          # @dependency-end

          '''
          if '@dependency-start' not in '\n'.join(text.splitlines()[:80]):
              text = ps_header + text
          if "'CHANGELOG.md'" not in text:
              text = text.replace(
                  "Copy-Required (Join-Path $RepoRoot 'README.md') (Join-Path $PackageRoot 'README.md')\n",
                  "Copy-Required (Join-Path $RepoRoot 'README.md') (Join-Path $PackageRoot 'README.md')\n"
                  "Copy-Required (Join-Path $RepoRoot 'CHANGELOG.md') (Join-Path $PackageRoot 'CHANGELOG.md')\n"
                  "Copy-Required (Join-Path $RepoRoot 'SECURITY.md') (Join-Path $PackageRoot 'SECURITY.md')\n",
                  1,
              )
          if "documents\\interactive-session.md" not in text:
              text = text.replace(
                  "Copy-Required (Join-Path $RepoRoot 'documents\\ptymark-design.md') (Join-Path $PackageRoot 'documents\\ptymark-design.md')\n",
                  "Copy-Required (Join-Path $RepoRoot 'documents\\ptymark-design.md') (Join-Path $PackageRoot 'documents\\ptymark-design.md')\n"
                  "Copy-Required (Join-Path $RepoRoot 'documents\\interactive-session.md') (Join-Path $PackageRoot 'documents\\interactive-session.md')\n"
                  "Copy-Required (Join-Path $RepoRoot 'documents\\filtered-command.md') (Join-Path $PackageRoot 'documents\\filtered-command.md')\n"
                  "Copy-Required (Join-Path $RepoRoot 'documents\\release.md') (Join-Path $PackageRoot 'documents\\release.md')\n",
                  1,
              )
          powershell.write_text(text, encoding='utf-8')
          PY

      - name: Verify release metadata and package scripts
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/check-release-metadata.py --tag v0.1.0-alpha.1
          python3 -m unittest tests.tools.test_release_metadata -v
          bash -n scripts/package-release.sh
          python3 -m compileall -q scripts/check-release-metadata.py scripts/build-release-manifest.py tests/tools/test_release_metadata.py

      - name: Commit verified release-surface changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md documents/README.md scripts/package-release.sh scripts/package-release.ps1
          if git diff --cached --quiet; then
            echo 'release surface already complete'
            exit 0
          fi
          git commit -m 'release: finalize documentation and package contents'
          git push origin HEAD:agent/filter-command-stdout
