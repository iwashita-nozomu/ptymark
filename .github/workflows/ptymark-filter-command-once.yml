name: ptymark Filter Command Once

on:
  push:
    branches:
      - agent/filter-command-stdout
    paths:
      - .github/workflows/ptymark-filter-command-once.yml

permissions:
  contents: write

concurrency:
  group: ptymark-filter-command-once
  cancel-in-progress: false

jobs:
  implement:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/filter-command-stdout
          fetch-depth: 0
          persist-credentials: false

      - name: Implement filtered command runner
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              target = Path(path)
              text = target.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one replacement marker, found {count}: {old[:80]!r}")
              target.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "src/cli.rs",
              "use std::process::{self, Command};",
              "use std::process::{self, Command, Stdio};",
          )
          replace_once(
              "src/cli.rs",
              "    ptymark [--config PATH] preview [OPTIONS] [FILE|-]\n    ptymark [--config PATH] config check",
              "    ptymark [--config PATH] preview [OPTIONS] [FILE|-]\n    ptymark [--config PATH] run [OPTIONS] -- COMMAND [ARG...]\n    ptymark [--config PATH] config check",
          )
          replace_once(
              "src/cli.rs",
              "PREVIEW OPTIONS:\n",
              "STREAM OPTIONS (`preview` and `run`):\n",
          )
          replace_once(
              "src/cli.rs",
              "    ptymark engine check --config examples/ptymark.toml\n    ptymark -- codex",
              "    ptymark engine check --config examples/ptymark.toml\n    ptymark run -- command-that-prints-markdown\n    ptymark -- codex",
          )
          replace_once(
              "src/cli.rs",
              "missing command; use `preview`, `config`, `engine`, `install`, or `-- COMMAND`",
              "missing command; use `preview`, `run`, `config`, `engine`, `install`, or `-- COMMAND`",
          )
          replace_once(
              "src/cli.rs",
              '        "preview" => run_preview(arguments, config_path),\n        "config" => run_config(arguments, config_path),',
              '        "preview" => run_preview(arguments, config_path),\n        "run" => run_filtered_command(arguments, config_path),\n        "config" => run_config(arguments, config_path),',
          )

          run_function = r'''
fn run_filtered_command(
    arguments: Vec<OsString>,
    mut config_path: Option<PathBuf>,
) -> Result<i32, String> {
    let mut source = false;
    let mut strict = false;
    let mut no_cache = false;
    let mut color = false;
    let mut columns = None;
    let mut command = Vec::new();
    let mut iterator = arguments.into_iter();

    while let Some(argument) = iterator.next() {
        let text = argument.to_str().ok_or_else(|| {
            "run options must be valid UTF-8; place the child command after `--`".to_owned()
        })?;
        match text {
            "-h" | "--help" => {
                print!("{HELP}");
                return Ok(0);
            }
            "--source" => source = true,
            "--strict" => strict = true,
            "--no-cache" => no_cache = true,
            "--color" => color = true,
            "--columns" => columns = Some(next_columns(&mut iterator)?),
            "--config" => set_config(&mut config_path, next_path(&mut iterator, "--config")?)?,
            "--" => {
                command.extend(iterator);
                break;
            }
            option => return Err(format!("unknown run option `{option}`; child commands must follow `--`")),
        }
    }

    let program = command
        .first()
        .cloned()
        .ok_or_else(|| "missing child command after `run --`".to_owned())?;
    let config = Config::load(config_path.as_deref()).map_err(|error| error.to_string())?;
    let detector: Box<dyn SemanticDetector> = if config.detection.math || config.detection.mermaid {
        Box::new(FencedDetector::new(&config.detection))
    } else {
        Box::new(PassthroughDetector)
    };

    let source_mode = source || config.rendering.mode == RenderMode::Source;
    let renderer: Box<dyn Renderer> = if source_mode {
        Box::new(SourceRenderer)
    } else {
        Box::new(RoutedRenderer::configured(&config.engines))
    };
    let cache: Box<dyn crate::cache::ArtifactCache> =
        if source_mode || no_cache || !config.cache.enabled {
            Box::new(NoopCache::default())
        } else {
            Box::new(MemoryCache::new(
                config.cache.max_entries,
                config.cache.max_bytes,
            ))
        };
    let service = RenderService::new(renderer, cache);
    let context = RenderContext {
        columns: columns.unwrap_or(config.rendering.columns),
        color,
        theme_fingerprint: 0,
    };
    let mut pipeline = DisplayPipeline::new(
        detector,
        service,
        context,
        strict || config.rendering.strict,
    );

    let mut child = Command::new(&program)
        .args(&command[1..])
        .stdin(Stdio::inherit())
        .stdout(Stdio::piped())
        .stderr(Stdio::inherit())
        .spawn()
        .map_err(|error| format!("cannot execute `{}`: {error}", program.to_string_lossy()))?;
    let mut child_stdout = child
        .stdout
        .take()
        .ok_or_else(|| "child stdout pipe is unavailable".to_owned())?;
    let stdout = io::stdout();
    let mut display = stdout.lock();
    let mut buffer = [0_u8; 8192];

    loop {
        let count = match child_stdout.read(&mut buffer) {
            Ok(count) => count,
            Err(error) => {
                let _ = child.kill();
                let _ = child.wait();
                return Err(format!("cannot read child stdout: {error}"));
            }
        };
        if count == 0 {
            break;
        }
        if let Err(error) = pipeline.feed(&buffer[..count], &mut display) {
            let _ = child.kill();
            let _ = child.wait();
            return Err(error.to_string());
        }
    }

    if let Err(error) = pipeline.finish(&mut display) {
        let _ = child.kill();
        let _ = child.wait();
        return Err(error.to_string());
    }
    display.flush().map_err(|error| error.to_string())?;
    let status = child
        .wait()
        .map_err(|error| format!("cannot wait for `{}`: {error}", program.to_string_lossy()))?;
    Ok(status.code().unwrap_or(1))
}

'''
          replace_once("src/cli.rs", "\nfn run_config(\n", "\n" + run_function + "fn run_config(\n")

          test_block = r'''
#[test]
fn filtered_run_renders_child_stdout() {
    let mut child = Command::new(binary())
        .args(["run", "--", binary(), "preview", "--source", "-"])
        .stdin(Stdio::piped())
        .stdout(Stdio::piped())
        .spawn()
        .expect("spawn filtered run");
    child
        .stdin
        .take()
        .expect("stdin")
        .write_all(b"before\n$$\nE = mc^2\n$$\nafter\n")
        .expect("write");
    let output = child.wait_with_output().expect("wait");
    assert!(output.status.success());
    let text = String::from_utf8(output.stdout).expect("UTF-8");
    assert!(text.starts_with("before\n"));
    assert!(text.contains("ptymark math"));
    assert!(text.ends_with("after\n"));
    assert!(!text.contains("$$"));
}

#[test]
fn filtered_run_preserves_child_exit_status() {
    let status = Command::new(binary())
        .args(["run", "--", binary(), "--not-a-real-option"])
        .status()
        .expect("filtered command mode");
    assert_eq!(status.code(), Some(2));
}

'''
          replace_once(
              "tests/cli_contract.rs",
              "\n#[test]\nfn config_check_rejects_unknown_keys()",
              "\n" + test_block + "#[test]\nfn config_check_rejects_unknown_keys()",
          )
          replace_once(
              "tests/cli_contract.rs",
              '    assert!(String::from_utf8_lossy(&output.stdout).contains("engine check"));\n}',
              '    let help = String::from_utf8_lossy(&output.stdout);\n    assert!(help.contains("engine check"));\n    assert!(help.contains("run [OPTIONS] -- COMMAND"));\n}',
          )

          replace_once(
              "README.md",
              "- stream and file rendering through `ptymark preview`;",
              "- stream and file rendering through `ptymark preview`;\n- non-interactive child stdout rendering through `ptymark run -- COMMAND`;",
          )
          replace_once(
              "README.md",
              "`ptymark -- COMMAND` currently validates configuration and transparently executes the command. The\ncommand shape is reserved for the later PTY host. The reusable display pipeline and its terminal\nsafety contracts are implemented and tested independently.",
              "`ptymark run -- COMMAND` processes one non-interactive child command's stdout through the reusable\ndisplay pipeline. Stdin and stderr stay directly attached, and stdout is a pipe rather than a PTY.\n`ptymark -- COMMAND` remains the transparent launcher reserved for the later interactive PTY host.",
          )
          run_docs = r'''
## Filter one command's stdout

Use `run` when a non-interactive command emits explicit Mermaid or block-math fences:

````bash
ptymark run -- sh -c 'cat <<"EOF"
```mermaid
flowchart LR
  Command --> Gate --> Renderer --> Display
```
EOF'
````

`run` processes only the child's stdout. Child stdin and stderr remain inherited, the child exit
status is preserved, and renderer failures follow the same strict/source fallback rules as `preview`.
Because stdout is a pipe rather than a PTY, use this mode for batch commands and log-producing tools,
not interactive shells, prompts, or full-screen TUIs. `ptymark -- COMMAND` remains byte-transparent
until the interactive PTY/ConPTY host is implemented.

Common options:

```bash
ptymark run --no-cache -- command
ptymark run --columns 100 -- command
ptymark run --strict -- command
ptymark --config /absolute/path/config.toml run -- command
```

'''
          replace_once("README.md", "\n## Configuration\n", "\n" + run_docs + "## Configuration\n")

          replace_once(
              "documents/ptymark-design.md",
              "The current `ptymark preview` command exercises the implemented display\npipeline. `ptymark -- COMMAND` currently validates configuration and performs a\ntransparent launch; the interactive PTY host and Windows ConPTY host remain\nseparate follow-up work.",
              "The current `ptymark preview` command exercises the implemented display\npipeline for files and stdin. `ptymark run -- COMMAND` applies the same pipeline\nto one non-interactive child's stdout while inheriting stdin/stderr and preserving\nthe child exit status. `ptymark -- COMMAND` remains transparent; the interactive\nPTY host and Windows ConPTY host remain separate follow-up work.",
          )
          PY

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Validate implementation
        run: |
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets

      - name: Commit implementation and remove one-shot workflow
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm .github/workflows/ptymark-filter-command-once.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add filtered command stdout rendering'
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:agent/filter-command-stdout
