# @dependency-start
# contract workflow
# responsibility Verifies the strict dependency manifest gate on an uncontaminated main-based branch.
# upstream implementation ../../tools/agent_tools/run_repo_dependency_review.sh strict dependency review
# @dependency-end

name: Diagnose AgentCanon Gate Clean

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: diagnose-agent-canon-clean-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Fetch public pull-request merge commit
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          git init -q .
          git remote add origin "https://github.com/${REPOSITORY}.git"
          git fetch -q --no-tags --depth=1 origin "refs/pull/${PR_NUMBER}/merge"
          git checkout -q --detach FETCH_HEAD

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ""
          AGENT_CANON_REPO_SSH_KEY: ""
        run: bash .github/scripts/checkout_agent_canon_submodule.sh >/dev/null

      - name: Install dependencies quietly
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq >/dev/null
          sudo apt-get install -y -qq graphviz ripgrep >/dev/null
          PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD" >/dev/null

      - name: Run strict dependency review
        shell: bash
        run: |
          set -o pipefail
          bash tools/agent_tools/run_repo_dependency_review.sh \
            --fail-missing \
            --cycle-report-only \
            --report-dir "$RUNNER_TEMP/dependency-review" \
            2>&1 | tail -n 40
