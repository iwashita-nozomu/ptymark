name: ptymark Windows Compatibility Fix Once

on:
  push:
    branches:
      - agent/minimal-pre-display-core
    paths:
      - .github/workflows/ptymark-windows-fix-once.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false
          fetch-depth: 0
      - name: Apply Windows executable and state-path support
        run: |
          python3 - <<'PY'
          from pathlib import Path

          engine = Path('src/engine.rs')
          source = engine.read_text(encoding='utf-8')
          old = '''pub fn resolve_executable(path: &Path) -> Result<PathBuf, RenderError> {
              if path.is_absolute() {
                  return executable_candidate(path).ok_or_else(|| {
                      RenderError::new(format!(
                          "configured executable `{}` does not exist or is not executable",
                          path.display()
                      ))
                  });
              }

              if path.components().count() != 1 {
                  return Err(RenderError::new(format!(
                      "configured executable `{}` must be absolute or a bare name",
                      path.display()
                  )));
              }

              let search_path = env::var_os("PATH")
                  .ok_or_else(|| RenderError::new("PATH is not set; use an absolute engine path"))?;
              for directory in env::split_paths(&search_path) {
                  let candidate = directory.join(path);
                  if let Some(candidate) = executable_candidate(&candidate) {
                      return Ok(candidate);
                  }
              }

              Err(RenderError::new(format!(
                  "executable `{}` was not found in PATH; set its absolute path in the ptymark configuration",
                  path.display()
              )))
          }

          fn executable_candidate(path: &Path) -> Option<PathBuf> {
          '''
          new = '''pub fn resolve_executable(path: &Path) -> Result<PathBuf, RenderError> {
              if path.is_absolute() {
                  for candidate in executable_candidates(path) {
                      if let Some(candidate) = executable_candidate(&candidate) {
                          return Ok(candidate);
                      }
                  }
                  return Err(RenderError::new(format!(
                      "configured executable `{}` does not exist or is not executable",
                      path.display()
                  )));
              }

              if path.components().count() != 1 {
                  return Err(RenderError::new(format!(
                      "configured executable `{}` must be absolute or a bare name",
                      path.display()
                  )));
              }

              let search_path = env::var_os("PATH")
                  .ok_or_else(|| RenderError::new("PATH is not set; use an absolute engine path"))?;
              for directory in env::split_paths(&search_path) {
                  for candidate in executable_candidates(&directory.join(path)) {
                      if let Some(candidate) = executable_candidate(&candidate) {
                          return Ok(candidate);
                      }
                  }
              }

              Err(RenderError::new(format!(
                  "executable `{}` was not found in PATH; set its absolute path in the ptymark configuration",
                  path.display()
              )))
          }

          fn executable_candidates(path: &Path) -> Vec<PathBuf> {
              #[cfg(windows)]
              {
                  if path.extension().is_some() {
                      return vec![path.to_path_buf()];
                  }
                  let mut candidates = vec![path.to_path_buf()];
                  let extensions = env::var_os("PATHEXT")
                      .unwrap_or_else(|| OsString::from(".COM;.EXE;.BAT;.CMD"));
                  for extension in extensions.to_string_lossy().split(';') {
                      let extension = extension.trim().trim_start_matches('.');
                      if !extension.is_empty() {
                          candidates.push(path.with_extension(extension));
                      }
                  }
                  candidates
              }
              #[cfg(not(windows))]
              {
                  vec![path.to_path_buf()]
              }
          }

          fn executable_candidate(path: &Path) -> Option<PathBuf> {
          '''
          if old not in source:
              raise SystemExit('resolve_executable block not found')
          engine.write_text(source.replace(old, new, 1), encoding='utf-8')

          install = Path('src/install.rs')
          source = install.read_text(encoding='utf-8')
          old = '''pub fn default_install_state_path() -> Result<PathBuf, InstallError> {
              if let Some(path) = env::var_os("PTYMARK_INSTALL_STATE") {
                  return Ok(PathBuf::from(path));
              }
              if let Some(path) = env::var_os("XDG_STATE_HOME") {
                  return Ok(PathBuf::from(path).join("ptymark/install.toml"));
              }
          '''
          new = '''pub fn default_install_state_path() -> Result<PathBuf, InstallError> {
              if let Some(path) = env::var_os("PTYMARK_INSTALL_STATE") {
                  return Ok(PathBuf::from(path));
              }
              #[cfg(windows)]
              if let Some(path) = env::var_os("LOCALAPPDATA") {
                  return Ok(PathBuf::from(path).join("ptymark/state/install.toml"));
              }
              if let Some(path) = env::var_os("XDG_STATE_HOME") {
                  return Ok(PathBuf::from(path).join("ptymark/install.toml"));
              }
          '''
          if old not in source:
              raise SystemExit('state path block not found')
          install.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Add Windows public contracts
        run: |
          cat > tests/windows_contract.rs <<'RS'
          #![cfg(windows)]

          use ptymark::resolve_executable;
          use std::fs;
          use std::path::PathBuf;
          use std::process::Command;
          use std::time::{SystemTime, UNIX_EPOCH};

          fn root(label: &str) -> PathBuf {
              let nonce = SystemTime::now()
                  .duration_since(UNIX_EPOCH)
                  .expect("clock")
                  .as_nanos();
              let path = std::env::temp_dir().join(format!("ptymark-windows-{label}-{nonce}"));
              fs::create_dir_all(&path).expect("temp root");
              path
          }

          #[test]
          fn absolute_program_resolution_honors_pathext() {
              let root = root("pathext");
              let script = root.join("renderer.cmd");
              fs::write(&script, "@echo off\r\necho ok\r\n").expect("script");
              let resolved = resolve_executable(&root.join("renderer")).expect("resolve .cmd");
              assert_eq!(resolved, fs::canonicalize(&script).expect("canonical"));
              let _ = fs::remove_dir_all(root);
          }

          #[test]
          fn fixed_managed_batch_wrapper_can_be_invoked() {
              let root = root("batch");
              let script = root.join("presenter.cmd");
              fs::write(&script, "@echo off\r\necho windows-managed-output\r\n").expect("script");
              let output = Command::new(&script).output().expect("run .cmd");
              assert!(output.status.success());
              assert!(String::from_utf8_lossy(&output.stdout).contains("windows-managed-output"));
              let _ = fs::remove_dir_all(root);
          }
          RS
      - name: Normalize and validate
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets
      - name: Commit patch
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/engine.rs src/install.rs tests/windows_contract.rs
          git commit -m "Support Windows executable and installer paths"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_REF_NAME}"
