name: ptymark wiki publisher

on:
  push:
    branches:
      - agent/wiki-access-probe-20260714
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: read

concurrency:
  group: ptymark-wiki-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Clone the Wiki repository
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p wiki-evidence
          wiki_url="https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.wiki.git"
          GIT_TERMINAL_PROMPT=0 git ls-remote "$wiki_url" | tee wiki-evidence/refs-before.txt
          GIT_TERMINAL_PROMPT=0 git clone "$wiki_url" wiki
          (
            cd wiki
            git status --short --branch
            find . -maxdepth 2 -type f ! -path './.git/*' -printf '%P\n' | sort
          ) | tee wiki-evidence/existing-pages.txt

      - name: Build Wiki pages from canonical GitHub records
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: v0.1.0-alpha.1
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${REPOSITORY}/issues/34" > wiki-evidence/roadmap-issue.json
          gh api "repos/${REPOSITORY}/issues/48" > wiki-evidence/adoptability-issue.json
          gh api "repos/${REPOSITORY}/releases/tags/${RELEASE_TAG}" > wiki-evidence/release.json
          gh api "repos/${REPOSITORY}/git/ref/heads/main" > wiki-evidence/main-ref.json

          python3 - <<'PY'
          import datetime as dt
          import json
          import os
          from pathlib import Path

          evidence = Path('wiki-evidence')
          wiki = Path('wiki')
          repo = os.environ['REPOSITORY']
          tag = os.environ['RELEASE_TAG']
          generated = dt.datetime.now(dt.timezone.utc).replace(microsecond=0).isoformat()

          roadmap = json.loads((evidence / 'roadmap-issue.json').read_text())
          adoptability = json.loads((evidence / 'adoptability-issue.json').read_text())
          release = json.loads((evidence / 'release.json').read_text())
          main_ref = json.loads((evidence / 'main-ref.json').read_text())
          main_sha = main_ref['object']['sha']

          home = f'''# ptymark Wiki

ptymark is a pre-display renderer for explicit semantic blocks in terminal output. It preserves ordinary terminal traffic and unsafe control-oriented regions byte-for-byte, while supported Mermaid and block-math input can be rendered before display.

## Start here

- [[Roadmap]] — dependency-ordered release trains and exit gates.
- [[Adoptability]] — user-journey acceptance ledger.
- [[Release Status|Release-Status]] — current published release, source identity, and assets.
- [Repository](https://github.com/{repo})
- [Issues](https://github.com/{repo}/issues)
- [Releases](https://github.com/{repo}/releases)

## Current baseline

The first immutable prerelease, `{tag}`, is published from reviewed `main`. The released surface includes file/stream preview, pipe-oriented command filtering, native Unix PTY and Windows ConPTY sessions, per-session `--source`, `--safe`, and `--private` modes, package-local installers, checksums, a release manifest, and build provenance.

## Source-of-truth policy

- GitHub Issue [#34](https://github.com/{repo}/issues/34) is the canonical execution roadmap.
- GitHub Issue [#48](https://github.com/{repo}/issues/48) is the canonical adoptability ledger.
- Wiki pages are maintained as readable mirrors and navigation pages. Implementation details and acceptance changes are approved in their canonical issues before the Wiki is refreshed.

_Last refreshed: {generated}_
'''

          roadmap_page = f'''# {roadmap['title']}

> Canonical source: GitHub Issue [#{roadmap['number']}]({roadmap['html_url']}).  
> This Wiki page is a readable mirror; update the issue first when roadmap scope, ordering, or exit gates change.  
> Refreshed: {generated}

{roadmap.get('body') or ''}
'''

          adoptability_page = f'''# {adoptability['title']}

> Canonical source: GitHub Issue [#{adoptability['number']}]({adoptability['html_url']}).  
> Check items only from merged or released evidence.  
> Refreshed: {generated}

{adoptability.get('body') or ''}
'''

          assets = release.get('assets', [])
          asset_rows = '\n'.join(
              f"| `{asset['name']}` | {asset.get('size', 0):,} | `{asset.get('digest') or 'n/a'}` |"
              for asset in assets
          )
          release_status = f'''# Release Status

## Current release

| Field | Value |
| --- | --- |
| Tag | `{release['tag_name']}` |
| Name | {release.get('name') or release['tag_name']} |
| Published | `{release.get('published_at') or 'n/a'}` |
| Prerelease | `{str(bool(release.get('prerelease'))).lower()}` |
| Draft | `{str(bool(release.get('draft'))).lower()}` |
| Current `main` | `{main_sha}` |
| Release target | `{release.get('target_commitish') or 'n/a'}` |

The release workflow rebuilds Linux, macOS, and Windows archives from the immutable release source, smoke-tests them, generates adjacent and aggregate SHA-256 records, creates a machine-readable manifest, verifies build provenance, and then publishes the prerelease.

## Published assets

| Asset | Size (bytes) | GitHub digest |
| --- | ---: | --- |
{asset_rows}

## Verification contract

1. Verify the archive using `SHA256SUMS` or its adjacent `.sha256` file.
2. Confirm `release-manifest.json` names the expected tag, version, source commit, platform, architecture, size, and digest.
3. Verify GitHub build provenance for the downloaded archive.
4. Never replace bytes under an existing tag; publish a higher version for corrections.

See the repository's `documents/release.md` for recovery and rollback rules.

_Last refreshed: {generated}_
'''

          sidebar = '''**ptymark Wiki**

- [[Home]]
- [[Roadmap]]
- [[Adoptability]]
- [[Release Status|Release-Status]]

**Project**

- [Repository](https://github.com/iwashita-nozomu/ptymark)
- [Issues](https://github.com/iwashita-nozomu/ptymark/issues)
- [Releases](https://github.com/iwashita-nozomu/ptymark/releases)
'''

          pages = {
              'Home.md': home,
              'Roadmap.md': roadmap_page,
              'Adoptability.md': adoptability_page,
              'Release-Status.md': release_status,
              '_Sidebar.md': sidebar,
          }
          for name, content in pages.items():
              (wiki / name).write_text(content.rstrip() + '\n')

          summary = {
              'generated_at': generated,
              'repository': repo,
              'main_sha': main_sha,
              'release_tag': release['tag_name'],
              'roadmap_issue': roadmap['number'],
              'adoptability_issue': adoptability['number'],
              'pages': sorted(pages),
          }
          (evidence / 'publication-summary.json').write_text(json.dumps(summary, indent=2) + '\n')
          PY

          find wiki -maxdepth 1 -type f -name '*.md' -printf '%f\n' | sort | tee wiki-evidence/generated-pages.txt

      - name: Commit and push Wiki pages
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          cd wiki
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add Home.md Roadmap.md Adoptability.md Release-Status.md _Sidebar.md
          git diff --cached --stat | tee ../wiki-evidence/diff-stat.txt
          git diff --cached --check
          if git diff --cached --quiet; then
            printf 'changed=false\n' | tee ../wiki-evidence/publish-result.txt
          else
            git commit -m "docs: publish reviewed project roadmap"
            GIT_TERMINAL_PROMPT=0 git push origin HEAD:master
            printf 'changed=true\ncommit=%s\n' "$(git rev-parse HEAD)" | tee ../wiki-evidence/publish-result.txt
          fi
          git log -1 --format=fuller | tee ../wiki-evidence/wiki-commit.txt

      - name: Verify published Wiki state
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          wiki_url="https://x-access-token:${GH_TOKEN}@github.com/${REPOSITORY}.wiki.git"
          rm -rf wiki-verify
          GIT_TERMINAL_PROMPT=0 git clone "$wiki_url" wiki-verify
          for page in Home.md Roadmap.md Adoptability.md Release-Status.md _Sidebar.md; do
            test -s "wiki-verify/$page"
          done
          git -C wiki-verify rev-parse HEAD | tee wiki-evidence/verified-head.txt
          find wiki-verify -maxdepth 1 -type f -name '*.md' -printf '%f\n' | sort | tee wiki-evidence/verified-pages.txt
          grep -F 'Release train 1' wiki-verify/Roadmap.md >/dev/null
          grep -F 'v0.1.0-alpha.1' wiki-verify/Release-Status.md >/dev/null

      - name: Upload Wiki publication evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-wiki-publication
          path: wiki-evidence/**
          if-no-files-found: error
          retention-days: 14
