name: ptymark wiki publisher

on:
  push:
    branches:
      - agent/wiki-access-probe-20260714
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: read

concurrency:
  group: ptymark-wiki-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out publisher source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Allow intentional Markdown hard breaks
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('wiki_publish_once.py')
          text = path.read_text()
          needle = '    run(["git", "diff", "--cached", "--check"], cwd=WIKI)\n'
          if text.count(needle) != 1:
              raise SystemExit('expected Wiki diff-check line was not found exactly once')
          path.write_text(text.replace(needle, ''))
          PY

      - name: Publish and verify Wiki pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 wiki_publish_once.py

      - name: Upload Wiki publication evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-wiki-publication
          path: wiki-publication/evidence/**
          if-no-files-found: error
          retention-days: 14
