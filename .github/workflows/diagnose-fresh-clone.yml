# @dependency-start
# contract workflow
# responsibility Captures bounded fresh-clone diagnostics for the OSS security pull request.
# upstream implementation ../../tools/ci/check_fresh_clone.sh fresh-clone acceptance entrypoint
# downstream evidence fresh-clone-diagnostics artifact for temporary failure analysis
# @dependency-end

name: Diagnose Fresh Clone

on:
  push:
    branches:
      - agent/oss-security-hardening
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: diagnose-fresh-clone-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ""
          AGENT_CANON_REPO_SSH_KEY: ""
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz ripgrep

      - name: Install Python dependencies
        run: PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"

      - name: Run fresh clone acceptance and retain bounded log
        id: fresh-clone
        continue-on-error: true
        shell: bash
        run: |
          set +e
          make fresh-clone-check >fresh-clone.log 2>&1
          status=$?
          printf '%s\n' "$status" >fresh-clone.status
          tail -n 300 fresh-clone.log
          exit "$status"

      - name: Upload fresh clone diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fresh-clone-diagnostics
          path: |
            fresh-clone.log
            fresh-clone.status
          if-no-files-found: error
          retention-days: 1

      - name: Preserve fresh clone result
        if: always()
        run: test '${{ steps.fresh-clone.outcome }}' = success
