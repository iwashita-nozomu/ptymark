# @dependency-start
# contract workflow
# responsibility Exports and commits the validated bounded dependency-manifest repair outside workflow-owned files.
# upstream design ../../vendor/agent-canon/documents/dependency-manifest-design.md defines the manifest DSL.
# upstream implementation ../scripts/repair_ptymark_dependency_headers.py performs the bounded repair.
# downstream implementation ./ci.yml validates the published repaired tree through the standard gate.
# @dependency-end
name: AgentCanon Repair Export Once

on:
  pull_request:
    branches: [main, master]
    paths:
      - .github/workflows/agent-canon-diagnostic-once.yml
      - .github/scripts/repair_ptymark_dependency_headers.py
      - .gitmodules
      - vendor/agent-canon
      - vendor/agent-canon/**
      - AGENTS.md
      - agents/**
      - .agents/**
      - .codex/**
      - tools/**

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out pull request head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Apply previously validated repair
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/repair_ptymark_dependency_headers.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('documents/ptymark-design.md')
          text = path.read_text(encoding='utf-8')
          old = '- ``$$ ... $$``;'
          new = '- a line-bounded block-math fence delimited by two dollar-sign lines;'
          if old in text:
              path.write_text(text.replace(old, new), encoding='utf-8')
          elif new not in text:
              raise SystemExit('expected block-math description was not found')
          PY
          git diff --check

      - name: Package repaired tree
        shell: bash
        run: |
          set -euo pipefail
          artifact="$RUNNER_TEMP/agent-canon-repaired-tree"
          rm -rf "$artifact"
          mkdir -p "$artifact"
          git diff --binary > "$artifact/agent-canon-repair.patch"
          git diff --name-only > "$artifact/changed-files.txt"
          git diff --name-status > "$artifact/changed-status.txt"
          tar --exclude=.git -czf "$artifact/repaired-tree.tar.gz" .

      - name: Upload repaired tree
        uses: actions/upload-artifact@v7
        with:
          name: agent-canon-repaired-tree
          path: ${{ runner.temp }}/agent-canon-repaired-tree/**
          if-no-files-found: error
          retention-days: 1

      - name: Commit non-workflow repair files
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -u
          git reset -- .github/workflows/ci.yml .github/workflows/ptymark-ci.yml
          if git diff --cached --quiet; then
            echo 'non-workflow dependency manifests already valid'
            exit 0
          fi
          git commit -m 'docs: repair ptymark dependency manifests'
          auth_header="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w0)"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "HEAD:${GITHUB_HEAD_REF}"
