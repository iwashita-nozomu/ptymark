# @dependency-start
# contract workflow
# responsibility Repairs the bounded ptymark dependency manifests required by the pinned AgentCanon pull-request gate.
# upstream design ../../vendor/agent-canon/documents/dependency-manifest-design.md defines the manifest DSL.
# upstream implementation ../scripts/repair_ptymark_dependency_headers.py performs the bounded repair.
# downstream implementation ./ci.yml validates the repaired repository through the standard gate.
# @dependency-end
name: AgentCanon Dependency Header Repair Once

on:
  pull_request:
    branches: [main, master]
    paths:
      - .github/workflows/agent-canon-diagnostic-once.yml
      - .github/scripts/repair_ptymark_dependency_headers.py
      - .gitmodules
      - vendor/agent-canon
      - vendor/agent-canon/**
      - AGENTS.md
      - agents/**
      - .agents/**
      - .codex/**
      - tools/**

permissions:
  contents: write

concurrency:
  group: agent-canon-header-repair-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out pull request head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz ripgrep
          PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"

      - name: Repair registered dependency manifests and markdown math
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/repair_ptymark_dependency_headers.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('documents/ptymark-design.md')
          text = path.read_text(encoding='utf-8')
          old = '- ``$$ ... $$``;'
          new = '- a line-bounded block-math fence delimited by two dollar-sign lines;'
          if old not in text and new not in text:
              raise SystemExit('expected block-math description was not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Capture repaired-tree validation
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git diff --binary > agent-canon-repair.patch
          set +e
          make agent-canon-pr-check > agent-canon-pr.log 2>&1
          status=$?
          set -e
          tail -n 500 agent-canon-pr.log > agent-canon-pr-tail.log
          printf '%s\n' "$status" > agent-canon-pr-status.txt
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"

      - name: Upload repair diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: agent-canon-header-repair-diagnostics
          path: |
            agent-canon-repair.patch
            agent-canon-pr.log
            agent-canon-pr-tail.log
            agent-canon-pr-status.txt
          if-no-files-found: error
          retention-days: 1

      - name: Stop when the repaired tree remains invalid
        shell: bash
        env:
          VALIDATION_STATUS: ${{ steps.validate.outputs.status }}
        run: exit "$VALIDATION_STATUS"

      - name: Commit repaired dependency manifests
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -u
          if git diff --cached --quiet; then
            echo 'dependency manifests already valid'
            exit 0
          fi
          git commit -m 'docs: repair ptymark dependency manifests'
          auth_header="$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w0)"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic ${auth_header}" \
            push origin "HEAD:${GITHUB_HEAD_REF}"
