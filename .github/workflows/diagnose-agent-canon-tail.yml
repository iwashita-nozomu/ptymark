# @dependency-start
# contract workflow
# responsibility Captures a bounded AgentCanon PR gate tail for temporary diagnosis.
# upstream implementation ../../tools/ci/check_agent_canon_pr.sh shared canon PR gate
# @dependency-end

name: Diagnose AgentCanon Gate Tail

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: diagnose-agent-canon-tail-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ""
          AGENT_CANON_REPO_SSH_KEY: ""
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install dependencies quietly
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq >/dev/null
          sudo apt-get install -y -qq graphviz ripgrep >/dev/null
          PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD" >/dev/null

      - name: Run gate and print final diagnostics
        shell: bash
        run: |
          set +e
          make agent-canon-pr-check >agent-canon-pr.log 2>&1
          status=$?
          printf 'AGENT_CANON_GATE_STATUS=%s\n' "$status"
          tail -n 80 agent-canon-pr.log
          exit "$status"
