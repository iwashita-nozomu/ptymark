name: ptymark Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-native:
    name: Build native archive (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          crate_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          tag_version="${GITHUB_REF_NAME#v}"
          test "$crate_version" = "$tag_version"

      - name: Test and build release binary
        shell: bash
        run: |
          cargo test --locked --all-targets
          cargo build --locked --release

      - name: Package archive and checksum
        shell: bash
        run: bash scripts/package-ptymark-release.sh target/release/ptymark dist

      - name: Upload release candidate
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-native
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download native archives
        uses: actions/download-artifact@v8
        with:
          pattern: ptymark-*
          path: dist
          merge-multiple: true

      - name: Verify checksums
        shell: bash
        run: |
          cd dist
          for checksum in *.sha256; do
            sha256sum --check "$checksum"
          done

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          crate_version="${GITHUB_REF_NAME#v}"
          release_args=(
            release create "$GITHUB_REF_NAME"
            --verify-tag
            --generate-notes
            --title "$GITHUB_REF_NAME"
          )
          if [[ "$crate_version" == *-* ]]; then
            release_args+=(--prerelease)
          fi
          gh "${release_args[@]}" dist/*
