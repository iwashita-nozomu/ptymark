name: ptymark Windows Native Engine Fix V2 Once

on:
  push:
    branches:
      - agent/minimal-pre-display-core
    paths:
      - .github/workflows/ptymark-windows-native-engine-fix-v2-once.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false
          fetch-depth: 0
      - name: Apply native Windows renderer contract
        run: |
          python3 - <<'PY'
          from pathlib import Path

          engine = Path('src/engine.rs')
          source = engine.read_text(encoding='utf-8')
          marker = 'pub fn resolve_executable(path: &Path) -> Result<PathBuf, RenderError> {\n'
          if '    reject_windows_shell_wrapper(path)?;\n' not in source:
              source = source.replace(marker, marker + '    reject_windows_shell_wrapper(path)?;\n', 1)
          source = source.replace(
              'env::var_os("PATHEXT").unwrap_or_else(|| OsString::from(".COM;.EXE;.BAT;.CMD"));',
              'env::var_os("PATHEXT").unwrap_or_else(|| OsString::from(".COM;.EXE"));',
              1,
          )
          source = source.replace(
              '''            if !extension.is_empty() {
                          candidates.push(path.with_extension(extension));
                      }
          ''',
              '''            if extension.eq_ignore_ascii_case("com") || extension.eq_ignore_ascii_case("exe") {
                          candidates.push(path.with_extension(extension));
                      }
          ''',
              1,
          )
          helper_marker = 'fn executable_candidate(path: &Path) -> Option<PathBuf> {\n'
          helper = '''#[cfg(windows)]
          fn reject_windows_shell_wrapper(path: &Path) -> Result<(), RenderError> {
              let is_batch = path
                  .extension()
                  .and_then(|extension| extension.to_str())
                  .is_some_and(|extension| {
                      extension.eq_ignore_ascii_case("cmd") || extension.eq_ignore_ascii_case("bat")
                  });
              if is_batch {
                  return Err(RenderError::new(format!(
                      "configured renderer `{}` is a shell wrapper; select a native .exe/.com or the ptymark-managed alias",
                      path.display()
                  )));
              }
              Ok(())
          }

          #[cfg(not(windows))]
          fn reject_windows_shell_wrapper(_path: &Path) -> Result<(), RenderError> {
              Ok(())
          }

          '''
          if 'fn reject_windows_shell_wrapper' not in source:
              source = source.replace(helper_marker, helper + helper_marker, 1)
          engine.write_text(source, encoding='utf-8')

          installer = Path('scripts/installer.ps1')
          source = installer.read_text(encoding='utf-8')
          source = source.replace("Get-ProgramPath @('mmdc.exe', 'mmdc.cmd', 'mmdc')", "Get-ProgramPath @('mmdc.exe')")
          source = source.replace("Get-ProgramPath @('tex2svg.exe', 'tex2svg.cmd', 'tex2svg')", "Get-ProgramPath @('tex2svg.exe')")
          source = source.replace("Get-ProgramPath @('chafa.exe', 'chafa.cmd', 'chafa')", "Get-ProgramPath @('chafa.exe')")
          installer.write_text(source, encoding='utf-8')
          PY

          cat > tests/windows_contract.rs <<'RS'
          #![cfg(windows)]

          use ptymark::resolve_executable;
          use std::fs;
          use std::path::PathBuf;
          use std::time::{SystemTime, UNIX_EPOCH};

          fn root(label: &str) -> PathBuf {
              let nonce = SystemTime::now()
                  .duration_since(UNIX_EPOCH)
                  .expect("clock")
                  .as_nanos();
              let path = std::env::temp_dir().join(format!("ptymark-windows-{label}-{nonce}"));
              fs::create_dir_all(&path).expect("temp root");
              path
          }

          #[test]
          fn absolute_program_resolution_honors_native_exe_suffix() {
              let root = root("pathext");
              let executable = root.join("renderer.exe");
              fs::write(&executable, b"native-test-placeholder").expect("placeholder");
              let resolved = resolve_executable(&root.join("renderer")).expect("resolve .exe");
              assert_eq!(resolved, fs::canonicalize(&executable).expect("canonical"));
              let _ = fs::remove_dir_all(root);
          }

          #[test]
          fn batch_renderer_is_rejected_without_a_shell_handoff() {
              let root = root("batch");
              let script = root.join("renderer.cmd");
              fs::write(&script, "@echo off\r\necho unsafe-shell-wrapper\r\n").expect("script");
              let error = resolve_executable(&script).expect_err("batch wrapper must be rejected");
              assert!(error.to_string().contains("shell wrapper"));
              let _ = fs::remove_dir_all(root);
          }
          RS
      - name: Normalize and validate
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets
      - name: Commit correction
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/engine.rs scripts/installer.ps1 tests/windows_contract.rs
          git commit -m 'Require native Windows renderer executables'
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
