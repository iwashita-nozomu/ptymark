# @dependency-start
# contract workflow
# responsibility Fails fast when ptymark runtime or renderer dependency pins drift.
# upstream implementation ../../scripts/check-ptymark-runtime-dependencies.mjs alignment contract
# upstream environment ../../renderers/managed-bundle.env managed dependency versions
# upstream environment ../../docker/ptymark-versions.env canonical product image inputs
# downstream design ../../documents/ptymark-runtime-dependencies.md ownership and upgrade rules
# @dependency-end

name: ptymark dependency alignment

on:
  push:
    branches:
      - main
      - "agent/**"
    paths:
      - "Cargo.toml"
      - "rust-toolchain.toml"
      - "ptymark.mk"
      - "renderers/managed-bundle.env"
      - "renderers/package.json"
      - "renderers/package-lock.json"
      - "docker/ptymark-versions.env"
      - "docker/ptymark.Dockerfile"
      - "docker/ptymark-compose.yaml"
      - "scripts/check-ptymark-runtime-dependencies.mjs"
      - "documents/ptymark-runtime-dependencies.md"
      - ".github/workflows/ptymark-ci.yml"
      - ".github/workflows/ptymark-release.yml"
      - ".github/workflows/ptymark-dependency-alignment.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "rust-toolchain.toml"
      - "ptymark.mk"
      - "renderers/managed-bundle.env"
      - "renderers/package.json"
      - "renderers/package-lock.json"
      - "docker/ptymark-versions.env"
      - "docker/ptymark.Dockerfile"
      - "docker/ptymark-compose.yaml"
      - "scripts/check-ptymark-runtime-dependencies.mjs"
      - "documents/ptymark-runtime-dependencies.md"
      - ".github/workflows/ptymark-ci.yml"
      - ".github/workflows/ptymark-release.yml"
      - ".github/workflows/ptymark-dependency-alignment.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ptymark-dependency-alignment-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Validate runtime dependency alignment
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Install pinned Node runtime
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Validate dependency sources
        run: make ptymark-runtime-dependencies
