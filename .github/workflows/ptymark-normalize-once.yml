# @dependency-start
# contract workflow
# responsibility Normalizes the reviewed cache-key changes with the pinned Rust toolchain once and commits only a passing tree.
# upstream implementation ../../src/cache.rs owns the bounded collision-free cache key.
# downstream workflow ./ptymark-ci.yml remains the repeatable validation path.
# @dependency-end
name: ptymark Normalize Once

on:
  push:
    branches:
      - agent/minimal-pre-display-core
    paths:
      - .github/workflows/ptymark-normalize-once.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Normalize and validate
        run: |
          cargo fmt --all
          cargo clippy --fix --locked --all-targets --allow-dirty --allow-staged -- -D warnings
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets

      - name: Commit normalized sources
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- '*.rs'; then
            echo "No Rust source changes were required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.rs'
          git commit -m "Normalize reviewed cache changes"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_REF_NAME}"
