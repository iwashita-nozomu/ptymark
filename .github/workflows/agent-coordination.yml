# @dependency-start
# contract configuration
# responsibility Defines agent coordination YAML configuration.
# upstream design ../../agents/workflows/agent-canon-pr-workflow.md agent-canon PR workflow
# @dependency-end

# Synced to /.github/workflows/agent-coordination.yml by tools/sync_agent_canon.sh link-root.
# Edit vendor/agent-canon/.github/workflows/agent-coordination.yml, not the root copy.
name: Agent Coordination

on:
  workflow_dispatch:
    inputs:
      task:
        description: Short task summary for the agent team run
        required: true
        default: manual-agent-run
        type: string
      owner:
        description: Human or agent owning the run
        required: true
        default: github-actions
        type: string
      specialists:
        description: Optional comma-separated specialist roles such as researcher,scheduler,infra_steward
        required: false
        default: ""
        type: string
      full_team:
        description: Enable every specialist role for this run
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: agent-coordination-${{ github.ref }}-${{ inputs.task }}
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.bootstrap.outputs.run_id }}
      report_dir: ${{ steps.bootstrap.outputs.report_dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false
      - name: Checkout AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: |
          if [ -f .github/scripts/checkout_agent_canon_submodule.sh ]; then
            bash .github/scripts/checkout_agent_canon_submodule.sh
          else
            bash tools/ci/checkout_agent_canon_submodule.sh
          fi
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Bootstrap agent run
        id: bootstrap
        run: |
          normalized="$(printf '%s' '${{ inputs.specialists }}' | tr -d ' ')"
          flags=()
          if [ "${{ inputs.full_team }}" = "true" ]; then
            flags+=(--full-team)
          fi
          if [ -n "${normalized}" ]; then
            IFS=',' read -ra roles <<< "${normalized}"
            for role in "${roles[@]}"; do
              [ -n "${role}" ] && flags+=(--enable "${role}")
            done
          fi
          python3 tools/agent_tools/bootstrap_agent_run.py \
            --task "${{ inputs.task }}" \
            --owner "${{ inputs.owner }}" \
            --workspace-root "${GITHUB_WORKSPACE}" \
            "${flags[@]}" > bootstrap.txt
          cat bootstrap.txt
          run_id="$(grep '^RUN_ID=' bootstrap.txt | cut -d= -f2-)"
          echo "run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "report_dir=reports/agents/${run_id}" >> "$GITHUB_OUTPUT"
      - name: Upload bootstrap bundle
        uses: actions/upload-artifact@v4
        with:
          name: agent-run-bootstrap-${{ steps.bootstrap.outputs.run_id }}
          path: ${{ steps.bootstrap.outputs.report_dir }}

  manager:
    needs: bootstrap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false
      - name: Checkout AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: |
          if [ -f .github/scripts/checkout_agent_canon_submodule.sh ]; then
            bash .github/scripts/checkout_agent_canon_submodule.sh
          else
            bash tools/ci/checkout_agent_canon_submodule.sh
          fi
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download bootstrap bundle
        uses: actions/download-artifact@v4
        with:
          name: agent-run-bootstrap-${{ needs.bootstrap.outputs.run_id }}
          path: ${{ needs.bootstrap.outputs.report_dir }}
      - name: Run manager stage
        run: |
          report_snapshot="${RUNNER_TEMP}/manager-report-before.json"
          workspace_snapshot="${RUNNER_TEMP}/manager-workspace-before.json"
          python3 tools/agent_tools/validate_role_write_scope.py \
            --report-dir "${{ needs.bootstrap.outputs.report_dir }}" \
            --workspace-root "${GITHUB_WORKSPACE}" \
            --report-snapshot-out "${report_snapshot}" \
            --workspace-snapshot-out "${workspace_snapshot}"
          {
            echo ""
            echo "- github_actions_manager: intake confirmed for always-on spine"
          } >> "${{ needs.bootstrap.outputs.report_dir }}/intent_brief.md"
          python3 tools/agent_tools/validate_role_write_scope.py \
            --role manager \
            --report-dir "${{ needs.bootstrap.outputs.report_dir }}" \
            --workspace-root "${GITHUB_WORKSPACE}" \
            --report-snapshot-in "${report_snapshot}" \
            --workspace-snapshot-in "${workspace_snapshot}"
      - name: Upload manager bundle
        uses: actions/upload-artifact@v4
        with:
          name: agent-run-manager-${{ needs.bootstrap.outputs.run_id }}
          path: ${{ needs.bootstrap.outputs.report_dir }}

