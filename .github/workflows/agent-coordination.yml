          submodules: false
          persist-credentials: false
      - name: Checkout AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: |
          if [ -f .github/scripts/checkout_agent_canon_submodule.sh ]; then
            bash .github/scripts/checkout_agent_canon_submodule.sh
          else
            bash tools/ci/checkout_agent_canon_submodule.sh
          fi
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Download final review bundle
        uses: actions/download-artifact@v4
        with:
          name: agent-run-final-review-${{ needs.bootstrap.outputs.run_id }}
          path: ${{ needs.bootstrap.outputs.report_dir }}
      - name: Run implementer final response stage
        run: |
          report_snapshot="${RUNNER_TEMP}/implementer-final-response-report-before.json"
          workspace_snapshot="${RUNNER_TEMP}/implementer-final-response-workspace-before.json"
          python3 tools/agent_tools/validate_role_write_scope.py \
            --report-dir "${{ needs.bootstrap.outputs.report_dir }}" \
            --workspace-root "${GITHUB_WORKSPACE}" \
            --report-snapshot-out "${report_snapshot}" \
            --workspace-snapshot-out "${workspace_snapshot}"
          {
            echo ""
            echo "| $(date -u '+%Y-%m-%dT%H:%M:%SZ') | implementer | Resolve final review | Implementer re-entered before verification. | final_review.md |"
          } >> "${{ needs.bootstrap.outputs.report_dir }}/decision_log.md"
          python3 tools/agent_tools/validate_role_write_scope.py \
            --role implementer \
            --report-dir "${{ needs.bootstrap.outputs.report_dir }}" \
            --workspace-root "${GITHUB_WORKSPACE}" \
            --report-snapshot-in "${report_snapshot}" \
            --workspace-snapshot-in "${workspace_snapshot}"
      - name: Upload implementer final response bundle
        uses: actions/upload-artifact@v4
        with:
          name: agent-run-implementer-final-response-${{ needs.bootstrap.outputs.run_id }}
          path: ${{ needs.bootstrap.outputs.report_dir }}

  verifier:
    needs: [bootstrap, implementer_final_response]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false
      - name: Checkout AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: |
          if [ -f .github/scripts/checkout_agent_canon_submodule.sh ]; then
            bash .github/scripts/checkout_agent_canon_submodule.sh
          else
            bash tools/ci/checkout_agent_canon_submodule.sh
          fi
      - name: Install Python and deps
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" || true
          if [ -f docker/requirements.txt ]; then pip install -r docker/requirements.txt || true; fi
      - name: Download implementer final response bundle
        uses: actions/download-artifact@v4
        with:
          name: agent-run-implementer-final-response-${{ needs.bootstrap.outputs.run_id }}
          path: ${{ needs.bootstrap.outputs.report_dir }}
      - name: Run pre-review checks
        run: |
          export AGENT_REPORT_DIR="${{ needs.bootstrap.outputs.report_dir }}"
          export AGENT_ROLE="verifier"
          export AGENT_ENFORCE_WRITE_SCOPE="1"
          bash tools/ci/pre_review.sh
      - name: Upload verification bundle
        uses: actions/upload-artifact@v4
        with:
          name: agent-run-verification-${{ needs.bootstrap.outputs.run_id }}
          path: ${{ needs.bootstrap.outputs.report_dir }}

  auditor:
    needs: [bootstrap, verifier]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
