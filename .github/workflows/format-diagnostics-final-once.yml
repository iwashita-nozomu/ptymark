name: apply final diagnostics rustfmt

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.ref == 'agent/diagnostics-redaction-alpha2'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/diagnostics-redaction-alpha2
          persist-credentials: false

      - name: Install pinned Rustfmt
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt
          rustup override set 1.97.0

      - name: Format, clean, commit, and push
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: agent/diagnostics-redaction-alpha2
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          rm -f .github/workflows/format-diagnostics-final-once.yml
          git add -A
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'style: apply final diagnostics formatting'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${BRANCH}"
