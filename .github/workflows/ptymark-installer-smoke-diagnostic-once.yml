# @dependency-start
# contract workflow
# responsibility Captures the canonical-Docker installer smoke trace once while stabilizing the installer.
# upstream environment ../../docker/ptymark.Dockerfile defines the canonical image.
# upstream test ../../tests/install_smoke.sh owns the end-to-end installer smoke.
# downstream workflow ./ptymark-ci.yml remains the repeatable validation path.
# @dependency-end
name: ptymark Installer Smoke Diagnostic Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ptymark-installer-smoke-diagnostic-once.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Build canonical image quietly
        shell: bash
        run: |
          set -o pipefail
          docker compose \
            --env-file docker/ptymark-versions.env \
            --file docker/ptymark-compose.yaml \
            build --pull --quiet >installer-image.log 2>&1

      - name: Capture installer smoke trace
        shell: bash
        run: |
          set +e
          compose=(docker compose --env-file docker/ptymark-versions.env --file docker/ptymark-compose.yaml)
          "${compose[@]}" run --rm --no-TTY dev \
            bash -lc 'cargo build --locked >/tmp/installer-cargo-build.log 2>&1 && bash -x tests/install_smoke.sh target/debug/ptymark' \
            >installer-smoke.log 2>&1
          status=$?
          printf '%s\n' "$status" >installer-smoke.status
          cat installer-smoke.log
          exit 0

      - name: Upload installer smoke diagnostic
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-installer-smoke-diagnostic
          path: |
            installer-image.log
            installer-smoke.log
            installer-smoke.status
          if-no-files-found: error
          retention-days: 3

      - name: Preserve conclusion
        run: test "$(cat installer-smoke.status)" = 0
