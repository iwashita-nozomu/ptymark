# @dependency-start
# contract release diagnostics
# responsibility Captures compact inherited Repository CI failures from the current release-candidate branch without modifying it.
# upstream workflow ../../.github/workflows/ci.yml defines the inherited repository gate.
# upstream branch agent/filter-command-stdout supplies the release-candidate tree under diagnosis.
# downstream pull_request PR #33 consumes only the resulting compact diagnostic artifact.
# @dependency-end

name: Release Candidate Repository CI Diagnostic

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/release-ci-diagnostic.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out release candidate
        uses: actions/checkout@v7
        with:
          ref: agent/filter-command-stdout
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install repository dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz ripgrep
          PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"

      - name: Capture compact Repository CI diagnostics
        id: gate
        shell: bash
        run: |
          set +e
          mkdir -p "$RUNNER_TEMP/release-ci-diagnostic"
          make ci >"$RUNNER_TEMP/release-ci-diagnostic/full.log" 2>&1
          status=$?
          {
            printf 'status=%s\n' "$status"
            printf '\n== matching diagnostics ==\n'
            grep -Ein '(^|[^a-z])(error|failed|failure|mismatch|missing|stale|drift|invalid|forbidden|not found|diff|manifest|header)([^a-z]|$)' \
              "$RUNNER_TEMP/release-ci-diagnostic/full.log" || true
            printf '\n== final 200 lines ==\n'
            tail -n 200 "$RUNNER_TEMP/release-ci-diagnostic/full.log"
          } >"$RUNNER_TEMP/release-ci-diagnostic/summary.txt"
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"

      - name: Upload compact diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-ci-diagnostic
          path: ${{ runner.temp }}/release-ci-diagnostic
          if-no-files-found: error
          retention-days: 1

      - name: Preserve gate result
        if: always()
        run: test "${{ steps.gate.outputs.status }}" = 0
