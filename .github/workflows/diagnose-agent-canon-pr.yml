# @dependency-start
# contract workflow
# responsibility Captures bounded AgentCanon PR gate diagnostics for the OSS security pull request.
# upstream implementation ../../tools/ci/check_agent_canon_pr.sh shared canon PR gate
# @dependency-end

name: Diagnose AgentCanon PR Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: diagnose-agent-canon-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ""
          AGENT_CANON_REPO_SSH_KEY: ""
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz ripgrep
          PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"

      - name: Run AgentCanon PR gate and retain bounded log
        id: gate
        continue-on-error: true
        shell: bash
        run: |
          set +e
          make agent-canon-pr-check >agent-canon-pr.log 2>&1
          status=$?
          printf '%s\n' "$status" >agent-canon-pr.status
          tail -n 400 agent-canon-pr.log
          exit "$status"

      - name: Upload AgentCanon PR diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: agent-canon-pr-diagnostics
          path: |
            agent-canon-pr.log
            agent-canon-pr.status
          if-no-files-found: error
          retention-days: 1

      - name: Preserve AgentCanon PR gate result
        if: always()
        run: test '${{ steps.gate.outcome }}' = success
