# @dependency-start
# contract workflow
# responsibility Captures bounded log-surface guard diagnostics for the OSS security pull request.
# upstream implementation ../../.codex/hooks/log_surface_inventory_guard.py inventory drift guard
# @dependency-end

name: Diagnose AgentCanon PR Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: diagnose-agent-canon-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ""
          AGENT_CANON_REPO_SSH_KEY: ""
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Capture resolved guard paths and inventory output
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY' >log-surface-paths.txt
          import importlib.util
          from pathlib import Path

          guard_path = Path('.codex/hooks/log_surface_inventory_guard.py').resolve()
          spec = importlib.util.spec_from_file_location('log_surface_inventory_guard', guard_path)
          assert spec is not None and spec.loader is not None
          module = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(module)
          root = module.repo_root()
          baseline = module.baseline_path(root)
          print(f'cwd={Path.cwd()}')
          print(f'test_path={Path("tests/agent_tools/test_codex_hooks.py").resolve()}')
          print(f'guard_path={guard_path}')
          print(f'repo_root={root}')
          print(f'agent_canon_root={module.agent_canon_root()}')
          print(f'tool_path={module.tool_path(root)}')
          print(f'baseline_path={baseline}')
          print(f'inventory_root={module.inventory_root_for_baseline(baseline)}')
          PY
          printf '{"hookEventName":"Stop"}\n' \
            | python3 .codex/hooks/log_surface_inventory_guard.py \
            >log-surface-guard.json
          cat log-surface-paths.txt
          cat log-surface-guard.json

      - name: Upload log surface diagnostics
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: agent-canon-pr-diagnostics
          path: |
            log-surface-paths.txt
            log-surface-guard.json
          if-no-files-found: error
          retention-days: 1
