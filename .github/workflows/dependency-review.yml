# @dependency-start
# contract workflow
# responsibility Blocks pull requests that introduce dependencies with known moderate-or-higher vulnerabilities.
# upstream environment ../dependabot.yml proposes dependency updates
# upstream environment ../../Cargo.lock resolved Rust dependency graph
# upstream environment ../../docker/requirements-runtime.txt Python runtime dependencies
# upstream environment ../../docker/requirements-dev.txt Python verification dependencies
# upstream environment ../../renderers/package-lock.json resolved renderer dependency graph
# downstream design ../../SECURITY.md vulnerability reporting and support policy
# @dependency-end

name: Dependency Review

on:
  pull_request:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "pyproject.toml"
      - "docker/requirements*.txt"
      - "docker/Dockerfile"
      - "docker/**/Dockerfile"
      - "docker/*.Dockerfile"
      - "renderers/package.json"
      - "renderers/package-lock.json"
      - ".gitmodules"
      - ".github/dependabot.yml"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: dependency-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency vulnerability review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
