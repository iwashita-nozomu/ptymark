name: diagnose PR 100 inherited CI once

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: diagnose-pr100-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out the PR virtual merge
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: refs/pull/100/merge
          path: merge
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        working-directory: merge
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
          AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: merge/docker/requirements.txt

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz ripgrep

      - name: Install pip dependencies
        working-directory: merge
        run: PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"

      - name: Reproduce repository CI and capture output
        id: reproduce
        working-directory: merge
        shell: bash
        run: |
          set +e
          make ci > /tmp/pr100-ci.log 2>&1
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path('/tmp/pr100-ci.log').read_text(encoding='utf-8', errors='replace')
          text = re.sub(r'\x1b\[[0-9;?]*[ -/]*[@-~]', '', text)
          lines = text.splitlines()
          tail = '\n'.join(lines[-300:])
          Path('/tmp/pr100-ci-tail.txt').write_text(tail + '\n', encoding='utf-8')
          PY

      - name: Check out the source branch for the diagnostic commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: agent/issue-99-runtime-dependency-alignment
          path: branch
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Commit the diagnostic and remove this workflow
        env:
          GH_TOKEN: ${{ github.token }}
          STATUS: ${{ steps.reproduce.outputs.status }}
          TARGET_BRANCH: agent/issue-99-runtime-dependency-alignment
        working-directory: branch
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/integration
          {
            echo '# PR 100 inherited CI diagnostic'
            echo
            echo "make ci exit status: ${STATUS}"
            echo
            echo '```text'
            cat /tmp/pr100-ci-tail.txt
            echo '```'
          } > reports/integration/pr100-inherited-ci.md
          rm .github/workflows/diagnose-pr100-ci-once.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'docs: capture PR 100 inherited CI failure'
          git push \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${TARGET_BRANCH}"
