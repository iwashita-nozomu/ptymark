name: ptymark Chafa Compatibility Once

on:
  push:
    branches:
      - agent/minimal-pre-display-core
    paths:
      - .github/workflows/ptymark-chafa-compat-once.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false
          fetch-depth: 0

      - name: Reduce the external presenter protocol to stable Chafa options
        run: |
          python3 - <<'PY'
          from pathlib import Path

          engine = Path('src/engine.rs')
          source = engine.read_text(encoding='utf-8')
          old = '''    let arguments = vec![
              OsString::from("--format"),
              OsString::from("symbols"),
              OsString::from("--probe"),
              OsString::from("off"),
              OsString::from("--polite"),
              OsString::from("on"),
              OsString::from("--relative"),
              OsString::from("off"),
              OsString::from("--animate"),
              OsString::from("off"),
              OsString::from("--colors"),
              OsString::from(colors),
              OsString::from("--size"),
              OsString::from(format!("{}x", context.columns)),
              input_path.into_os_string(),
          ];
          '''
          new = '''    let arguments = vec![
              OsString::from("--format"),
              OsString::from("symbols"),
              OsString::from("--colors"),
              OsString::from(colors),
              OsString::from("--size"),
              OsString::from(format!("{}x", context.columns)),
              input_path.into_os_string(),
          ];
          '''
          if source.count(old) != 1:
              raise SystemExit('engine presenter argument block not found exactly once')
          engine.write_text(source.replace(old, new, 1), encoding='utf-8')

          smoke = Path('scripts/check-ptymark-renderers.sh')
          source = smoke.read_text(encoding='utf-8')
          old = '''"$real_chafa" \\
            --format symbols \\
            --probe off \\
            --polite on \\
            --relative off \\
            --animate off \\
            --colors none \\
            --size 60x \\
            "$work_dir/diagram.svg" \\
            >"$work_dir/diagram.txt"
          '''
          new = '''"$real_chafa" \\
            --format symbols \\
            --colors none \\
            --size 60x \\
            "$work_dir/diagram.svg" \\
            >"$work_dir/diagram.txt"
          '''
          if source.count(old) != 1:
              raise SystemExit('renderer smoke Chafa block not found exactly once')
          smoke.write_text(source.replace(old, new, 1), encoding='utf-8')

          design = Path('documents/ptymark-design.md')
          source = design.read_text(encoding='utf-8')
          old = '''External layout engines produce SVG, not terminal bytes. The initial presenter
          accepts the fixed Chafa-compatible subset used by ptymark:

          ```text
          --format symbols
          --probe off
          --polite on
          --relative off
          --animate off
          --colors full|none
          --size COLUMNSx
          SVG_PATH
          ```
          '''
          new = '''External layout engines produce SVG, not terminal bytes. The initial presenter
          uses the long-lived Chafa option subset shared by older distribution packages and
          current releases:

          ```text
          --format symbols
          --colors full|none
          --size COLUMNSx
          SVG_PATH
          ```

          Optional capabilities such as probing, polite mode, relative placement, and animation
          are not required from a user-selected Chafa executable. Symbol format prevents
          capability-blind pixel placement, while the fixed color and size arguments keep output
          deterministic across supported versions.
          '''
          if source.count(old) != 1:
              raise SystemExit('design presenter contract not found exactly once')
          design.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Validate the reviewed patch
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets
          bash -n scripts/check-ptymark-renderers.sh

      - name: Commit compatibility fix
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/engine.rs scripts/check-ptymark-renderers.sh documents/ptymark-design.md
          git commit -m 'Support older user-installed Chafa releases'
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
