name: ptymark Portable Tests Fix Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ptymark-managed-integration-once.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false
          fetch-depth: 0
      - name: Make absolute-path test platform aware
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/config.rs')
          source = path.read_text(encoding='utf-8')
          old = '        config.engines.mermaid.path = PathBuf::from("/opt/homebrew/bin/mmdc");\n'
          new = '''        config.engines.mermaid.path = if cfg!(windows) {
              PathBuf::from(r"C:\\Program Files\\ptymark\\mmdc.exe")
          } else {
              PathBuf::from("/opt/homebrew/bin/mmdc")
          };
          '''
          if old not in source:
              raise SystemExit('absolute-path test marker not found')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Normalize and validate
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets
      - name: Commit portable test
        env:
          PUSH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/config.rs
          git commit -m "Make configuration contracts portable"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${HEAD_BRANCH}"
