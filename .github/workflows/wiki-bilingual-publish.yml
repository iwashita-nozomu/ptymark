name: ptymark bilingual Wiki publisher

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write
  issues: read

concurrency:
  group: ptymark-bilingual-wiki-publisher
  cancel-in-progress: false

jobs:
  publish:
    if: github.head_ref == 'agent/wiki-bilingual-20260714'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out publisher source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Publish and verify bilingual Wiki
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 wiki_publish_bilingual.py

      - name: Upload Wiki publication evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-bilingual-wiki-publication
          path: wiki-publication/evidence/**
          if-no-files-found: error
          retention-days: 14

      - name: Delete temporary publisher branch
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/${GITHUB_HEAD_REF}"
