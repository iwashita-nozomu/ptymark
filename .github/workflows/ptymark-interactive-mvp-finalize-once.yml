name: ptymark Refactor Runtime Once

on:
  push:
    branches:
      - agent/filter-command-stdout
    paths:
      - .github/workflows/ptymark-interactive-mvp-finalize-once.yml
      - .refactor_runtime_once.part*

permissions:
  contents: write

concurrency:
  group: ptymark-refactor-runtime-once
  cancel-in-progress: false

jobs:
  refactor:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/filter-command-stdout
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Apply responsibility refactor
        shell: bash
        run: |
          set -euo pipefail
          cat .refactor_runtime_once.part00 .refactor_runtime_once.part01 .refactor_runtime_once.part02 .refactor_runtime_once.part03 .refactor_runtime_once.part04 | tr -d '\n' | base64 -d | gzip -d > /tmp/refactor_runtime_once.py
          python3 /tmp/refactor_runtime_once.py

      - name: Format and validate the refactored runtime
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets
          cargo build --locked
          bash tests/shell_profile_coexistence.sh target/debug/ptymark

      - name: Commit the reviewed refactor and remove one-time tooling
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/ptymark-interactive-mvp-finalize-once.yml .refactor_runtime_once.part00 .refactor_runtime_once.part01 .refactor_runtime_once.part02 .refactor_runtime_once.part03 .refactor_runtime_once.part04
          git add -A
          git diff --cached --check
          if git diff --cached --quiet; then
            echo 'No refactor changes were produced' >&2
            exit 1
          fi
          git commit -m 'Refactor runtime ownership boundaries'
          git push origin HEAD:agent/filter-command-stdout
