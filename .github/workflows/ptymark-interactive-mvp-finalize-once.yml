name: ptymark Refactor Runtime Once

on:
  push:
    branches:
      - agent/filter-command-stdout
    paths:
      - .github/workflows/ptymark-interactive-mvp-finalize-once.yml

permissions:
  contents: write

concurrency:
  group: ptymark-refactor-runtime-once
  cancel-in-progress: false

jobs:
  refactor:
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/filter-command-stdout
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Apply responsibility refactor
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def read(path: str) -> str:
              return Path(path).read_text(encoding="utf-8")

          def write(path: str, text: str) -> None:
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(text, encoding="utf-8")

          def replace_once(path: str, old: str, new: str) -> None:
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise SystemExit(
                      f"{path}: expected one replacement marker, found {count}: {old[:120]!r}"
                  )
              write(path, text.replace(old, new, 1))

          def insert_before_once(path: str, marker: str, addition: str) -> None:
              text = read(path)
              if addition in text:
                  return
              count = text.count(marker)
              if count != 1:
                  raise SystemExit(
                      f"{path}: expected one insertion marker, found {count}: {marker[:120]!r}"
                  )
              write(path, text.replace(marker, addition + marker, 1))

          write("src/filtered_run.rs", 'use crate::command::ChildCommand;\nuse crate::config::Config;\nuse crate::runtime::{PipelineFactory, PipelineOptions};\nuse std::ffi::OsString;\nuse std::io::{self, Read, Write};\nuse std::path::PathBuf;\nuse std::process::{Child, Command, Stdio};\n\npub const HELP: &str = "\\\nFILTERED COMMAND RUNNER:\n    ptymark [--config PATH] run [OPTIONS] -- COMMAND [ARG...]\n\n    Process one non-interactive child\'s stdout through the pre-display pipeline.\n    Child stdin and stderr are inherited directly; stdout is a pipe, not a PTY.\n\nRUN OPTIONS:\n    --source              keep complete semantic blocks as source\n    --strict              fail instead of restoring source after renderer errors\n    --no-cache            disable the in-memory render cache\n    --color               allow ANSI color in terminal renderers\n    --columns N           renderer width hint\n    --config PATH         use an explicit ptymark TOML file\n    -h, --help            print this help\n\nEXAMPLE:\n    ptymark run -- command-that-prints-markdown\n";\n\npub(crate) fn run(\n    arguments: Vec<OsString>,\n    mut config_path: Option<PathBuf>,\n) -> Result<i32, String> {\n    let mut options = PipelineOptions::default();\n    let mut command = Vec::new();\n    let mut iterator = arguments.into_iter();\n\n    while let Some(argument) = iterator.next() {\n        let text = argument.to_str().ok_or_else(|| {\n            "run options must be valid UTF-8; place the child command after `--`".to_owned()\n        })?;\n        match text {\n            "-h" | "--help" => {\n                print!("{HELP}");\n                return Ok(0);\n            }\n            "--source" => options.source = true,\n            "--strict" => options.strict = true,\n            "--no-cache" => options.no_cache = true,\n            "--color" => options.color = true,\n            "--columns" => options.columns = Some(next_columns(&mut iterator)?),\n            "--config" => {\n                let path = PathBuf::from(next_value(&mut iterator, "--config")?);\n                set_config(&mut config_path, path)?;\n            }\n            "--" => {\n                command.extend(iterator);\n                break;\n            }\n            option => {\n                return Err(format!(\n                    "unknown run option `{option}`; child commands must follow `--`"\n                ));\n            }\n        }\n    }\n\n    let command = ChildCommand::from_argv(\n        command,\n        "missing child command after `run --`",\n    )?;\n    let config = Config::load(config_path.as_deref()).map_err(|error| error.to_string())?;\n    let mut pipeline = PipelineFactory::new(&config).build(options);\n\n    let mut child = Command::new(command.program())\n        .args(command.arguments())\n        .stdin(Stdio::inherit())\n        .stdout(Stdio::piped())\n        .stderr(Stdio::inherit())\n        .spawn()\n        .map_err(|error| {\n            format!("cannot execute `{}`: {error}", command.display_name())\n        })?;\n    let mut child_stdout = child\n        .stdout\n        .take()\n        .ok_or_else(|| "child stdout pipe is unavailable".to_owned())?;\n    let stdout = io::stdout();\n    let mut display = stdout.lock();\n    let mut buffer = [0_u8; 8192];\n\n    loop {\n        let count = match child_stdout.read(&mut buffer) {\n            Ok(count) => count,\n            Err(error) => {\n                terminate_child(&mut child);\n                return Err(format!("cannot read child stdout: {error}"));\n            }\n        };\n        if count == 0 {\n            break;\n        }\n        if let Err(error) = pipeline.feed(&buffer[..count], &mut display) {\n            terminate_child(&mut child);\n            return Err(error.to_string());\n        }\n    }\n\n    if let Err(error) = pipeline.finish(&mut display) {\n        terminate_child(&mut child);\n        return Err(error.to_string());\n    }\n    display.flush().map_err(|error| error.to_string())?;\n    let status = child.wait().map_err(|error| {\n        format!("cannot wait for `{}`: {error}", command.display_name())\n    })?;\n    Ok(status.code().unwrap_or(1))\n}\n\nfn set_config(target: &mut Option<PathBuf>, path: PathBuf) -> Result<(), String> {\n    if target.replace(path).is_some() {\n        return Err("`--config` may be specified only once".to_owned());\n    }\n    Ok(())\n}\n\nfn next_value(\n    iterator: &mut impl Iterator<Item = OsString>,\n    option: &str,\n) -> Result<OsString, String> {\n    iterator\n        .next()\n        .ok_or_else(|| format!("missing value after `{option}`"))\n}\n\nfn next_columns(iterator: &mut impl Iterator<Item = OsString>) -> Result<u16, String> {\n    let value = next_value(iterator, "--columns")?\n        .into_string()\n        .map_err(|_| "`--columns` requires UTF-8 digits".to_owned())?;\n    let columns = value\n        .parse::<u16>()\n        .map_err(|_| "`--columns` requires a positive integer".to_owned())?;\n    if columns == 0 {\n        return Err("`--columns` must be greater than zero".to_owned());\n    }\n    Ok(columns)\n}\n\nfn terminate_child(child: &mut Child) {\n    let _ = child.kill();\n    let _ = child.wait();\n}\n')
          write("src/main.rs", "fn main() {\n    ptymark::cli::main_entry();\n}\n")

          replace_once("src/lib.rs", "pub mod cli;\n", "pub mod cli;\nmod command;\n")
          replace_once("src/lib.rs", "pub mod filtered_run;\n", "mod filtered_run;\n")
          replace_once("src/lib.rs", "pub mod interactive;\n", "mod interactive;\n")
          replace_once("src/lib.rs", "pub mod routing;\n", "pub mod routing;\npub mod runtime;\n")
          replace_once(
              "src/lib.rs",
              "pub use routing::{\n    ConfiguredDecider, ConfiguredHandoff, DecisionRequest, EngineHandoff, EngineRequest,\n    EngineResponse, RenderDecider, RenderDecision, RenderRoute, RoutedRenderer,\n};\n",
              "pub use routing::{\n    ConfiguredDecider, ConfiguredHandoff, DecisionRequest, EngineHandoff, EngineRequest,\n    EngineResponse, RenderDecider, RenderDecision, RenderRoute, RoutedRenderer,\n};\npub use runtime::{PipelineFactory, PipelineOptions};\n",
          )

          replace_once("src/cli.rs", 'use crate::cache::{MemoryCache, NoopCache};\nuse crate::config::{Config, RenderMode};\nuse crate::detector::{FencedDetector, PassthroughDetector, SemanticDetector};\nuse crate::engine::check_configured_engines;\nuse crate::install::{\n    EnginePreference, InstallRequest, InstallState, Installer, PathProgramResolver,\n    PresenterPreference, default_install_state_path,\n};\nuse crate::pipeline::DisplayPipeline;\nuse crate::render::{RenderContext, RenderService, Renderer, SourceRenderer};\nuse crate::routing::RoutedRenderer;\nuse std::env;\nuse std::ffi::OsString;\nuse std::fs::File;\nuse std::io::{self, Read, Write};\nuse std::path::PathBuf;\nuse std::process::{self, Command};\n', 'use crate::config::Config;\nuse crate::engine::check_configured_engines;\nuse crate::install::{\n    EnginePreference, InstallRequest, InstallState, Installer, PathProgramResolver,\n    PresenterPreference, default_install_state_path,\n};\nuse crate::runtime::{PipelineFactory, PipelineOptions};\nuse std::env;\nuse std::ffi::OsString;\nuse std::fs::File;\nuse std::io::{self, Read, Write};\nuse std::path::PathBuf;\nuse std::process;\n')
          replace_once("src/cli.rs", 'pub const HELP: &str = "\\\nptymark — pre-display renderer for terminal streams\n\nUSAGE:\n    ptymark [--config PATH] preview [OPTIONS] [FILE|-]\n    ptymark [--config PATH] config check\n    ptymark [--config PATH] config show\n    ptymark [--config PATH] engine check\n    ptymark [--config PATH] install resolve [INSTALL OPTIONS]\n    ptymark install status [--state PATH]\n    ptymark [--config PATH] -- COMMAND [ARG...]\n\nPREVIEW OPTIONS:\n    --source              keep complete semantic blocks as source\n    --strict              fail instead of restoring source after renderer errors\n    --no-cache            disable the in-memory render cache\n    --color               allow ANSI color in terminal renderers\n    --columns N           renderer width hint\n    --config PATH         use an explicit ptymark TOML file\n    -h, --help            print this help\n\nINSTALL OPTIONS:\n    --config PATH         write or update this user configuration\n    --state PATH          write the resolved installation snapshot here\n    --mermaid VALUE       keep | auto | preview | source | EXECUTABLE\n    --math VALUE          keep | auto | preview | source | EXECUTABLE\n    --presenter VALUE     keep | auto | EXECUTABLE\n    --reset               start from built-in defaults instead of preserving config\n    --dry-run             print the plan without writing files\n\nGLOBAL OPTIONS:\n    --config PATH         validate and use an explicit ptymark TOML file\n    -h, --help            print this help\n    -V, --version         print the version\n\nEXAMPLES:\n    bash scripts/install.sh\n    ptymark install resolve\n    ptymark install resolve --mermaid /opt/homebrew/bin/mmdc\n    ptymark install status\n    printf \'$$\\\\nE = mc^2\\\\n$$\\\\n\' | ptymark preview\n    ptymark preview --source README.md\n    ptymark config check --config examples/ptymark.toml\n    ptymark engine check --config examples/ptymark.toml\n    ptymark -- codex\n";\n', 'pub const HELP: &str = "\\\nptymark — pre-display renderer for terminal streams\n\nUSAGE:\n    ptymark [--config PATH] preview [OPTIONS] [FILE|-]\n    ptymark [--config PATH] run [OPTIONS] -- COMMAND [ARG...]\n    ptymark [--config PATH] config check\n    ptymark [--config PATH] config show\n    ptymark [--config PATH] engine check\n    ptymark [--config PATH] install resolve [INSTALL OPTIONS]\n    ptymark install status [--state PATH]\n    ptymark [--config PATH] -- COMMAND [ARG...]\n\nRENDER OPTIONS:\n    --source              keep complete semantic blocks as source\n    --strict              fail instead of restoring source after renderer errors\n    --no-cache            disable the in-memory render cache\n    --color               allow ANSI color in terminal renderers\n    --columns N           renderer width hint\n    --config PATH         use an explicit ptymark TOML file\n    -h, --help            print this help\n\nCOMMAND MODES:\n    run -- COMMAND        pipe-oriented stdout filtering for batch/log tools\n    -- COMMAND            native PTY/ConPTY host for shells, Codex, and TUIs\n\nINSTALL OPTIONS:\n    --config PATH         write or update this user configuration\n    --state PATH          write the resolved installation snapshot here\n    --mermaid VALUE       keep | auto | preview | source | EXECUTABLE\n    --math VALUE          keep | auto | preview | source | EXECUTABLE\n    --presenter VALUE     keep | auto | EXECUTABLE\n    --reset               start from built-in defaults instead of preserving config\n    --dry-run             print the plan without writing files\n\nGLOBAL OPTIONS:\n    --config PATH         validate and use an explicit ptymark TOML file\n    -h, --help            print this help\n    -V, --version         print the version\n\nEXAMPLES:\n    bash scripts/install.sh\n    ptymark install resolve\n    ptymark install resolve --mermaid /opt/homebrew/bin/mmdc\n    ptymark install status\n    printf \'$$\\\\nE = mc^2\\\\n$$\\\\n\' | ptymark preview\n    ptymark run -- command-that-prints-markdown\n    ptymark -- \\"$SHELL\\" -l\n    ptymark -- codex\n";\n')
          replace_once(
              "src/cli.rs",
              '"missing command; use `preview`, `config`, `engine`, `install`, or `-- COMMAND`"\n                .to_owned()',
              '"missing command; use `preview`, `run`, `config`, `engine`, `install`, or `-- COMMAND`"\n                .to_owned()',
          )
          replace_once(
              "src/cli.rs",
              '        "preview" => run_preview(arguments, config_path),\n        "config" => run_config(arguments, config_path),',
              '        "preview" => run_preview(arguments, config_path),\n        "run" => crate::filtered_run::run(arguments, config_path),\n        "config" => run_config(arguments, config_path),',
          )
          replace_once(
              "src/cli.rs",
              '        "--" => run_command(arguments, config_path),',
              '        "--" => crate::interactive::run(arguments, config_path),',
          )
          replace_once("src/cli.rs", '    let config = Config::load(config_path.as_deref()).map_err(|error| error.to_string())?;\n    let detector: Box<dyn SemanticDetector> = if config.detection.math || config.detection.mermaid {\n        Box::new(FencedDetector::new(&config.detection))\n    } else {\n        Box::new(PassthroughDetector)\n    };\n\n    let source_mode = source || config.rendering.mode == RenderMode::Source;\n    let renderer: Box<dyn Renderer> = if source_mode {\n        Box::new(SourceRenderer)\n    } else {\n        Box::new(RoutedRenderer::configured(&config.engines))\n    };\n    let cache: Box<dyn crate::cache::ArtifactCache> =\n        if source_mode || no_cache || !config.cache.enabled {\n            Box::new(NoopCache::default())\n        } else {\n            Box::new(MemoryCache::new(\n                config.cache.max_entries,\n                config.cache.max_bytes,\n            ))\n        };\n\n    let service = RenderService::new(renderer, cache);\n    let context = RenderContext {\n        columns: columns.unwrap_or(config.rendering.columns),\n        color,\n        theme_fingerprint: 0,\n    };\n    let mut pipeline = DisplayPipeline::new(\n        detector,\n        service,\n        context,\n        strict || config.rendering.strict,\n    );\n', '    let config = Config::load(config_path.as_deref()).map_err(|error| error.to_string())?;\n    let mut pipeline = PipelineFactory::new(&config).build(PipelineOptions {\n        source,\n        strict,\n        no_cache,\n        color,\n        columns,\n        ..PipelineOptions::default()\n    });\n')
          replace_once("src/cli.rs", 'fn run_command(arguments: Vec<OsString>, config_path: Option<PathBuf>) -> Result<i32, String> {\n    let program = arguments\n        .first()\n        .cloned()\n        .ok_or_else(|| "missing command after `--`".to_owned())?;\n    Config::load(config_path.as_deref()).map_err(|error| error.to_string())?;\n\n    #[cfg(unix)]\n    {\n        use std::os::unix::process::CommandExt;\n        let error = Command::new(&program).args(&arguments[1..]).exec();\n        Err(format!(\n            "cannot execute `{}`: {error}",\n            program.to_string_lossy()\n        ))\n    }\n\n    #[cfg(not(unix))]\n    {\n        let status = Command::new(&program)\n            .args(&arguments[1..])\n            .status()\n            .map_err(|error| format!("cannot execute `{}`: {error}", program.to_string_lossy()))?;\n        Ok(status.code().unwrap_or(1))\n    }\n}\n', '')

          replace_once(
              "src/interactive.rs",
              "use crate::config::Config;\nuse crate::filtered_run::build_pipeline;\n",
              "use crate::command::ChildCommand;\nuse crate::config::Config;\nuse crate::runtime::{PipelineFactory, PipelineOptions};\n",
          )
          replace_once("src/interactive.rs", 'pub fn run_from(mut arguments: Vec<OsString>) -> Option<Result<i32, String>> {\n    let mut config_path = None;\n\n    while matches!(\n        arguments.first().and_then(|value| value.to_str()),\n        Some("--config")\n    ) {\n        arguments.remove(0);\n        let path = match arguments.first().cloned() {\n            Some(path) => path,\n            None => return Some(Err("missing value after `--config`".to_owned())),\n        };\n        arguments.remove(0);\n        if config_path.replace(PathBuf::from(path)).is_some() {\n            return Some(Err("`--config` may be specified only once".to_owned()));\n        }\n    }\n\n    if !matches!(\n        arguments.first().and_then(|value| value.to_str()),\n        Some("--")\n    ) {\n        return None;\n    }\n    arguments.remove(0);\n    Some(run_interactive(arguments, config_path))\n}\n\nfn run_interactive(\n    command: Vec<OsString>,\n    config_path: Option<PathBuf>,\n) -> Result<i32, String> {\n    if command.is_empty() {\n        return Err("missing command after `--`".to_owned());\n    }\n\n    let config = Config::load(config_path.as_deref()).map_err(|error| error.to_string())?;\n', 'pub(crate) fn run(\n    command: Vec<OsString>,\n    config_path: Option<PathBuf>,\n) -> Result<i32, String> {\n    let command = ChildCommand::from_argv(command, "missing command after `--`")?;\n    let config = Config::load(config_path.as_deref()).map_err(|error| error.to_string())?;\n')
          replace_once("src/interactive.rs", '    let mut pipeline = build_pipeline(\n        &config,\n        false,\n        false,\n        false,\n        stdout_is_terminal,\n        Some(initial_size.cols),\n    );\n', '    let mut pipeline = PipelineFactory::new(&config).build(PipelineOptions {\n        color: stdout_is_terminal,\n        columns: Some(initial_size.cols),\n        ..PipelineOptions::default()\n    });\n')
          replace_once("src/interactive.rs", '    fn spawn(command: &[OsString], size: PtySize) -> Result<Self, String> {\n        let system = native_pty_system();\n        let PtyPair { master, slave } = system\n            .openpty(size)\n            .map_err(|error| format!("cannot allocate native PTY: {error}"))?;\n\n        let mut builder = CommandBuilder::new(&command[0]);\n        builder.args(&command[1..]);\n', '    fn spawn(command: &ChildCommand, size: PtySize) -> Result<Self, String> {\n        let system = native_pty_system();\n        let PtyPair { master, slave } = system\n            .openpty(size)\n            .map_err(|error| format!("cannot allocate native PTY: {error}"))?;\n\n        let mut builder = CommandBuilder::new(command.program());\n        builder.args(command.arguments());\n')
          replace_once("src/interactive.rs", '                "cannot execute `{}` in native PTY: {error}",\n                command[0].to_string_lossy()\n', '                "cannot execute `{}` in native PTY: {error}",\n                command.display_name()\n')
          replace_once("src/interactive.rs", '            Ok(count) => {\n                pipeline\n                    .feed(&buffer[..count], &mut display)\n', '            Ok(count) => {\n                apply_resize_events(pipeline, resize_events);\n                pipeline\n                    .feed(&buffer[..count], &mut display)\n')
          interactive = read("src/interactive.rs")
          resize_marker = "    fn resize(&self, size: PtySize) -> Result<(), String> {"
          if "#[cfg(all(test, unix))]\n    fn resize" not in interactive:
              if interactive.count(resize_marker) != 1:
                  raise SystemExit("src/interactive.rs: resize marker mismatch")
              interactive = interactive.replace(
                  resize_marker,
                  "    #[cfg(all(test, unix))]\n" + resize_marker,
                  1,
              )
          write("src/interactive.rs", interactive)

          readme = read("README.md")
          implemented_marker = "- stream and file rendering through `ptymark preview`;\n"
          if "interactive child execution through native Unix PTY" not in readme:
              if readme.count(implemented_marker) != 1:
                  raise SystemExit("README.md: implemented marker mismatch")
              readme = readme.replace(
                  implemented_marker,
                  implemented_marker
                  + "- interactive child execution through native Unix PTY and Windows ConPTY via `ptymark -- COMMAND`;\n"
                  + "- non-interactive child-stdout filtering through `ptymark run -- COMMAND`;\n",
                  1,
              )
          readme = readme.replace(
              "- the interactive child-PTY host behind `ptymark -- COMMAND`;\n",
              "",
          )
          readme = readme.replace("- Windows ConPTY hosting.\n", "")
          old_status = (
              "`ptymark -- COMMAND` currently validates configuration and transparently executes the command. The\n"
              "command shape is reserved for the later PTY host. The reusable display pipeline and its terminal\n"
              "safety contracts are implemented and tested independently.\n"
          )
          new_status = (
              "`ptymark -- COMMAND` launches the child inside the platform-native PTY or ConPTY, forwards\n"
              "keyboard bytes, propagates terminal-size changes, routes child output through the same shared\n"
              "display pipeline as `preview` and `run`, and returns the child exit status. Full-screen and\n"
              "cursor-addressed output remains byte-exact and is deliberately not interpreted as Markdown.\n"
          )
          if old_status in readme:
              readme = readme.replace(old_status, new_status, 1)
          elif new_status not in readme:
              raise SystemExit("README.md: interactive status marker missing")
          usage_marker = "## Install from a GitHub Actions package\n"
          if "## Run an interactive command" not in readme:
              usage = """## Run an interactive command

Use the native PTY/ConPTY host for a shell, Codex, or another terminal-aware command:

```bash
ptymark -- "$SHELL" -l
ptymark -- codex
```

On Windows PowerShell:

```powershell
ptymark.exe -- pwsh.exe -NoLogo
```

The child receives a real terminal. Input bytes, Ctrl+C through terminal line discipline, terminal
resize, ANSI/OSC controls, alternate-screen applications, and the child exit status are preserved.
Only complete explicit Mermaid and block-math fences emitted in safe line-oriented output are
rendered. Full-screen TUIs remain usable, while their alternate-screen contents bypass semantic
rendering.

For batch tools whose stdout may be redirected, use the pipe-oriented mode:

```bash
ptymark run -- command-that-prints-markdown
```

`run` inherits stdin and stderr but pipes stdout; it is not intended for interactive shells or TUIs.

"""
              if readme.count(usage_marker) != 1:
                  raise SystemExit("README.md: install marker mismatch")
              readme = readme.replace(usage_marker, usage + usage_marker, 1)
          write("README.md", readme)

          design = read("documents/ptymark-design.md")
          old_scope = (
              "The product does not own keyboard input, termios, signal routing, PTY sizing,\n"
              "process supervision, shell startup files, prompt definitions, completion\n"
              "bindings, mouse reports, bracketed paste, or terminal emulation.\n\n"
              "The current `ptymark preview` command exercises the implemented display\n"
              "pipeline. `ptymark -- COMMAND` currently validates configuration and performs a\n"
              "transparent launch; the interactive PTY host and Windows ConPTY host remain\n"
              "separate follow-up work.\n"
          )
          new_scope = (
              "For one interactive session, ptymark owns a narrow native PTY/ConPTY proxy: it\n"
              "forwards keyboard bytes, mirrors terminal size, supervises the direct child, and\n"
              "filters child output before display. It does not implement terminal emulation,\n"
              "rewrite shell startup files, define prompts or completion bindings, or inspect\n"
              "mouse and bracketed-paste payloads as semantic text.\n\n"
              "`ptymark preview`, `ptymark run -- COMMAND`, and `ptymark -- COMMAND` share one\n"
              "pipeline composition root. The first reads a file or stream, the second filters\n"
              "pipe-oriented stdout, and the third hosts a terminal-aware child in the native\n"
              "Unix PTY or Windows ConPTY.\n"
          )
          if old_scope in design:
              design = design.replace(old_scope, new_scope, 1)
          elif new_scope not in design:
              raise SystemExit("documents/ptymark-design.md: scope marker missing")
          durable_marker = "Durable boundaries:\n"
          if "PipelineFactory is the only composition root" not in design:
              architecture = """Native session boundary:

```text
parent stdin  -> raw byte forwarding -> native PTY/ConPTY master -> child
terminal size -> resize monitor      -> native PTY/ConPTY master -> child
child output  -> DisplayPipeline     -> parent stdout
child status  -> ptymark exit status
```

`PipelineFactory` is the only composition root that translates resolved `Config` plus
per-invocation `PipelineOptions` into detector, renderer, cache, render context, and strictness.
`preview`, pipe execution, and PTY/ConPTY execution cannot independently choose those parts.

`ChildCommand` preserves the executable and each argument as separate OS strings for both
`std::process::Command` and `portable_pty::CommandBuilder`; no shell command string is synthesized.

"""
              if design.count(durable_marker) != 1:
                  raise SystemExit("documents/ptymark-design.md: durable marker mismatch")
              design = design.replace(durable_marker, architecture + durable_marker, 1)
          design = design.replace(
              "5. `ArtifactCache` is independent of decision and execution.\n"
              "6. `DisplayPipeline` commits rendered bytes or exact source once.\n",
              "5. `ArtifactCache` is independent of decision and execution.\n"
              "6. `PipelineFactory` owns runtime composition for every invocation mode.\n"
              "7. `DisplayPipeline` commits rendered bytes or exact source once.\n",
          )
          design = design.replace(
              "- carriage return or backspace;",
