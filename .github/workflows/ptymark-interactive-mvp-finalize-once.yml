name: ptymark Apply Runtime Refactor Once

on:
  push:
    branches:
      - agent/filter-command-stdout
    paths:
      - .github/workflows/ptymark-interactive-mvp-finalize-once.yml
      - .refactor_runtime_once.part*

permissions:
  contents: write

concurrency:
  group: ptymark-apply-runtime-refactor-once
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/filter-command-stdout
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned Rust formatter
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt
          rustup override set 1.97.0

      - name: Apply reviewed refactor payload
        shell: bash
        run: |
          set -euo pipefail
          cat .refactor_runtime_once.part00 .refactor_runtime_once.part01 .refactor_runtime_once.part02 .refactor_runtime_once.part03 .refactor_runtime_once.part04 \
            | tr -d '\n' \
            | base64 -d \
            | gzip -d \
            > /tmp/refactor_runtime_once.py
          python3 /tmp/refactor_runtime_once.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/cli.rs')
          source = path.read_text(encoding='utf-8')
          source = source.replace('    ptymark -- "$SHELL" -l\n', '    ptymark -- \\"$SHELL\\" -l\n', 1)
          path.write_text(source, encoding='utf-8')
          PY
          cargo fmt --all

      - name: Commit formatted source and remove one-time tooling
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm \
            .github/workflows/ptymark-interactive-mvp-finalize-once.yml \
            .refactor_runtime_once.part00 \
            .refactor_runtime_once.part01 \
            .refactor_runtime_once.part02 \
            .refactor_runtime_once.part03 \
            .refactor_runtime_once.part04
          git add -A
          git diff --cached --check
          cargo fmt --all -- --check
          git commit -m 'Refactor runtime ownership boundaries'
          git push origin HEAD:agent/filter-command-stdout
