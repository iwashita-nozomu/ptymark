          design = design.replace(
              "The plugin does not implement the future PTY interception host. Image placement\n"
              "and pane capability queries remain separate work.\n",
              "The plugin launches the native PTY/ConPTY host through `ptymark --`. Image placement\n"
              "and pane capability queries remain separate work.\n",
          )
          write("documents/ptymark-design.md", design)

          interactive_doc = read("documents/interactive-session.md")
          interactive_doc = interactive_doc.replace(
              "upstream implementation ../src/interactive.rs owns PTY allocation, raw mode, input forwarding, resize, output filtering, and child lifecycle.\n",
              "upstream implementation ../src/interactive.rs owns PTY allocation, raw mode, input forwarding, resize, and child lifecycle.\n"
              "upstream implementation ../src/runtime.rs owns shared display-pipeline composition.\n"
              "upstream implementation ../src/command.rs preserves executable and argument boundaries.\n",
          )
          if "## Internal ownership boundaries" not in interactive_doc:
              marker = "## Terminal ownership\n"
              addition = """## Internal ownership boundaries

- `ChildCommand` validates and preserves `program + argv`.
- `NativePtySession` owns the operating-system PTY/ConPTY handles and direct child lifecycle.
- `ResizeMonitor` mirrors parent dimensions into the child and reports the latest render width.
- `PipelineFactory` constructs the same detector, renderer, cache, and context used by every
  invocation mode.
- `DisplayPipeline` remains the only component allowed to commit replacement bytes.

The interactive host therefore depends on the shared runtime composition, not on the pipe-oriented
`run` command.

"""
              if interactive_doc.count(marker) != 1:
                  raise SystemExit("interactive-session.md: terminal ownership marker mismatch")
              interactive_doc = interactive_doc.replace(marker, addition + marker, 1)
          write("documents/interactive-session.md", interactive_doc)

          filtered_doc = read("documents/filtered-command.md")
          filtered_doc = filtered_doc.replace(
              "upstream implementation ../src/filtered_run.rs owns parsing, child process execution, and display-pipeline composition.\n",
              "upstream implementation ../src/filtered_run.rs owns parsing and pipe-oriented child process execution.\n"
              "upstream implementation ../src/runtime.rs owns shared display-pipeline composition.\n"
              "upstream implementation ../src/command.rs preserves executable and argument boundaries.\n",
          )
          if "The command uses the same `PipelineFactory`" not in filtered_doc:
              marker = "## Contract\n"
              addition = (
                  "The command uses the same `PipelineFactory` as `preview` and the native PTY/ConPTY host, "
                  "so detector, renderer, cache, context, strictness, and fallback cannot drift between modes.\n\n"
              )
              if filtered_doc.count(marker) != 1:
                  raise SystemExit("filtered-command.md: contract marker mismatch")
              filtered_doc = filtered_doc.replace(marker, addition + marker, 1)
          write("documents/filtered-command.md", filtered_doc)

          manifest = read("verification/manifest.toml")
          if 'id = "runtime.pipeline-factory"' not in manifest:
              insertion = """[[check]]
id = "runtime.pipeline-factory"
owner = "ptymark-ci"
level = "contract"
platforms = ["linux", "macos", "windows", "docker"]
command = "cargo test --locked --test runtime_factory_contract"
sources = ["src/runtime.rs", "src/command.rs", "tests/runtime_factory_contract.rs"]
evidence = ["Native Rust checks", "Canonical Docker checks"]
required = true

[[check]]
id = "pty.native-session"
owner = "ptymark-ci"
level = "integration"
platforms = ["linux", "macos", "windows", "docker"]
command = "cargo test --locked --test interactive_pty_contract -- --nocapture"
sources = ["src/interactive.rs", "src/runtime.rs", "tests/interactive_pty_contract.rs", "documents/interactive-session.md"]
evidence = ["Native Rust checks", "Canonical Docker checks", "release package smoke"]
required = true

[[check]]
id = "pty.signal-resize-unix"
owner = "ptymark-ci"
level = "integration"
platforms = ["linux", "macos", "docker"]
command = "cargo test --locked ctrl_c_byte_reaches_the_foreground_process_group && cargo test --locked real_unix_pty_resize_reaches_the_child"
sources = ["src/interactive.rs", "tests/interactive_pty_contract.rs"]
evidence = ["Native Rust checks", "Canonical Docker checks"]
required = true

"""
              marker = '[[check]]\nid = "terminal.byte-exact"\n'
              if manifest.count(marker) != 1:
                  raise SystemExit("verification/manifest.toml: terminal marker mismatch")
              manifest = manifest.replace(marker, insertion + marker, 1)
          write("verification/manifest.toml", manifest)

          contract = read("tests/verification_manifest_contract.rs")
          if '"runtime.pipeline-factory"' not in contract:
              marker = '    "rust.tests",\n'
              if contract.count(marker) != 1:
                  raise SystemExit("verification contract: rust.tests marker mismatch")
              contract = contract.replace(
                  marker,
                  marker
                  + '    "runtime.pipeline-factory",\n'
                  + '    "pty.native-session",\n'
                  + '    "pty.signal-resize-unix",\n',
                  1,
              )
          write("tests/verification_manifest_contract.rs", contract)

          verification = read("verification/README.md")
          if "`runtime.pipeline-factory`" not in verification:
              verification = verification.replace(
                  "- `rust.tests`\n",
                  "- `rust.tests`\n"
                  "- `runtime.pipeline-factory`\n"
                  "- `pty.native-session`\n"
                  "- `pty.signal-resize-unix`\n",
                  1,
              )
              verification += """

## Runtime and native-session evidence

- `runtime.pipeline-factory` proves that source mode, cache policy, renderer selection, context, and
  strictness are assembled through one composition root.
- `pty.native-session` launches real child processes inside the operating-system Unix PTY or Windows
  ConPTY and verifies terminal detection, semantic rendering, alternate-screen bypass, and exit
  status.
- `pty.signal-resize-unix` verifies a real foreground process receives Ctrl+C through terminal line
  discipline and a real Unix PTY reports resized geometry to its child.

No in-memory or fake terminal can satisfy these checks.
"""
          write("verification/README.md", verification)

          workflow = read(".github/workflows/ptymark-ci.yml")
          design_path = '      - "documents/ptymark-design.md"\n'
          if '      - "documents/interactive-session.md"\n' not in workflow:
              count = workflow.count(design_path)
              if count != 2:
                  raise SystemExit(f"ptymark-ci.yml: expected two design path markers, found {count}")
              workflow = workflow.replace(
                  design_path,
                  design_path
                  + '      - "documents/interactive-session.md"\n'
                  + '      - "documents/filtered-command.md"\n',
              )
          native_tests = (
              "      - name: Run tests\n"
              "        run: cargo test --locked --all-targets\n"
          )
          if "Run native PTY and ConPTY integration contract" not in workflow:
              if workflow.count(native_tests) != 1:
                  raise SystemExit("ptymark-ci.yml: native test marker mismatch")
              workflow = workflow.replace(
                  native_tests,
                  native_tests
                  + "\n"
                  + "      - name: Run native PTY and ConPTY integration contract\n"
                  + "        run: cargo test --locked --test interactive_pty_contract -- --nocapture\n",
                  1,
              )
          docker_tests = (
              "      - name: Run Rust tests in Docker\n"
              "        run: >-\n"
              "          docker compose\n"
              "          --env-file docker/ptymark-versions.env\n"
              "          --file docker/ptymark-compose.yaml\n"
              "          run --rm --no-TTY dev cargo test --locked --all-targets\n"
          )
          if "Run native PTY MVP tests in Docker" not in workflow:
              if workflow.count(docker_tests) != 1:
                  raise SystemExit("ptymark-ci.yml: Docker test marker mismatch")
              workflow = workflow.replace(
                  docker_tests,
                  docker_tests
                  + "\n"
                  + "      - name: Run native PTY MVP tests in Docker\n"
                  + "        run: >-\n"
                  + "          docker compose\n"
                  + "          --env-file docker/ptymark-versions.env\n"
                  + "          --file docker/ptymark-compose.yaml\n"
                  + "          run --rm --no-TTY dev cargo test --locked --test interactive_pty_contract -- --nocapture\n",
                  1,
              )
          write(".github/workflows/ptymark-ci.yml", workflow)
          PY

      - name: Format and validate the refactor
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          cargo check --all-targets
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets
          git diff --check

      - name: Remove the one-time workflow and push
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/ptymark-interactive-mvp-finalize-once.yml
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git diff --cached --check
          git commit -m "Refactor runtime composition and session boundaries"
          git push origin HEAD:agent/filter-command-stdout
