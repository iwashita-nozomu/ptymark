# @dependency-start
# contract workflow
# responsibility Temporarily captures the failing AgentCanon PR gate from an exact clone of current main.
# upstream implementation ../../tools/ci/check_agent_canon_pr.sh shared AgentCanon PR gate
# @dependency-end

name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: diagnose-agent-canon-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent-canon-pr:
    name: AgentCanon PR Gate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Clone exact current main
        shell: bash
        run: |
          set -euo pipefail
          git clone --quiet --depth=1 --branch main \
            https://github.com/${GITHUB_REPOSITORY}.git "$RUNNER_TEMP/ptymark-main"
          cd "$RUNNER_TEMP/ptymark-main"
          AGENT_CANON_REPO_TOKEN='' AGENT_CANON_REPO_SSH_KEY='' \
            bash .github/scripts/checkout_agent_canon_submodule.sh >/dev/null

      - name: Install gate dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq >/dev/null
          sudo apt-get install -y -qq graphviz ripgrep >/dev/null
          cd "$RUNNER_TEMP/ptymark-main"
          PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps \
            bash docker/install_python_dependencies.sh "$PWD" >/dev/null

      - name: Capture failing gate tail
        shell: bash
        run: |
          set +e
          cd "$RUNNER_TEMP/ptymark-main"
          make agent-canon-pr-check >"$RUNNER_TEMP/agent-canon-pr.log" 2>&1
          status=$?
          echo "AGENT_CANON_PR_GATE_STATUS=$status"
          tail -n 120 "$RUNNER_TEMP/agent-canon-pr.log"
          exit "$status"
