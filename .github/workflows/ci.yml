# @dependency-start
# contract workflow
# responsibility Defines ci YAML configuration.
# upstream implementation ../../tools/ci/run_all_checks.sh repository CI entrypoint
# upstream implementation ../../Makefile ci target contract
# upstream environment ../../docker/install_python_dependencies.sh central Python dependency installer
# upstream implementation ../scripts/checkout_agent_canon_submodule.sh private AgentCanon checkout gate
# @dependency-end
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-ci:
    name: Repository CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false
      - name: Checkout AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz ripgrep

      - name: Install pip dependencies
        run: PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"

      - name: Run repository CI
        run: make ci

  agent-canon-pr:
    name: AgentCanon PR Gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false
      - name: Checkout AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz ripgrep

      - name: Install pip dependencies
        run: PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"

      - name: Run shared canon PR gate
        run: make agent-canon-pr-check

  fresh-clone-acceptance:
    name: Fresh Clone Acceptance
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false
      - name: Checkout AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y graphviz ripgrep

      - name: Install pip dependencies
        run: PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"

      - name: Run fresh clone acceptance
        run: make fresh-clone-check
