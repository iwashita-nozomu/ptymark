# @dependency-start
# contract workflow
# responsibility Captures the Rust 1.97 normalized patch and post-normalization test diagnostics once.
# upstream workflow ./ptymark-clippy-diagnostic-once.yml captures initial lint findings.
# upstream implementation ../../src/config.rs implements configuration abstractions.
# upstream implementation ../../src/detector.rs implements explicit fence detection.
# downstream workflow ./ptymark-ci.yml remains the canonical repeatable validation path.
# @dependency-end
name: ptymark Normalized Diagnostic Once

on:
  pull_request:
    branches: [main, master]
    paths:
      - .github/workflows/ptymark-normalized-diagnostic-once.yml
      - src/**
      - tests/**
      - Cargo.toml
      - Cargo.lock

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-normalized-diagnostic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Normalize and capture validation
        shell: bash
        run: |
          set +e
          cargo clippy --fix --locked --all-targets --allow-dirty --allow-staged -- -D warnings > normalize.log 2>&1
          normalize_status=$?
          cargo fmt --all >> normalize.log 2>&1
          git diff -- src tests > normalized.patch
          cargo fmt --all -- --check > fmt.log 2>&1
          fmt_status=$?
          cargo clippy --locked --all-targets -- -D warnings > clippy.log 2>&1
          clippy_status=$?
          cargo test --locked --all-targets > test.log 2>&1
          test_status=$?
          printf '%s\n' "$normalize_status" > normalize.exit
          printf '%s\n' "$fmt_status" > fmt.exit
          printf '%s\n' "$clippy_status" > clippy.exit
          printf '%s\n' "$test_status" > test.exit
          cat normalize.log
          cat fmt.log
          cat clippy.log
          cat test.log
          exit 0

      - name: Upload normalized diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-normalized-diagnostics
          path: |
            normalized.patch
            normalize.log
            normalize.exit
            fmt.log
            fmt.exit
            clippy.log
            clippy.exit
            test.log
            test.exit
          if-no-files-found: error
          retention-days: 3

      - name: Preserve validation status
        run: |
          test "$(cat normalize.exit)" = 0
          test "$(cat fmt.exit)" = 0
          test "$(cat clippy.exit)" = 0
          test "$(cat test.exit)" = 0
