name: Finalize AgentCanon Submodule Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/agent-canon-finalize-once.yml

permissions:
  contents: write

concurrency:
  group: finalize-agent-canon-submodule
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-agent-canon-submodule
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Update pin and synchronized root copy
        shell: bash
        env:
          PUSH_TOKEN: ${{ github.token }}
          AGENT_CANON_COMMIT: c9246b5dc6259ccbf71adf6ef7a0bc0ae29a7cbd
        run: |
          set -euo pipefail
          git submodule sync vendor/agent-canon
          git submodule update --init --recursive vendor/agent-canon
          git -C vendor/agent-canon fetch origin main
          git -C vendor/agent-canon checkout "$AGENT_CANON_COMMIT"

          cp \
            vendor/agent-canon/.github/PULL_REQUEST_TEMPLATE/agent_canon.md \
            .github/PULL_REQUEST_TEMPLATE/agent_canon.md
          rm .github/workflows/agent-canon-finalize-once.yml

          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            vendor/agent-canon \
            .github/PULL_REQUEST_TEMPLATE/agent_canon.md \
            .github/workflows/agent-canon-finalize-once.yml
          git commit -m 'Align AgentCanon pin and root template'
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:agent/fix-agent-canon-submodule
