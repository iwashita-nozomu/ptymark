# @dependency-start
# contract workflow
# responsibility Applies and validates the one-time re-probe semantics correction for installation-time engine replacement.
# upstream implementation ../../src/install.rs owns installation-time engine resolution.
# upstream test ../../tests/install_reprobe_contract.rs specifies re-probe behavior.
# downstream workflow ./ptymark-ci.yml remains the repeatable validation path.
# @dependency-end
name: ptymark Installer Reprobe Fix Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ptymark-installer-reprobe-fix-once.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Apply re-probe semantics
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/install.rs')
          source = path.read_text(encoding='utf-8')

          old_candidate = '''                let candidate = if existing_config {
                      existing.path
                  } else {
                      default_program
                  };
          '''
          new_candidate = '''                let candidate = default_program;
          '''
          if source.count(old_candidate) != 1:
              raise SystemExit(f'expected one engine candidate block, found {source.count(old_candidate)}')
          source = source.replace(old_candidate, new_candidate, 1)

          old_origin = '''                        if existing_config {
                              ResolutionOrigin::Existing
                          } else {
                              ResolutionOrigin::PathSearch
                          },
          '''
          new_origin = '''                        ResolutionOrigin::PathSearch,
          '''
          if source.count(old_origin) < 1:
              raise SystemExit('engine origin block not found')
          source = source.replace(old_origin, new_origin, 1)

          old_presenter = '''            PresenterPreference::Keep | PresenterPreference::Auto => (
                      if existing_config {
                          existing_path
                      } else {
                          PathBuf::from("chafa")
                      },
                      required_external,
                      if existing_config {
                          ResolutionOrigin::Existing
                      } else {
                          ResolutionOrigin::PathSearch
                      },
                  ),
          '''
          new_presenter = '''            PresenterPreference::Keep | PresenterPreference::Auto => (
                      PathBuf::from("chafa"),
                      required_external,
                      ResolutionOrigin::PathSearch,
                  ),
          '''
          if source.count(old_presenter) != 1:
              raise SystemExit(f'expected one presenter re-probe block, found {source.count(old_presenter)}')
          source = source.replace(old_presenter, new_presenter, 1)
          path.write_text(source, encoding='utf-8')
          PY

      - name: Normalize and validate
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets

      - name: Commit passing correction
        env:
          PUSH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/install.rs tests/install_reprobe_contract.rs
          git commit -m "Make installer re-probe replace stale paths"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${HEAD_BRANCH}"
