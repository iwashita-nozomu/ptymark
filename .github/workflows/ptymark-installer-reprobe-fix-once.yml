# @dependency-start
# contract workflow
# responsibility Applies and validates the one-time re-probe semantics correction for installation-time engine replacement.
# upstream implementation ../../src/install.rs owns installation-time engine resolution.
# upstream test ../../tests/install_reprobe_contract.rs specifies re-probe behavior.
# downstream workflow ./ptymark-ci.yml remains the repeatable validation path.
# @dependency-end
name: ptymark Installer Reprobe Fix Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ptymark-installer-reprobe-fix-once.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Apply re-probe semantics
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path('src/install.rs')
          source = path.read_text(encoding='utf-8')

          source, candidate_count = re.subn(
              r'let candidate = if existing_config \{\s*existing\.path\s*\} else \{\s*default_program\s*\};',
              'let candidate = default_program;',
              source,
              count=1,
          )
          if candidate_count != 1:
              raise SystemExit(f'expected one engine candidate block, found {candidate_count}')

          source, origin_count = re.subn(
              r'if existing_config \{\s*ResolutionOrigin::Existing\s*\} else \{\s*ResolutionOrigin::PathSearch\s*\},',
              'ResolutionOrigin::PathSearch,',
              source,
              count=1,
          )
          if origin_count != 1:
              raise SystemExit(f'expected one engine origin block, found {origin_count}')

          presenter_pattern = re.compile(
              r'PresenterPreference::Keep \| PresenterPreference::Auto => \(\s*'
              r'if existing_config \{\s*existing_path\s*\} else \{\s*'
              r'PathBuf::from\("chafa"\)\s*\},\s*required_external,\s*'
              r'if existing_config \{\s*ResolutionOrigin::Existing\s*\} else \{\s*'
              r'ResolutionOrigin::PathSearch\s*\},\s*\),'
          )
          presenter_replacement = '''PresenterPreference::Keep | PresenterPreference::Auto => (
                  PathBuf::from("chafa"),
                  required_external,
                  ResolutionOrigin::PathSearch,
              ),'''
          source, presenter_count = presenter_pattern.subn(
              presenter_replacement,
              source,
              count=1,
          )
          if presenter_count != 1:
              raise SystemExit(f'expected one presenter re-probe block, found {presenter_count}')

          path.write_text(source, encoding='utf-8')
          PY

      - name: Normalize and validate
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets

      - name: Commit passing correction
        env:
          PUSH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/install.rs tests/install_reprobe_contract.rs
          git commit -m "Make installer re-probe replace stale paths"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${HEAD_BRANCH}"
