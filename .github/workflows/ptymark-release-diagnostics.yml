# @dependency-start
# contract workflow
# responsibility Captures bounded release-blocker diagnostics for formatting and macOS package smoke behavior.
# upstream implementation ../../scripts/package-release.sh defines package assembly and smoke tests.
# downstream implementation ./ptymark-ci.yml consumes the resulting fixes through the canonical product matrix.
# @dependency-end
# Temporary release-blocker diagnostics. Remove after applying the generated fixes.
name: ptymark Release Diagnostics

on:
  push:
    branches:
      - agent/filter-command-stdout
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rustfmt-patch:
    name: Generate rustfmt patch
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Install pinned Rust formatter
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt
          rustup override set 1.97.0

      - name: Generate formatter patch
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          git diff --binary -- . ':!.github/workflows/ptymark-release-diagnostics.yml' > rustfmt.patch
          test -s rustfmt.patch || printf '%s\n' '# no formatter changes' > rustfmt.patch

      - name: Upload formatter patch
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-rustfmt-patch
          path: rustfmt.patch
          if-no-files-found: error
          retention-days: 1

  macos-package:
    name: Capture macOS package failure
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup override set 1.97.0

      - name: Build release executable
        run: cargo build --release --locked

      - name: Capture package diagnostics and smoke outputs
        id: package
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          source = Path('scripts/package-release.sh').read_text()
          cleanup = "trap 'rm -rf \"$smoke_root\"' EXIT"
          allocation = 'smoke_root="$(mktemp -d)"'
          if cleanup not in source or allocation not in source:
              raise SystemExit('package smoke setup was not found')
          replacement = '''smoke_root="$repo_root/diagnostic-tmp/smoke-root"
          rm -rf "$smoke_root"
          mkdir -p "$smoke_root"'''
          source = source.replace(cleanup, 'trap : EXIT').replace(allocation, replacement)
          Path('scripts/package-release-debug.sh').write_text(source)
          PY
          chmod +x scripts/package-release-debug.sh
          mkdir -p diagnostic-tmp macos-capture
          set +e
          bash -x scripts/package-release-debug.sh target/release/ptymark dist > macos-package.log 2>&1
          status=$?
          set -e
          {
            printf 'exit_status=%s\n' "$status"
            printf '\nsmoke files:\n'
            find diagnostic-tmp -maxdepth 4 -type f -print | LC_ALL=C sort
            printf '\ndist files:\n'
            find dist -maxdepth 4 -print 2>/dev/null | LC_ALL=C sort
          } > macos-package-tree.txt
          tar -czf macos-capture/smoke-root.tar.gz -C diagnostic-tmp .
          for path in $(find diagnostic-tmp -type f -name '*.out' -print); do
            base=$(basename "$path")
            cp "$path" "macos-capture/$base"
            od -An -tx1 -v "$path" > "macos-capture/$base.hex"
          done
          printf 'status=%s\n' "$status" >> "$GITHUB_OUTPUT"

      - name: Upload macOS package diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-macos-package-diagnostics
          path: |
            macos-package.log
            macos-package-tree.txt
            macos-capture/**
            dist/**
          if-no-files-found: error
          retention-days: 1

      - name: Record captured package failure
        shell: bash
        env:
          PACKAGE_STATUS: ${{ steps.package.outputs.status }}
        run: |
          test -n "$PACKAGE_STATUS"
          echo "captured package exit status: $PACKAGE_STATUS"
