name: ptymark Format Once

on:
  push:
    branches:
      - agent/minimal-pre-display-core
    paths:
      - .github/workflows/ptymark-format-once.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false
          fetch-depth: 0
      - name: Install pinned Rust
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0
      - name: Normalize and validate
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets
      - name: Commit normalized Rust sources
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- '*.rs'; then
            echo 'No Rust formatting changes were required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -- '*.rs'
          git commit -m 'Normalize Rust sources for installer redesign'
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_REF_NAME}"
