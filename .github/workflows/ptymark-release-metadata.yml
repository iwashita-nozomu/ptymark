# @dependency-start
# contract workflow
# responsibility Validates version, packaging, and release metadata on main and pull requests.
# upstream design ../../documents/release.md publication contract
# upstream implementation ../../scripts/check-release-metadata.py tree validator
# upstream implementation ../../tests/tools/test_release_metadata.py metadata tests
# downstream implementation ./ptymark-release.yml publication workflow
# @dependency-end

name: ptymark Release Metadata

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ptymark-release-metadata-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate release tree
        run: python scripts/check-release-metadata.py

      - name: Run release metadata contracts
        run: python -m unittest tests.tools.test_release_metadata -v

  repair-release-candidate:
    name: Repair release candidate
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/filter-command-stdout'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out release-candidate branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt --component clippy
          rustup override set 1.97.0

      - name: Apply bounded release-candidate fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 .github/scripts/apply_release_candidate_fixes.py
          cargo fmt --all

      - name: Validate repaired release candidate
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked
          bash -n scripts/package-release.sh
          python3 -m unittest tests.tools.test_release_metadata
          python3 scripts/check-release-metadata.py --tag v0.1.0-alpha.1

      - name: Package validated repaired tree
        shell: bash
        run: |
          set -euo pipefail
          artifact="$RUNNER_TEMP/ptymark-repaired-release-tree"
          rm -rf "$artifact"
          mkdir -p "$artifact/tree"
          git diff --binary > "$artifact/release-candidate-fixes.patch"
          git diff --name-only > "$artifact/changed-files.txt"
          git diff --name-status > "$artifact/changed-status.txt"
          tar --exclude=.git -czf "$artifact/repaired-tree.tar.gz" .

      - name: Upload validated repaired tree
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-repaired-release-tree
          path: ${{ runner.temp }}/ptymark-repaired-release-tree/**
          if-no-files-found: error
          retention-days: 1
