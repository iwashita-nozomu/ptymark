# @dependency-start
# contract workflow
# responsibility Validates version, packaging, and release metadata on main and release-related pull requests.
# upstream design ../../documents/release.md publication contract
# upstream implementation ../../scripts/check-release-metadata.py tree validator
# upstream implementation ../../tests/tools/test_release_metadata.py metadata tests
# downstream implementation ./ptymark-release.yml publication workflow
# @dependency-end

name: ptymark Release Metadata

on:
  push:
    branches:
      - main
      - "agent/**"
    paths:
      - Cargo.toml
      - Cargo.lock
      - CHANGELOG.md
      - SECURITY.md
      - documents/release.md
      - "release-notes/**"
      - scripts/check-release-metadata.py
      - scripts/build-release-manifest.py
      - scripts/package-release.sh
      - scripts/package-release.ps1
      - tests/tools/test_release_metadata.py
      - ".github/workflows/ptymark-release*.yml"
      - .release-candidate-placeholder
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - CHANGELOG.md
      - SECURITY.md
      - documents/release.md
      - "release-notes/**"
      - scripts/check-release-metadata.py
      - scripts/build-release-manifest.py
      - scripts/package-release.sh
      - scripts/package-release.ps1
      - tests/tools/test_release_metadata.py
      - ".github/workflows/ptymark-release*.yml"
      - .release-candidate-placeholder
  workflow_dispatch:

concurrency:
  group: ptymark-release-metadata-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Validate release tree
        run: python scripts/check-release-metadata.py

      - name: Run release metadata contracts
        run: python -m unittest tests.tools.test_release_metadata -v

  export-engine-test-fixture:
    name: Export atomic engine test fixture repair
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt
          rustup override set 1.97.0

      - name: Publish test executables atomically
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/engine.rs')
          text = path.read_text(encoding='utf-8')
          old_import = '''    use std::fs;
    use std::os::unix::fs::PermissionsExt;
'''
          new_import = '''    use std::fs;
    use std::io::Write;
    use std::os::unix::fs::PermissionsExt;
'''
          old_helper = '''    fn executable(path: &Path, source: &str) {
        fs::write(path, source).expect("write executable");
        let mut permissions = fs::metadata(path).expect("metadata").permissions();
        permissions.set_mode(0o755);
        fs::set_permissions(path, permissions).expect("chmod");
    }
'''
          new_helper = '''    fn executable(path: &Path, source: &str) {
        let staged = path.with_extension("tmp");
        {
            let mut file = fs::File::create(&staged).expect("create staged executable");
            file.write_all(source.as_bytes())
                .expect("write staged executable");
            file.sync_all().expect("sync staged executable");
        }
        let mut permissions = fs::metadata(&staged).expect("metadata").permissions();
        permissions.set_mode(0o755);
        fs::set_permissions(&staged, permissions).expect("chmod");
        fs::rename(&staged, path).expect("publish executable");
    }
'''
          if text.count(old_import) != 1:
              raise SystemExit('engine test import insertion point did not match exactly once')
          if text.count(old_helper) != 1:
              raise SystemExit('engine executable helper did not match exactly once')
          text = text.replace(old_import, new_import, 1).replace(old_helper, new_helper, 1)
          path.write_text(text, encoding='utf-8')
          PY
          cargo fmt --all
          cargo fmt --all -- --check
          for attempt in $(seq 1 25); do
            cargo test --locked --lib engine::tests::mathjax_cli_is_presented_through_chafa
          done
          git diff --check

      - name: Upload validated engine source
        uses: actions/upload-artifact@v7
        with:
          name: engine-test-fixture-repair
          path: src/engine.rs
          if-no-files-found: error
          retention-days: 1
