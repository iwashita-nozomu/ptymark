name: ptymark CI

on:
  push:
    branches:
      - main
      - "agent/**"
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "GNUmakefile"
      - "ptymark.mk"
      - "src/**"
      - "tests/**"
      - "plugin/**"
      - "renderers/**"
      - "scripts/**"
      - "docker/ptymark*"
      - "examples/**"
      - "documents/ptymark-design.md"
      - "documents/ptymark-installer.md"
      - "README.md"
      - ".github/workflows/ptymark-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "GNUmakefile"
      - "ptymark.mk"
      - "src/**"
      - "tests/**"
      - "plugin/**"
      - "renderers/**"
      - "scripts/**"
      - "docker/ptymark*"
      - "examples/**"
      - "documents/ptymark-design.md"
      - "documents/ptymark-installer.md"
      - "README.md"
      - ".github/workflows/ptymark-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ptymark-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: Native Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        shell: bash
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets

  windows-installers:
    name: Windows PowerShell, cmd, and WinBash installers
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        shell: bash
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Install pinned Node runtime
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Parse installer frontends
        shell: pwsh
        run: |
          foreach ($path in @(
            'scripts/installer.ps1',
            'scripts/install.ps1',
            'scripts/install-managed-bundle.ps1'
          )) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              throw "$path parser errors: $($errors -join '; ')"
            }
          }
          bash -n scripts/installer.sh scripts/install.sh scripts/install-managed-bundle.sh

      - name: Build native binary
        run: cargo build --locked

      - name: Locate installed Chromium browser
        id: browser
        shell: pwsh
        run: |
          $candidates = @()
          if (${env:ProgramFiles(x86)}) {
            $candidates += Join-Path ${env:ProgramFiles(x86)} 'Microsoft\Edge\Application\msedge.exe'
            $candidates += Join-Path ${env:ProgramFiles(x86)} 'Google\Chrome\Application\chrome.exe'
          }
          if ($env:ProgramFiles) {
            $candidates += Join-Path $env:ProgramFiles 'Microsoft\Edge\Application\msedge.exe'
            $candidates += Join-Path $env:ProgramFiles 'Google\Chrome\Application\chrome.exe'
          }
          $browser = $candidates | Where-Object { Test-Path $_ -PathType Leaf } | Select-Object -First 1
          if (-not $browser) { throw 'No Chromium-compatible browser is installed on the Windows runner' }
          "path=$browser" >> $env:GITHUB_OUTPUT

      - name: Install and render with isolated defaults
        shell: pwsh
        env:
          BROWSER_PATH: ${{ steps.browser.outputs.path }}
        run: |
          $root = Join-Path $env:RUNNER_TEMP 'ptymark-managed-windows'
          Remove-Item $root -Recurse -Force -ErrorAction SilentlyContinue
          $binary = (Resolve-Path 'target/debug/ptymark.exe').Path
          $bundle = Join-Path $root 'bundle'
          $config = Join-Path $root 'config.toml'
          $state = Join-Path $root 'state.toml'

          & ./scripts/installer.ps1 `
            -SkipCore `
            -Binary $binary `
            -Managed always `
            -ManagedRoot $bundle `
            -Config $config `
            -State $state `
            -Browser $env:BROWSER_PATH `
            -SkipBrowserDownload
          if ($LASTEXITCODE -ne 0) { throw "installer.ps1 failed with $LASTEXITCODE" }

          & $binary install status --state $state
          if ($LASTEXITCODE -ne 0) { throw 'install status failed' }
          & $binary --config $config engine check
          if ($LASTEXITCODE -ne 0) { throw 'engine check failed' }

          $mermaid = @('```mermaid', 'flowchart LR', '  A --> B', '```') -join "`n"
          $mermaidOutput = $mermaid | & $binary --config $config preview
          if ($LASTEXITCODE -ne 0 -or -not $mermaidOutput) { throw 'Mermaid render failed' }
          if (($mermaidOutput -join "`n") -match '```mermaid') { throw 'Mermaid source was not replaced' }

          $math = @('$$', 'E = mc^2', '$$') -join "`n"
          $mathOutput = $math | & $binary --config $config preview
          if ($LASTEXITCODE -ne 0 -or -not $mathOutput) { throw 'Math render failed' }
          if (($mathOutput -join "`n") -match '^\$\$$') { throw 'Math source was not replaced' }

      - name: Run Git Bash frontend with native path conversion
        shell: bash
        run: |
          binary="$(cygpath -u "$GITHUB_WORKSPACE/target/debug/ptymark.exe")"
          root="$(cygpath -u "$RUNNER_TEMP")/ptymark-git-bash"
          rm -rf "$root"
          bash scripts/installer.sh \
            --skip-core \
            --binary "$binary" \
            --managed never \
            --mermaid preview \
            --math preview \
            --config "$root/config.toml" \
            --state "$root/state.toml"
          grep -F 'backend = "preview"' "$root/config.toml" >/dev/null
          grep -F 'config_path = "' "$root/state.toml" >/dev/null

      - name: Run cmd.exe frontend
        shell: cmd
        run: >-
          scripts\installer.cmd
          -SkipCore
          -Binary "%GITHUB_WORKSPACE%\target\debug\ptymark.exe"
          -Managed never
          -Mermaid preview
          -Math preview
          -Config "%RUNNER_TEMP%\ptymark-cmd\config.toml"
          -State "%RUNNER_TEMP%\ptymark-cmd\state.toml"

  canonical-docker:
    name: Canonical Docker checks
    runs-on: ubuntu-24.04
    timeout-minutes: 75

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Build canonical image
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          build --pull

      - name: Check Rust formatting in Docker
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev cargo fmt --all -- --check

      - name: Run Clippy in Docker
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev cargo clippy --locked --all-targets -- -D warnings

      - name: Run Rust tests in Docker
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev cargo test --locked --all-targets

      - name: Run WezTerm plugin smoke
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev lua5.4 tests/plugin_smoke.lua

      - name: Check product scripts
        shell: bash
        run: |
          compose=(docker compose --env-file docker/ptymark-versions.env --file docker/ptymark-compose.yaml)
          "${compose[@]}" run --rm --no-TTY dev \
            bash -n scripts/installer.sh scripts/install.sh scripts/install-managed-bundle.sh tests/install_smoke.sh
          "${compose[@]}" run --rm --no-TTY dev \
            shellcheck scripts/installer.sh scripts/install.sh scripts/install-managed-bundle.sh tests/install_smoke.sh
          "${compose[@]}" run --rm --no-TTY dev \
            node --check renderers/managed/mathjax-cli.mjs
          "${compose[@]}" run --rm --no-TTY dev \
            node --check renderers/managed/ansi-presenter.mjs

      - name: Build and run installer contract smoke
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev
          bash -lc 'cargo build --locked && bash tests/install_smoke.sh'

      - name: Run isolated managed-engine smoke
        shell: bash
        run: |
          compose=(docker compose --env-file docker/ptymark-versions.env --file docker/ptymark-compose.yaml)
          "${compose[@]}" run --rm --no-TTY dev bash -lc '
            set -euo pipefail
            cargo build --locked
            root="$(mktemp -d)"
            binary="${CARGO_TARGET_DIR}/debug/ptymark"
            bash scripts/installer.sh \
              --skip-core \
              --binary "$binary" \
              --managed always \
              --managed-root "$root/bundle" \
              --browser /usr/bin/chromium \
              --skip-browser-download \
              --config "$root/config.toml" \
              --state "$root/state.toml"
            printf "%s\n" "```mermaid" "flowchart LR" "A --> B" "```" \
              | "$binary" --config "$root/config.toml" preview --columns 48 - >"$root/mermaid.out"
            test -s "$root/mermaid.out"
            ! grep -F "```mermaid" "$root/mermaid.out"
            printf "%s\n" "$$" "E = mc^2" "$$" \
              | "$binary" --config "$root/config.toml" preview --columns 48 - >"$root/math.out"
            test -s "$root/math.out"
            ! grep -F "E = mc^2" "$root/math.out"
          '

      - name: Check selected renderer engines
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev bash scripts/check-ptymark-renderers.sh
