name: ptymark CI

on:
  push:
    branches:
      - main
      - "agent/**"
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "GNUmakefile"
      - "ptymark.mk"
      - "src/**"
      - "tests/**"
      - "plugin/**"
      - "renderers/**"
      - "scripts/check-ptymark-renderers.sh"
      - "docker/ptymark*"
      - "examples/ptymark.toml"
      - "documents/ptymark-design.md"
      - "README.md"
      - ".github/workflows/ptymark-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "GNUmakefile"
      - "ptymark.mk"
      - "src/**"
      - "tests/**"
      - "plugin/**"
      - "renderers/**"
      - "scripts/check-ptymark-renderers.sh"
      - "docker/ptymark*"
      - "examples/ptymark.toml"
      - "documents/ptymark-design.md"
      - "README.md"
      - ".github/workflows/ptymark-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ptymark-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: Native Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets

  canonical-docker:
    name: Canonical Docker checks
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Build canonical image
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          build --pull

      - name: Run product checks
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev make ptymark-check-local
