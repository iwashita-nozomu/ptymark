# @dependency-start
# contract workflow
# responsibility Runs the cross-platform ptymark acceptance matrix.
# upstream design ../../documents/ptymark-design.md terminal-safety architecture
# upstream environment ../../rust-toolchain.toml supported Rust toolchain
# downstream design ../../verification/README.md merge evidence policy
# downstream implementation ../../tests/verification_manifest_contract.rs catalog validation
# @dependency-end

name: ptymark CI

on:
  push:
    branches:
      - main
      - "agent/**"
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "GNUmakefile"
      - "ptymark.mk"
      - "src/**"
      - "tests/**"
      - "plugin/**"
      - "renderers/**"
      - "scripts/**"
      - "distribution/**"
      - "compat/**"
      - "verification/**"
      - "docker/ptymark*"
      - "examples/**"
      - "documents/ptymark-design.md"
      - "documents/ptymark-installer.md"
      - "documents/shell-plugin-compatibility.md"
      - "README.md"
      - ".github/workflows/ptymark-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "GNUmakefile"
      - "ptymark.mk"
      - "src/**"
      - "tests/**"
      - "plugin/**"
      - "renderers/**"
      - "scripts/**"
      - "distribution/**"
      - "compat/**"
      - "verification/**"
      - "docker/ptymark*"
      - "examples/**"
      - "documents/ptymark-design.md"
      - "documents/ptymark-installer.md"
      - "documents/shell-plugin-compatibility.md"
      - "README.md"
      - ".github/workflows/ptymark-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ptymark-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: Native Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        shell: bash
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked --all-targets

      - name: Verify Unix shell profiles and hook environment coexistence
        if: runner.os == 'Linux'
        shell: bash
        run: |
          cargo build --locked
          bash tests/shell_profile_coexistence.sh target/debug/ptymark

  windows-frontends:
    name: Windows PowerShell, cmd, WinBash, and profile coexistence
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        shell: bash
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup override set 1.97.0

      - name: Parse installer and package frontends
        shell: pwsh
        run: |
          foreach ($path in @(
            'scripts/installer.ps1',
            'scripts/install.ps1',
            'scripts/install-managed-bundle.ps1',
            'scripts/package-release.ps1',
            'distribution/install.ps1',
            'tests/windows_managed_renderer_smoke.ps1',
            'tests/windows_shell_profile_coexistence.ps1'
          )) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $path),
              [ref]$tokens,
              [ref]$errors
            ) | Out-Null
            if ($errors.Count -gt 0) {
              throw "$path parser errors: $($errors -join '; ')"
            }
          }
          bash -n `
            scripts/installer.sh `
            scripts/install.sh `
            scripts/install-managed-bundle.sh `
            scripts/package-release.sh `
            distribution/install.sh `
            tests/managed_renderer_smoke.sh `
            tests/shell_profile_coexistence.sh

      - name: Build native binary
        run: cargo build --locked

      - name: Run Git Bash frontend with native path conversion
        shell: bash
        run: |
          set -euo pipefail
          binary="$(cygpath -u "$GITHUB_WORKSPACE/target/debug/ptymark.exe")"
          root="$(cygpath -u "$RUNNER_TEMP")/ptymark-git-bash"
          rm -rf "$root"
          bash scripts/installer.sh \
            --skip-core \
            --binary "$binary" \
            --managed never \
            --mermaid preview \
            --math preview \
            --config "$root/config.toml" \
            --state "$root/state.toml"
          grep -F 'backend = "preview"' "$root/config.toml" >/dev/null
          grep -F 'config_path = ' "$root/state.toml" >/dev/null

      - name: Run cmd.exe frontend
        shell: cmd
        run: |
          scripts\installer.cmd -SkipCore -Binary "%GITHUB_WORKSPACE%\target\debug\ptymark.exe" -Managed never -Mermaid preview -Math preview -Config "%RUNNER_TEMP%\ptymark-cmd\config.toml" -State "%RUNNER_TEMP%\ptymark-cmd\state.toml"
          if errorlevel 1 exit /b 1

      - name: Verify Windows shell profiles and hook environment coexistence
        shell: pwsh
        run: |
          & ./tests/windows_shell_profile_coexistence.ps1 `
            -Binary ((Resolve-Path 'target/debug/ptymark.exe').Path) `
            -Root (Join-Path $env:RUNNER_TEMP 'ptymark-shell-coexistence')

  windows-managed-renderers:
    name: Windows managed renderer installation and strict rendering
    runs-on: windows-latest
    timeout-minutes: 80

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        shell: bash
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup override set 1.97.0

      - name: Install pinned Node runtime
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          package-manager-cache: false

      - name: Build native binary
        run: cargo build --locked

      - name: Locate installed Chromium browser
        id: browser
        shell: pwsh
        run: |
          $candidates = @()
          if (${env:ProgramFiles(x86)}) {
            $candidates += Join-Path ${env:ProgramFiles(x86)} 'Microsoft\Edge\Application\msedge.exe'
            $candidates += Join-Path ${env:ProgramFiles(x86)} 'Google\Chrome\Application\chrome.exe'
          }
          if ($env:ProgramFiles) {
            $candidates += Join-Path $env:ProgramFiles 'Microsoft\Edge\Application\msedge.exe'
            $candidates += Join-Path $env:ProgramFiles 'Google\Chrome\Application\chrome.exe'
          }
          $browser = $candidates | Where-Object { Test-Path $_ -PathType Leaf } | Select-Object -First 1
          if (-not $browser) { throw 'No Chromium-compatible browser is installed on the Windows runner' }
          "path=$browser" >> $env:GITHUB_OUTPUT

      - name: Install managed defaults and render Mermaid and math
        id: managed-smoke
        continue-on-error: true
        shell: pwsh
        env:
          BROWSER_PATH: ${{ steps.browser.outputs.path }}
        run: |
          & ./tests/windows_managed_renderer_smoke.ps1 `
            -Binary ((Resolve-Path 'target/debug/ptymark.exe').Path) `
            -Browser $env:BROWSER_PATH `
            -Root (Join-Path $env:RUNNER_TEMP 'ptymark-managed-windows')

      - name: Upload Windows managed-renderer evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-windows-managed-renderer-evidence
          path: ${{ runner.temp }}/ptymark-managed-windows/logs/**
          if-no-files-found: warn
          retention-days: 14

      - name: Preserve managed-renderer result
        if: always()
        shell: pwsh
        run: |
          if ('${{ steps.managed-smoke.outcome }}' -ne 'success') {
            throw 'Windows managed renderer smoke failed; inspect the uploaded stage logs'
          }

  canonical-docker:
    name: Canonical Docker checks
    runs-on: ubuntu-24.04
    timeout-minutes: 95

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Build canonical image
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          build --pull

      - name: Check Rust formatting in Docker
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev cargo fmt --all -- --check

      - name: Run Clippy in Docker
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev cargo clippy --locked --all-targets -- -D warnings

      - name: Run Rust tests in Docker
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev cargo test --locked --all-targets

      - name: Run WezTerm plugin smoke
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev lua5.4 tests/plugin_smoke.lua

      - name: Check product scripts
        id: script-check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          compose=(docker compose --env-file docker/ptymark-versions.env --file docker/ptymark-compose.yaml)
          scripts=(
            scripts/check-ptymark-renderers.sh
            scripts/installer.sh
            scripts/install.sh
            scripts/install-managed-bundle.sh
            scripts/package-release.sh
            distribution/install.sh
            tests/install_smoke.sh
            tests/managed_renderer_smoke.sh
            tests/shell_profile_coexistence.sh
          )
          "${compose[@]}" run --rm --no-TTY dev bash -n "${scripts[@]}"
          "${compose[@]}" run --rm --no-TTY dev shellcheck "${scripts[@]}" 2>&1 | tee shellcheck.log
          "${compose[@]}" run --rm --no-TTY dev node --check renderers/managed/mathjax-cli.mjs
          "${compose[@]}" run --rm --no-TTY dev node --check renderers/managed/ansi-presenter.mjs

      - name: Upload shellcheck evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-shellcheck-evidence
          path: shellcheck.log
          if-no-files-found: warn
          retention-days: 14

      - name: Preserve product-script result
        if: always()
        run: test '${{ steps.script-check.outcome }}' = success

      - name: Build and run installer contract smoke
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev
          bash -lc 'cargo build --locked && bash tests/install_smoke.sh && bash tests/shell_profile_coexistence.sh "${CARGO_TARGET_DIR}/debug/ptymark"'

      - name: Run isolated managed renderer smoke
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev
          bash -lc 'cargo build --locked && PTYMARK_TEST_BROWSER=/usr/bin/chromium PTYMARK_BROWSER_NO_SANDBOX=1 bash tests/managed_renderer_smoke.sh'

      - name: Check selected renderer engines
        id: selected-renderer-check
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          docker compose \
            --env-file docker/ptymark-versions.env \
            --file docker/ptymark-compose.yaml \
            run --rm --no-TTY dev \
            bash scripts/check-ptymark-renderers.sh \
            2>&1 | tee selected-renderer.log

      - name: Upload selected renderer evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-selected-renderer-evidence
          path: selected-renderer.log
          if-no-files-found: warn
          retention-days: 14

      - name: Preserve selected-renderer result
        if: always()
        run: test '${{ steps.selected-renderer-check.outcome }}' = success

  local-package-smoke:
    name: Cross-platform local package smoke (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            label: linux
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup override set 1.97.0

      - name: Build release executable
        run: cargo build --release --locked

      - name: Package and smoke-test Unix executable
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/package-release.sh target/release/ptymark dist

      - name: Package and smoke-test Windows executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & ./scripts/package-release.ps1 `
            -Binary ((Resolve-Path 'target/release/ptymark.exe').Path) `
            -OutputDir (Join-Path $env:GITHUB_WORKSPACE 'dist')


      - name: Discard local package output
        shell: bash
        run: |
          set -euo pipefail
          test -d dist
          rm -rf dist
          test ! -e dist
