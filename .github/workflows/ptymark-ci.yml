name: ptymark CI

on:
  push:
    branches: [main, master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "GNUmakefile"
      - "ptymark.mk"
      - "src/**"
      - "plugin/**"
      - "tests/predisplay_contract.rs"
      - "tests/cli_contract.rs"
      - "tests/plugin_smoke.lua"
      - "docker/ptymark*"
      - "scripts/ptymark-*"
      - "scripts/check-ptymark-*"
      - "scripts/package-ptymark-release.sh"
      - "documents/architecture.md"
      - "documents/ui-design.md"
      - "documents/dependencies.md"
      - "documents/development-environment.md"
      - "documents/distribution.md"
      - "documents/usage.md"
      - "README.md"
      - ".github/workflows/ptymark-ci.yml"
      - ".github/workflows/ptymark-release.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "GNUmakefile"
      - "ptymark.mk"
      - "src/**"
      - "plugin/**"
      - "tests/predisplay_contract.rs"
      - "tests/cli_contract.rs"
      - "tests/plugin_smoke.lua"
      - "docker/ptymark*"
      - "scripts/ptymark-*"
      - "scripts/check-ptymark-*"
      - "scripts/package-ptymark-release.sh"
      - "documents/architecture.md"
      - "documents/ui-design.md"
      - "documents/dependencies.md"
      - "documents/development-environment.md"
      - "documents/distribution.md"
      - "documents/usage.md"
      - "README.md"
      - ".github/workflows/ptymark-ci.yml"
      - ".github/workflows/ptymark-release.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canonical-container:
    name: Canonical Docker product checks
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Build canonical ptymark image
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          build --pull

      - name: Check Rust formatting in container
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev cargo fmt --all -- --check

      - name: Run Clippy in container
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev cargo clippy --locked --all-targets -- -D warnings

      - name: Run Rust tests in container
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          run --rm --no-TTY dev cargo test --locked --all-targets

      - name: Build release and smoke CLI in container
        shell: bash
        run: |
          compose=(docker compose --env-file docker/ptymark-versions.env --file docker/ptymark-compose.yaml)
          "${compose[@]}" run --rm --no-TTY dev cargo build --locked --release
          "${compose[@]}" run --rm --no-TTY dev bash -lc \
            'cargo run --quiet --locked -- demo > /tmp/ptymark-demo.txt && grep -F "ptymark mermaid preview" /tmp/ptymark-demo.txt >/dev/null'

      - name: Check WezTerm plugin and product scripts
        shell: bash
        run: |
          compose=(docker compose --env-file docker/ptymark-versions.env --file docker/ptymark-compose.yaml)
          "${compose[@]}" run --rm --no-TTY dev lua5.4 tests/plugin_smoke.lua
          "${compose[@]}" run --rm --no-TTY dev bash -lc \
            'bash -n scripts/ptymark-dev-container.sh scripts/check-ptymark-dependencies.sh scripts/check-ptymark-renderers.sh scripts/package-ptymark-release.sh && shellcheck scripts/ptymark-dev-container.sh scripts/check-ptymark-dependencies.sh scripts/check-ptymark-renderers.sh scripts/package-ptymark-release.sh'

      - name: Check pinned dependencies and existing engines
        shell: bash
        run: |
          compose=(docker compose --env-file docker/ptymark-versions.env --file docker/ptymark-compose.yaml)
          "${compose[@]}" run --rm --no-TTY dev bash scripts/check-ptymark-dependencies.sh
          "${compose[@]}" run --rm --no-TTY dev bash scripts/check-ptymark-renderers.sh

      - name: Package release archive in container
        shell: bash
        run: |
          compose=(docker compose --env-file docker/ptymark-versions.env --file docker/ptymark-compose.yaml)
          "${compose[@]}" run --rm --no-TTY dev bash -lc \
            'rm -rf /tmp/ptymark-dist && bash scripts/package-ptymark-release.sh "$CARGO_TARGET_DIR/release/ptymark" /tmp/ptymark-dist && test -n "$(find /tmp/ptymark-dist -name "ptymark-*.tar.gz" -print -quit)"'

  native-smoke:
    name: Native Rust smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        shell: bash
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test --locked --all-targets

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package native smoke artifact
        shell: bash
        run: bash scripts/package-ptymark-release.sh target/release/ptymark dist

      - name: Upload native smoke artifact
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-native-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7
