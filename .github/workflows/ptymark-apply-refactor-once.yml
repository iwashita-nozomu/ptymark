name: ptymark Apply Refactor Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ptymark-apply-refactor-once.yml

permissions:
  contents: write

concurrency:
  group: ptymark-apply-refactor-once-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out pull request head branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned Rust formatter
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt
          rustup override set 1.97.0

      - name: Apply reviewed refactor payload
        shell: bash
        run: |
          set -euo pipefail
          cat .refactor_runtime_once.part00 .refactor_runtime_once.part01 .refactor_runtime_once.part02 .refactor_runtime_once.part03 .refactor_runtime_once.part04 \
            | tr -d '\n' \
            | base64 -d \
            | gzip -d \
            > /tmp/refactor_runtime_once.py
          python3 /tmp/refactor_runtime_once.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/cli.rs')
          source = path.read_text(encoding='utf-8')
          source = source.replace('    ptymark -- "$SHELL" -l\n', '    ptymark -- \\"$SHELL\\" -l\n', 1)
          path.write_text(source, encoding='utf-8')
          PY
          cargo fmt --all
          cargo fmt --all -- --check

      - name: Commit formatted refactor and remove one-time tooling
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm \
            .github/workflows/ptymark-apply-refactor-once.yml \
            .github/workflows/ptymark-interactive-mvp-finalize-once.yml \
            .github/workflows/ptymark-source-snapshot-once.yml \
            .refactor_runtime_once.part00 \
            .refactor_runtime_once.part01 \
            .refactor_runtime_once.part02 \
            .refactor_runtime_once.part03 \
            .refactor_runtime_once.part04
          git add -A
          git diff --cached --check
          git commit -m 'Refactor runtime ownership boundaries'
          git push origin HEAD:${{ github.head_ref }}
