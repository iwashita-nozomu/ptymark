name: Apply ConPTY rustfmt

on:
  push:
    branches:
      - agent/fix-conpty-lifecycle
    paths:
      - '.github/workflows/ptymark-apply-conpty-format.yml'

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: agent/fix-conpty-lifecycle
          persist-credentials: true
      - name: Install pinned rustfmt
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt
          rustup override set 1.97.0
      - name: Apply and publish canonical formatting
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          if git diff --quiet -- src/interactive.rs src/native_session.rs; then
            echo 'ConPTY source is already canonically formatted.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/interactive.rs src/native_session.rs
          git commit -m 'style: apply rustfmt to ConPTY lifecycle fix'
          git push origin HEAD:agent/fix-conpty-lifecycle
