name: ptymark Renderer Test Repair Once

on:
  push:
    branches:
      - agent/initial-project-docs
    paths:
      - .github/workflows/ptymark-fix-renderer-test-once.yml

permissions:
  contents: write

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-renderer-test-repair-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt
          rustup override set 1.97.0

      - name: Repair deterministic external-renderer test
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/renderer.rs")
          text = path.read_text()
          old_test = 'config.arguments = vec![OsString::from("-c"), OsString::from("printf 12345")];'
          new_test = 'config.arguments = vec![\n            OsString::from("-c"),\n            OsString::from("cat >/dev/null; printf 12345"),\n        ];'
          if old_test not in text:
              raise SystemExit("expected output-limit test command was not found")
          text = text.replace(old_test, new_test, 1)

          old_kill = '.arg("-KILL")\n            .arg(process_group)'
          new_kill = '.arg("-KILL")\n            .arg("--")\n            .arg(process_group)'
          if old_kill not in text:
              raise SystemExit("expected process-group kill command was not found")
          path.write_text(text.replace(old_kill, new_kill, 1))
          PY
          cargo fmt --all
          cargo test --locked --lib

      - name: Commit and push repair
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/renderer.rs
          git commit -m "Stabilize external renderer process tests"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_REF_NAME}"
