name: ptymark Finalize Verification Once

on:
  push:
    branches:
      - agent/minimal-pre-display-core
    paths:
      - .github/workflows/ptymark-finalize-verification-once.yml

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: ptymark-finalize-verification-${{ github.ref }}
  cancel-in-progress: true

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Apply reviewed finalization
        run: |
          python3 - <<'PY'
          from pathlib import Path

          design = Path('documents/ptymark-design.md')
          source = design.read_text(encoding='utf-8')
          old = '- `$$ ... $$`;'
          new = '- ``$$ ... $$``;'
          if source.count(old) != 1:
              raise SystemExit('literal block-math marker not found exactly once')
          design.write_text(source.replace(old, new, 1), encoding='utf-8')

          workflow = Path('.github/workflows/ptymark-ci.yml')
          source = workflow.read_text(encoding='utf-8')
          old = '      - "compat/**"\n      - "docker/ptymark*"'
          new = '      - "compat/**"\n      - "verification/**"\n      - "docker/ptymark*"'
          if source.count(old) != 2:
              raise SystemExit('ptymark CI path-filter marker not found twice')
          workflow.write_text(source.replace(old, new), encoding='utf-8')

          readme = Path('README.md')
          source = readme.read_text(encoding='utf-8')
          marker = '\n## Safety and failure behavior\n'
          section = '''
## Verification catalog

The Git-owned source of truth for merge gates is
[`verification/manifest.toml`](verification/manifest.toml). It records every required check,
platform, reproduction command, contract source, and expected evidence name. The companion
[`verification/README.md`](verification/README.md) explains evidence levels and the current-head
merge policy. `tests/verification_manifest_contract.rs` prevents catalog, path, and documentation
drift on every supported Rust runner.

The canonical local product gate is:

```bash
make ptymark-check
```
'''
          if source.count(marker) != 1:
              raise SystemExit('README verification insertion marker not found exactly once')
          if '## Verification catalog' not in source:
              source = source.replace(marker, '\n' + section + marker, 1)
          readme.write_text(source, encoding='utf-8')

          for path in [
              Path('.github/workflows/ptymark-final-diagnostics-once.yml'),
              Path('.github/workflows/ptymark-finalize-verification-once.yml'),
          ]:
              path.unlink(missing_ok=True)
          PY

      - name: Validate final source contracts
        id: validation
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          {
            rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
            rustup override set 1.97.0
            cargo fmt --all -- --check
            cargo clippy --locked --all-targets -- -D warnings
            cargo test --locked --all-targets
            tools/bin/agent-canon docs check documents/ptymark-design.md documents/README.md verification/README.md README.md
            if find .github/workflows -maxdepth 1 -name '*-once.yml' -print -quit | grep -q .; then
              echo 'one-shot workflow remains after finalization' >&2
              find .github/workflows -maxdepth 1 -name '*-once.yml' -print >&2
              exit 1
            fi
          } 2>&1 | tee finalization.log

      - name: Report finalizer failure
        if: steps.validation.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            printf '### One-shot verification finalizer diagnostic\n\n'
            printf '```text\n'
            tail -n 140 finalization.log
            printf '\n```\n'
          } > finalization-comment.md
          gh pr comment 23 --repo "$GITHUB_REPOSITORY" --body-file finalization-comment.md

      - name: Require finalizer validation
        if: always()
        run: test '${{ steps.validation.outcome }}' = success

      - name: Commit final verification source
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize verification catalog and CI gates'
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
