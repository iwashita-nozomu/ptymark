name: ptymark Final Diagnostics Once

on:
  push:
    branches:
      - agent/minimal-pre-display-core
    paths:
      - .github/workflows/ptymark-final-diagnostics-once.yml

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  repository-ci-log:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false
      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: docker/requirements.txt
      - run: sudo apt-get update && sudo apt-get install -y graphviz ripgrep
      - run: PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"
      - name: Capture repository CI
        id: repository_ci
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          make ci 2>&1 | tee repository-ci.log
      - name: Upload repository CI log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-final-repository-ci-log
          path: repository-ci.log
          if-no-files-found: error
          retention-days: 7
      - name: Report repository CI tail
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            printf '### One-shot repository CI diagnostic\n\n'
            printf 'Outcome: `%s`\n\n' '${{ steps.repository_ci.outcome }}'
            printf '```text\n'
            tail -n 120 repository-ci.log
            printf '\n```\n'
          } > diagnostic-comment.md
          gh pr comment 23 --repo "$GITHUB_REPOSITORY" --body-file diagnostic-comment.md

  windows-package-log:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false
      - name: Install pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup override set 1.97.0
      - name: Build release executable
        run: cargo build --release --locked
      - name: Capture Windows package smoke
        id: package
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path diagnostics | Out-Null
          try {
            & ./scripts/package-release.ps1 `
              -Binary ((Resolve-Path 'target/release/ptymark.exe').Path) `
              -OutputDir (Join-Path $env:GITHUB_WORKSPACE 'dist') `
              *>&1 | Tee-Object -FilePath diagnostics/windows-package.log
            if ($LASTEXITCODE -ne 0) {
              throw "package-release.ps1 exited with $LASTEXITCODE"
            }
          }
          catch {
            $_ | Out-String | Add-Content diagnostics/windows-package.log
            $_.ScriptStackTrace | Add-Content diagnostics/windows-package.log
            throw
          }
      - name: Upload Windows package diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-final-windows-package-log
          path: |
            diagnostics/**
            dist/**
          if-no-files-found: warn
          retention-days: 7
      - name: Report Windows package tail
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $Tail = if (Test-Path diagnostics/windows-package.log) {
            (Get-Content diagnostics/windows-package.log -Tail 120) -join "`n"
          } else {
            'diagnostic log was not created'
          }
          @"
          ### One-shot Windows package diagnostic

          Outcome: ``${{ steps.package.outcome }}``

          ``````text
          $Tail
          ``````
          "@ | Set-Content -Encoding utf8 diagnostic-comment.md
          gh pr comment 23 --repo $env:GITHUB_REPOSITORY --body-file diagnostic-comment.md
