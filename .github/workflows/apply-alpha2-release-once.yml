# @dependency-start
# contract workflow
# responsibility Materializes and validates the reviewed alpha.2 release payload on the final release branch.
# upstream design ../../documents/release.md release source and validation contract
# upstream implementation ../../scripts/check-release-metadata.py release metadata validator
# downstream implementation ./ptymark-release.yml immutable prerelease publication
# @dependency-end

name: apply integrated alpha.2 release candidate

on:
  pull_request:
    branches:
      - agent/alpha2-integration-base
    types:
      - ready_for_review

permissions:
  contents: write

concurrency:
  group: alpha2-integration-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/release-alpha2-final'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out release branch
        uses: actions/checkout@v7
        with:
          ref: agent/release-alpha2-final
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt,clippy
          rustup override set 1.97.0

      - name: Reconstruct reviewed release payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import subprocess
          from pathlib import Path

          parts = sorted(Path('alpha2_payload').glob('part*.b85'))
          payload = ''.join(path.read_text(encoding='ascii').strip() for path in parts)
          decoded = base64.b85decode(payload)
          Path('/tmp/alpha2-release-payload.tar.gz').write_bytes(decoded)
          result = subprocess.run(
              ['tar', '-tzf', '/tmp/alpha2-release-payload.tar.gz'],
              text=True,
              capture_output=True,
              check=True,
          )
          info = {
              'parts': [path.name for path in parts],
              'payload_length': len(payload),
              'payload_sha256': hashlib.sha256(payload.encode()).hexdigest(),
              'decoded_bytes': len(decoded),
              'decoded_sha256': hashlib.sha256(decoded).hexdigest(),
              'tar_entries': len(result.stdout.splitlines()),
          }
          print(json.dumps(info, indent=2))
          PY

      - name: Expand payload and apply final contract fixes
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/alpha2-release-payload.tar.gz
          python3 - <<'PY'
          from pathlib import Path

          diagnostics_test = Path('tests/diagnostics_contract.rs')
          text = diagnostics_test.read_text()
          old = 'DiagnosticStatus::from_findings(&[finding.clone()]).exit_code()'
          new = 'DiagnosticStatus::from_findings(std::slice::from_ref(&finding)).exit_code()'
          if text.count(old) != 1:
              raise SystemExit('expected cloned finding expression exactly once')
          diagnostics_test.write_text(text.replace(old, new))

          doctor_test = Path('tests/doctor_contract.rs')
          text = doctor_test.read_text()
          old = '''    assert_eq!(
              output.status.code(),
              Some(10),
              "stdout={} stderr={}",
              String::from_utf8_lossy(&output.stdout),
              String::from_utf8_lossy(&output.stderr)
          );
          assert!(!marker.exists(), "doctor started an external process");
          let json = String::from_utf8(output.stdout).expect("UTF-8 JSON");
          assert!(json.contains("\\\"status\\\": \\\"degraded\\\""));'''
          old = '\n'.join(line.removeprefix('          ') for line in old.splitlines())
          new = '''    assert_eq!(
              output.status.code(),
              Some(0),
              "stdout={} stderr={}",
              String::from_utf8_lossy(&output.stdout),
              String::from_utf8_lossy(&output.stderr)
          );
          assert!(!marker.exists(), "doctor started an external process");
          let json = String::from_utf8(output.stdout).expect("UTF-8 JSON");
          assert!(json.contains("\\\"status\\\": \\\"ready\\\""));'''
          new = '\n'.join(line.removeprefix('          ') for line in new.splitlines())
          if text.count(old) != 1:
              raise SystemExit('expected side-effect-free doctor expectation exactly once')
          doctor_test.write_text(text.replace(old, new))
          PY
          rm -rf alpha2_payload .github/workflows/apply-alpha2-release-once.yml

      - name: Validate integrated release candidate
        run: |
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets
          python3 scripts/check-release-metadata.py
          python3 -m unittest tests.tools.test_release_metadata -v
          git diff --check
          test "$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')" = '0.1.0-alpha.2'
          test -f release-notes/0.1.0-alpha.2.md
          test ! -e alpha2_payload
          test -z "$(find .github/workflows -maxdepth 1 -type f -name '*once*.yml' -print -quit)"

      - name: Commit integrated release candidate
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: agent/release-alpha2-final
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git diff --cached --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'release: prepare v0.1.0-alpha.2'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${BRANCH}"
