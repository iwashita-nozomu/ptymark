# @dependency-start
# contract workflow
# responsibility Captures inherited AgentCanon and fresh-clone gate output once while integrating the first ptymark product surface.
# upstream implementation ../../Makefile exposes the inherited validation targets.
# downstream workflow ./ci.yml remains the canonical repository validation path.
# @dependency-end
name: ptymark Template Gate Diagnostics Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ptymark-template-diagnostics-once.yml

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes graphviz ripgrep
          PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps \
            bash docker/install_python_dependencies.sh "$PWD"

      - name: Capture inherited gates
        shell: bash
        run: |
          set +e
          set -o pipefail
          make agent-canon-pr-check 2>&1 | tee agent-canon-pr-check.log
          agent_status=${PIPESTATUS[0]}
          make fresh-clone-check 2>&1 | tee fresh-clone-check.log
          clone_status=${PIPESTATUS[0]}
          printf '%s\n' "$agent_status" > agent-canon-pr-check.status
          printf '%s\n' "$clone_status" > fresh-clone-check.status
          printf 'agent-canon-pr-check=%s\nfresh-clone-check=%s\n' \
            "$agent_status" "$clone_status" > diagnostic-summary.txt
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-template-gate-diagnostics
          path: |
            agent-canon-pr-check.log
            agent-canon-pr-check.status
            fresh-clone-check.log
            fresh-clone-check.status
            diagnostic-summary.txt
          if-no-files-found: error
          retention-days: 3

      - name: Preserve conclusion
        run: |
          test "$(cat agent-canon-pr-check.status)" = 0
          test "$(cat fresh-clone-check.status)" = 0
