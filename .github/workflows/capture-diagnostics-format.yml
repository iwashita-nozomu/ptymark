name: capture diagnostics rustfmt

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  capture:
    if: github.event.pull_request.head.ref == 'agent/diagnostics-redaction-alpha2'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/diagnostics-redaction-alpha2
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal
          rustup override set 1.97.0

      - name: Capture formatting result
        shell: bash
        run: |
          set +e
          mkdir -p rustfmt-evidence/formatted
          cargo fmt --all > rustfmt-evidence/cargo-fmt.stdout.txt 2> rustfmt-evidence/cargo-fmt.stderr.txt
          status=$?
          printf 'status=%s\n' "$status" > rustfmt-evidence/status.txt
          git diff -- src/diagnostics.rs src/lib.rs tests/diagnostics_contract.rs > rustfmt-evidence/formatted.diff
          cp src/diagnostics.rs src/lib.rs tests/diagnostics_contract.rs rustfmt-evidence/formatted/
          exit 0

      - name: Upload formatting evidence
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-diagnostics-rustfmt
          path: rustfmt-evidence/**
          if-no-files-found: error
          retention-days: 1
