# @dependency-start
# contract workflow
# responsibility Applies current Rust 1.97 machine fixes plus the explicit detector initializer cleanup and commits only a fully passing tree once.
# upstream workflow ./ptymark-normalized-diagnostic-once.yml captures the normalized patch and residual findings.
# upstream implementation ../../src/config/resolve.rs resolves configuration.
# upstream implementation ../../src/config/source.rs discovers configuration.
# upstream implementation ../../src/detector.rs detects explicit semantic fences.
# downstream workflow ./ptymark-ci.yml remains the canonical repeatable validation path.
# @dependency-end
name: ptymark Current Clippy Fix Once

on:
  pull_request:
    branches: [main, master]
    paths:
      - .github/workflows/ptymark-clippy-fix-current-once.yml
      - src/**
      - tests/**
      - Cargo.toml
      - Cargo.lock

permissions:
  contents: write

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-current-clippy-fix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Apply machine-applicable configuration fixes
        run: cargo clippy --fix --locked --all-targets --allow-dirty --allow-staged -- -D warnings

      - name: Normalize detector option initializers
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("src/detector.rs")
          text = path.read_text()
          replacements = [
              (
                  """        let mut options = FencedDetectorOptions::default();
          options.max_buffer_bytes = max_buffer_bytes;
          options.max_line_bytes = (64 * 1024).min(max_buffer_bytes);
          Self::with_options(options)""".replace("          ", "        "),
                  """        Self::with_options(FencedDetectorOptions {
          max_buffer_bytes,
          max_line_bytes: (64 * 1024).min(max_buffer_bytes),
          ..FencedDetectorOptions::default()
      })""".replace("          ", "        ").replace("      })", "        })"),
              ),
              (
                  """        let mut options = FencedDetectorOptions::default();
          options.math_fences = vec![\"latex\".to_owned()];""".replace("          ", "        "),
                  """        let options = FencedDetectorOptions {
          math_fences: vec![\"latex\".to_owned()],
          ..FencedDetectorOptions::default()
      };""".replace("          ", "        ").replace("      };", "        };"),
              ),
              (
                  """        let mut options = FencedDetectorOptions::default();
          options.mermaid_fences = vec![\"diagram\".to_owned()];
          options.math_fences = vec![\"diagram\".to_owned()];""".replace("          ", "        "),
                  """        let options = FencedDetectorOptions {
          mermaid_fences: vec![\"diagram\".to_owned()],
          math_fences: vec![\"diagram\".to_owned()],
          ..FencedDetectorOptions::default()
      };""".replace("          ", "        ").replace("      };", "        };"),
              ),
              (
                  """        let mut options = FencedDetectorOptions::default();
          options.max_buffer_bytes = 1024;
          options.max_line_bytes = 128;
          options.mermaid = false;""".replace("          ", "        "),
                  """        let options = FencedDetectorOptions {
          max_buffer_bytes: 1024,
          max_line_bytes: 128,
          mermaid: false,
          ..FencedDetectorOptions::default()
      };""".replace("          ", "        ").replace("      };", "        };"),
              ),
              (
                  """        let mut options = FencedDetectorOptions::default();
          options.max_buffer_bytes = 1024;
          options.max_line_bytes = 4;""".replace("          ", "        "),
                  """        let options = FencedDetectorOptions {
          max_buffer_bytes: 1024,
          max_line_bytes: 4,
          ..FencedDetectorOptions::default()
      };""".replace("          ", "        ").replace("      };", "        };"),
              ),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"expected detector initializer was not found: {old!r}")
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
          cargo fmt --all

      - name: Validate normalized tree
        run: |
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets

      - name: Commit normalized sources
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- src tests; then
            echo "No source changes were required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          git commit -m "Apply current Rust 1.97 normalization"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
