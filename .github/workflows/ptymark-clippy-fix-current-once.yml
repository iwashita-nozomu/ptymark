# @dependency-start
# contract workflow
# responsibility Applies current machine-applicable Rust 1.97 Clippy fixes and commits only a fully passing tree once.
# upstream workflow ./ptymark-clippy-diagnostic-once.yml captures the current exact findings.
# upstream implementation ../../src/config/resolve.rs resolves configuration.
# upstream implementation ../../src/config/source.rs discovers configuration.
# upstream implementation ../../src/detector.rs detects explicit semantic fences.
# downstream workflow ./ptymark-ci.yml remains the canonical repeatable validation path.
# @dependency-end
name: ptymark Current Clippy Fix Once

on:
  pull_request:
    branches: [main, master]
    paths:
      - .github/workflows/ptymark-clippy-fix-current-once.yml
      - src/**
      - tests/**
      - Cargo.toml
      - Cargo.lock

permissions:
  contents: write

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-current-clippy-fix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Apply machine-applicable fixes
        run: |
          cargo clippy --fix --locked --all-targets --allow-dirty --allow-staged -- -D warnings
          cargo fmt --all

      - name: Validate normalized tree
        run: |
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets

      - name: Commit normalized sources
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- src tests; then
            echo "No source changes were required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src tests
          git commit -m "Apply current Rust 1.97 normalization"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
