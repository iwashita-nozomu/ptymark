name: Verify ConPTY lifecycle fix

on:
  pull_request:
    branches:
      - agent/filter-command-stdout
    paths:
      - '.github/workflows/ptymark-verify-conpty-fix.yml'
      - 'src/interactive.rs'
      - 'src/native_session.rs'
      - 'tests/interactive_pty_contract.rs'

permissions:
  contents: read

concurrency:
  group: verify-conpty-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unix:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false
      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt --component clippy
          rustup override set 1.97.0
      - run: cargo fmt --all -- --check
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo test --locked --all-targets

  windows:
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false
      - name: Check out AgentCanon submodule
        shell: bash
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh
      - name: Install pinned Rust toolchain
        shell: pwsh
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt --component clippy
          rustup override set 1.97.0
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings
      - name: Run native ConPTY contract serially
        shell: pwsh
        run: cargo test --locked --test interactive_pty_contract -- --nocapture --test-threads=1
      - name: Run all Rust targets
        run: cargo test --locked --all-targets
