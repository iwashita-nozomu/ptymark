# @dependency-start
# contract workflow
# responsibility Regenerates the ptymark Cargo lockfile and canonical Rust formatting once after adding configuration dependencies.
# upstream configuration ../../Cargo.toml declares the Rust dependency requirements.
# upstream implementation ../../src/config.rs introduces serde and TOML configuration support.
# downstream workflow ./ptymark-ci.yml validates the committed lockfile and formatting with --locked.
# @dependency-end
name: ptymark Cargo Lock Once

on:
  push:
    branches:
      - agent/renderer-skeleton-staging
    paths:
      - .github/workflows/ptymark-cargo-lock-once.yml

permissions:
  contents: write

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-cargo-lock-once-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt
          rustup override set 1.97.0

      - name: Resolve dependencies and format Rust sources
        run: |
          cargo generate-lockfile
          cargo fmt --all
          cargo metadata --locked --format-version 1 >/dev/null

      - name: Commit generated state
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- Cargo.lock src tests examples; then
            echo "Cargo.lock and Rust formatting are already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock src tests examples
          git commit -m "Lock and format ptymark configuration skeleton"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_REF_NAME}"
