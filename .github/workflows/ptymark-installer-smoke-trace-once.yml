# @dependency-start
# contract workflow
# responsibility Captures the current canonical-Docker installer smoke trace once for stabilization.
# upstream test ../../tests/install_smoke.sh owns the end-to-end installer smoke.
# downstream workflow ./ptymark-ci.yml remains the repeatable validation path.
# @dependency-end
name: ptymark Installer Smoke Trace Once

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ptymark-installer-smoke-trace-once.yml

permissions:
  contents: read

jobs:
  trace:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Build canonical image
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          build --pull --quiet

      - name: Capture smoke trace
        shell: bash
        run: |
          set +e
          compose=(docker compose --env-file docker/ptymark-versions.env --file docker/ptymark-compose.yaml)
          "${compose[@]}" run --rm --no-TTY dev \
            bash -lc 'cargo build --locked && printf "CARGO_TARGET_DIR=%s\n" "${CARGO_TARGET_DIR:-}" && bash -x tests/install_smoke.sh' \
            >installer-smoke-trace.log 2>&1
          status=$?
          printf '%s\n' "$status" >installer-smoke-trace.status
          tail -n 200 installer-smoke-trace.log
          exit 0

      - name: Upload trace
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-installer-smoke-trace
          path: |
            installer-smoke-trace.log
            installer-smoke-trace.status
          if-no-files-found: error
          retention-days: 3

      - name: Preserve result
        run: test "$(cat installer-smoke-trace.status)" = 0
