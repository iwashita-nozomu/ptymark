# @dependency-start
# contract release diagnostics
# responsibility Repairs inherited repository-gate findings on the AgentCanon submodule fix branch and publishes changes only after both canonical gates pass.
# upstream design AGENTS.md defines repository closeout and dependency-manifest requirements.
# downstream implementation tools/ci/run_all_checks.sh and tools/ci/check_agent_canon_pr.sh validate the repaired branch.
# @dependency-end

name: AgentCanon diagnostics

on:
  push:
    branches:
      - agent/agent-canon-diagnostics
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: agent-canon-diagnostics-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

jobs:
  repair:
    name: Repair inherited gate findings
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the AgentCanon fix branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-agent-canon-submodule-v2
          fetch-depth: 0
          submodules: false
          persist-credentials: true

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz ripgrep
          PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"

      - name: Add required dependency manifests and repair documentation math
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          paths = [
              Path('.github/workflows/ptymark-ci.yml'),
              Path('Cargo.toml'),
              Path('distribution/install.sh'),
              Path('documents/ptymark-design.md'),
              Path('documents/ptymark-installer.md'),
              Path('documents/shell-plugin-compatibility.md'),
              Path('examples/README.md'),
              Path('examples/external-engines.toml'),
              Path('examples/ptymark.toml'),
              Path('rust-toolchain.toml'),
              Path('scripts/check-ptymark-renderers.sh'),
              Path('scripts/install-managed-bundle.sh'),
              Path('scripts/install.sh'),
              Path('scripts/installer.sh'),
              Path('scripts/package-release.sh'),
              Path('tests/install_smoke.sh'),
              Path('tests/managed_renderer_smoke.sh'),
              Path('tests/shell_profile_coexistence.sh'),
          ]

          markdown_header = '''<!--
          @dependency-start
          contract ptymark product
          responsibility Defines a user-facing or design artifact owned by the ptymark product.
          upstream design README.md defines the product and release contract.
          downstream test .github/workflows/ptymark-ci.yml and tests validate this artifact.
          @dependency-end
          -->

          '''
          comment_header = '''# @dependency-start
          # contract ptymark product
          # responsibility Defines a build, configuration, installation, packaging, example, or verification artifact owned by ptymark.
          # upstream design README.md and documents/ptymark-design.md define the product contract.
          # downstream test .github/workflows/ptymark-ci.yml and tests validate this artifact.
          # @dependency-end

          '''

          for path in paths:
              text = path.read_text(encoding='utf-8')
              if '@dependency-start' not in '\n'.join(text.splitlines()[:80]):
                  if path.suffix == '.md':
                      text = markdown_header + text
                  elif text.startswith('#!'):
                      first, separator, rest = text.partition('\n')
                      text = first + '\n' + comment_header + (rest if separator else '')
                  else:
                      text = comment_header + text
                  path.write_text(text, encoding='utf-8')

          design = Path('documents/ptymark-design.md')
          text = design.read_text(encoding='utf-8')
          old = '- ``$$ ... $$``;'
          new = '- a line-bounded block-math fence delimited by two dollar-sign lines;'
          if old not in text and new not in text:
              raise SystemExit('expected block-math description was not found')
          design.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Run repository and AgentCanon pull-request gates
        run: |
          make ci
          make agent-canon-pr-check

      - name: Commit the verified repairs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            .github/workflows/ptymark-ci.yml \
            Cargo.toml \
            distribution/install.sh \
            documents/ptymark-design.md \
            documents/ptymark-installer.md \
            documents/shell-plugin-compatibility.md \
            examples/README.md \
            examples/external-engines.toml \
            examples/ptymark.toml \
            rust-toolchain.toml \
            scripts/check-ptymark-renderers.sh \
            scripts/install-managed-bundle.sh \
            scripts/install.sh \
            scripts/installer.sh \
            scripts/package-release.sh \
            tests/install_smoke.sh \
            tests/managed_renderer_smoke.sh \
            tests/shell_profile_coexistence.sh
          if git diff --cached --quiet; then
            echo 'AgentCanon fix branch already satisfies inherited gates'
            exit 0
          fi
          git commit -m 'chore: satisfy inherited repository gates'
          git push origin HEAD:agent/fix-agent-canon-submodule-v2
