name: AgentCanon diagnostics

on:
  push:
    branches:
      - agent/agent-canon-diagnostics
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

jobs:
  diagnose:
    name: Capture inherited gate diagnostics
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: docker/requirements.txt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz ripgrep
          PYTHON_DEPENDENCY_MARKER_DIR=.state/python-deps bash docker/install_python_dependencies.sh "$PWD"

      - name: Capture repository and canon gate output
        shell: bash
        run: |
          set +e
          : > agent-canon-diagnostic.log
          for command in "make ci" "make agent-canon-pr-check"
          do
            printf '\n$ %s\n' "$command" | tee -a agent-canon-diagnostic.log
            bash -o pipefail -c "$command" 2>&1 | tee -a agent-canon-diagnostic.log
            code=${PIPESTATUS[0]}
            printf 'exit_code=%s\n' "$code" | tee -a agent-canon-diagnostic.log
          done
          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v7
        with:
          name: agent-canon-diagnostic
          path: agent-canon-diagnostic.log
          if-no-files-found: error
          retention-days: 1
