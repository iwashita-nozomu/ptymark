# @dependency-start
# contract workflow
# responsibility Runs CodeQL analysis for the Rust core, Python tooling, renderer JavaScript, and GitHub Actions.
# upstream implementation ../../src/lib.rs Rust library surface
# upstream implementation ../../python Python tooling surface
# upstream implementation ../../renderers managed renderer surface
# upstream configuration ./*.yml GitHub Actions workflow surface
# downstream policy ../../SECURITY.md vulnerability reporting and support policy
# @dependency-end

name: CodeQL

on:
  push:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "python/**"
      - "scripts/**"
      - "renderers/**"
      - ".github/actions/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "python/**"
      - "scripts/**"
      - "renderers/**"
      - ".github/actions/**"
      - ".github/workflows/**"
  schedule:
    - cron: "21 18 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: read
  pull-requests: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}-${{ matrix.language }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        language:
          - rust
          - python
          - javascript-typescript
          - actions

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: false
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@29d5e4cb8ef24b12f19e6f9a314ab83b0d94489a # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@29d5e4cb8ef24b12f19e6f9a314ab83b0d94489a # v4
        with:
          category: "/language:${{ matrix.language }}"
