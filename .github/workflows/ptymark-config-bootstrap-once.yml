# @dependency-start
# contract workflow
# responsibility Generates the Rust lockfile, formats the configuration skeleton, and verifies it once.
# upstream implementation ../../Cargo.toml declares ptymark Rust dependencies.
# upstream implementation ../../src/config.rs exposes the configuration service.
# downstream workflow ./ptymark-ci.yml becomes the canonical repeatable validation path.
# @dependency-end
name: ptymark Config Bootstrap Once

on:
  push:
    branches:
      - agent/renderer-skeleton-staging
    paths:
      - .github/workflows/ptymark-config-bootstrap-once.yml

permissions:
  contents: write

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-config-bootstrap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Resolve, format, and test configuration skeleton
        run: |
          cargo generate-lockfile
          cargo fmt --all
          cargo clippy --all-targets -- -D warnings
          cargo test --all-targets

      - name: Commit generated lock and formatting
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- Cargo.lock src tests; then
            echo "Configuration skeleton already normalized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock src tests
          git commit -m "Normalize configuration skeleton and lock dependencies"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_REF_NAME}"
