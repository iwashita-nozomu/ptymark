# @dependency-start
# contract workflow
# responsibility Generates the Rust lockfile and rustfmt-normalized configuration skeleton as one-time PR artifacts.
# upstream implementation ../../Cargo.toml declares ptymark Rust dependencies.
# upstream implementation ../../src/config.rs exposes the configuration service.
# downstream workflow ./ptymark-ci.yml becomes the canonical repeatable validation path after artifacts are committed.
# @dependency-end
name: ptymark Config Bootstrap Once

on:
  pull_request:
    branches: [main, master]
    paths:
      - Cargo.toml
      - Cargo.lock
      - src/config.rs
      - src/config/**
      - src/detector.rs
      - src/lib.rs
      - src/main.rs
      - tests/config_contract.rs
      - .github/workflows/ptymark-config-bootstrap-once.yml
  workflow_dispatch:

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-config-bootstrap-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bootstrap:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Resolve dependencies and normalize Rust sources
        id: normalize
        shell: bash
        run: |
          set -euo pipefail
          cargo generate-lockfile
          cargo fmt --all
          git diff -- Cargo.lock src tests > ptymark-config-bootstrap.patch
          {
            echo "### Configuration bootstrap"
            echo
            echo "- Cargo.lock generated with Rust 1.97.0"
            echo "- Rust sources normalized with rustfmt 1.97.0"
            echo "- patch bytes: $(wc -c < ptymark-config-bootstrap.patch)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compile and test the normalized tree
        run: |
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets

      - name: Upload normalized configuration tree
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-config-bootstrap
          path: |
            Cargo.lock
            src/**
            tests/**
            ptymark-config-bootstrap.patch
          if-no-files-found: error
          retention-days: 3
