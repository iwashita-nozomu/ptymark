# @dependency-start
# contract workflow
# responsibility Captures the real Mermaid CLI and Chafa integration log once while stabilizing installed-engine support.
# upstream environment ../../docker/ptymark.Dockerfile defines the canonical dependency environment.
# downstream workflow ./ptymark-ci.yml remains the repeatable validation path.
# @dependency-end
name: ptymark Renderer Diagnostic Once

on:
  push:
    branches:
      - agent/minimal-pre-display-core
    paths:
      - .github/workflows/ptymark-renderer-diagnostic-once.yml

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          submodules: false
          persist-credentials: false

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Build canonical image
        run: >-
          docker compose
          --env-file docker/ptymark-versions.env
          --file docker/ptymark-compose.yaml
          build --pull

      - name: Capture renderer integration log
        shell: bash
        run: |
          set +e
          set -o pipefail
          docker compose \
            --env-file docker/ptymark-versions.env \
            --file docker/ptymark-compose.yaml \
            run --rm --no-TTY dev \
            bash -x scripts/check-ptymark-renderers.sh \
            2>&1 | tee renderer-integration.log
          printf '%s\n' "${PIPESTATUS[0]}" > renderer-integration.status
          exit 0

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-renderer-integration-diagnostic
          path: |
            renderer-integration.log
            renderer-integration.status
          if-no-files-found: error
          retention-days: 3

      - name: Preserve conclusion
        run: test "$(cat renderer-integration.status)" = 0
