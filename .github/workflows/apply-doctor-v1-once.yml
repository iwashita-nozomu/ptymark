name: apply doctor v1

on:
  pull_request:
    branches:
      - agent/diagnostics-redaction-alpha2

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'agent/doctor-v1-alpha2'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v7
        with:
          ref: agent/doctor-v1-alpha2
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component rustfmt,clippy
          rustup override set 1.97.0

      - name: Apply doctor payload and verify
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          from pathlib import Path
          Path('/tmp/doctor-v1.tar.gz').write_bytes(
              base64.b85decode(Path('doctor_payload.b85').read_text().strip())
          )
          PY
          tar -xzf /tmp/doctor-v1.tar.gz
          rm -f doctor_payload.b85 .github/workflows/apply-doctor-v1-once.yml
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets
          git add -A
          git diff --cached --check

      - name: Commit and push doctor v1
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: agent/doctor-v1-alpha2
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m 'feat: add doctor v1 and redacted support reports'
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${BRANCH}"
