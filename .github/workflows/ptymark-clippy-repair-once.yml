# @dependency-start
# contract workflow
# responsibility Applies the three deterministic Clippy repairs identified by the diagnostic run and validates them once.
# upstream workflow ./ptymark-clippy-diagnostic-once.yml captures the exact Rust 1.97.0 findings.
# upstream implementation ../../src/cli.rs parses global configuration options.
# upstream implementation ../../src/config/resolve.rs normalizes runtime definitions.
# upstream implementation ../../src/config/source.rs discovers trusted configuration sources.
# downstream workflow ./ptymark-ci.yml remains the canonical repeatable validation path.
# @dependency-end
name: ptymark Clippy Repair Once

on:
  pull_request:
    branches: [main, master]
    paths:
      - .github/workflows/ptymark-clippy-repair-once.yml
      - src/cli.rs
      - src/config/resolve.rs
      - src/config/source.rs

permissions:
  contents: write

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-clippy-repair-once-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Apply deterministic Clippy repairs
        run: |
          python3 - <<'PY'
          from pathlib import Path

          resolve = Path("src/config/resolve.rs")
          text = resolve.read_text()
          old = '.entry("chromium".to_owned())\n        .or_insert_with(RuntimeConfig::default);'
          new = '.entry("chromium".to_owned())\n        .or_default();'
          if old not in text:
              raise SystemExit("expected RuntimeConfig::default insertion target was not found")
          resolve.write_text(text.replace(old, new, 1))

          source = Path("src/config/source.rs")
          lines = source.read_text().splitlines()
          start = lines.index("            if let Some(path) = Self::user_path(environment) {")
          if lines[start + 1] != "                if path.is_file() {":
              raise SystemExit("unexpected user-config condition shape")
          lines[start : start + 2] = [
              "            if let Some(path) = Self::user_path(environment)",
              "                && path.is_file()",
              "            {",
          ]
          environment_source = lines.index(
              "            if let Some(source) = Self::environment_source(environment) {",
              start,
          )
          if lines[environment_source - 2] != "                }":
              raise SystemExit("expected inner user-config closing brace was not found")
          if lines[environment_source - 1] != "            }":
              raise SystemExit("expected outer user-config closing brace was not found")
          del lines[environment_source - 2]
          source.write_text("\n".join(lines) + "\n")
          PY
          cargo fmt --all

      - name: Validate repaired tree
        run: |
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets

      - name: Commit repaired sources
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/config/resolve.rs src/config/source.rs
          git commit -m "Satisfy Clippy in configuration skeleton"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
