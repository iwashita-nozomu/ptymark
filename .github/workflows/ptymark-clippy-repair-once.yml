# @dependency-start
# contract workflow
# responsibility Applies deterministic Rust 1.97.0 Clippy repairs, captures validation diagnostics, and commits only a passing tree once.
# upstream workflow ./ptymark-clippy-diagnostic-once.yml captures the initial findings.
# upstream implementation ../../src/cli.rs parses global configuration options.
# upstream implementation ../../src/config/resolve.rs normalizes runtime definitions.
# upstream implementation ../../src/config/source.rs discovers trusted configuration sources.
# upstream implementation ../../src/detector.rs implements bounded explicit semantic detection.
# downstream workflow ./ptymark-ci.yml remains the canonical repeatable validation path.
# @dependency-end
name: ptymark Clippy Repair Once

on:
  pull_request:
    branches: [main, master]
    paths:
      - .github/workflows/ptymark-clippy-repair-once.yml
      - src/cli.rs
      - src/config/resolve.rs
      - src/config/source.rs
      - src/detector.rs

permissions:
  contents: write

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-clippy-repair-once-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Apply deterministic Clippy repairs
        run: |
          python3 - <<'PY'
          from pathlib import Path

          resolve = Path("src/config/resolve.rs")
          text = resolve.read_text()
          old = '.entry("chromium".to_owned())\n        .or_insert_with(RuntimeConfig::default);'
          new = '.entry("chromium".to_owned())\n        .or_default();'
          if old not in text:
              raise SystemExit("expected RuntimeConfig::default insertion target was not found")
          resolve.write_text(text.replace(old, new, 1))

          source = Path("src/config/source.rs")
          lines = source.read_text().splitlines()
          start = lines.index("            if let Some(path) = Self::user_path(environment) {")
          if lines[start + 1] != "                if path.is_file() {":
              raise SystemExit("unexpected user-config condition shape")
          lines[start : start + 2] = [
              "            if let Some(path) = Self::user_path(environment)",
              "                && path.is_file()",
              "            {",
          ]
          environment_source = lines.index(
              "            if let Some(source) = Self::environment_source(environment) {",
              start,
          )
          if lines[environment_source - 2] != "                }":
              raise SystemExit("expected inner user-config closing brace was not found")
          if lines[environment_source - 1] != "            }":
              raise SystemExit("expected outer user-config closing brace was not found")
          del lines[environment_source - 2]
          source.write_text("\n".join(lines) + "\n")

          detector = Path("src/detector.rs")
          text = detector.read_text()
          changes = [
              (
                  '''        let mut options = FencedDetectorOptions::default();
          options.max_buffer_bytes = max_buffer_bytes;
          options.max_line_bytes = (64 * 1024).min(max_buffer_bytes);
          Self::with_options(options)'''.replace('          ', '        '),
                  '''        Self::with_options(FencedDetectorOptions {
          max_buffer_bytes,
          max_line_bytes: (64 * 1024).min(max_buffer_bytes),
          ..FencedDetectorOptions::default()
      })'''.replace('          ', '        ').replace('      })', '        })'),
              ),
              (
                  '''        let mut options = FencedDetectorOptions::default();
          options.math_fences = vec!["latex".to_owned()];'''.replace('          ', '        '),
                  '''        let options = FencedDetectorOptions {
          math_fences: vec!["latex".to_owned()],
          ..FencedDetectorOptions::default()
      };'''.replace('          ', '        ').replace('      };', '        };'),
              ),
              (
                  '''        let mut options = FencedDetectorOptions::default();
          options.mermaid_fences = vec!["diagram".to_owned()];
          options.math_fences = vec!["diagram".to_owned()];'''.replace('          ', '        '),
                  '''        let options = FencedDetectorOptions {
          mermaid_fences: vec!["diagram".to_owned()],
          math_fences: vec!["diagram".to_owned()],
          ..FencedDetectorOptions::default()
      };'''.replace('          ', '        ').replace('      };', '        };'),
              ),
              (
                  '''        let mut options = FencedDetectorOptions::default();
          options.max_buffer_bytes = 1024;
          options.max_line_bytes = 128;
          options.mermaid = false;'''.replace('          ', '        '),
                  '''        let options = FencedDetectorOptions {
          max_buffer_bytes: 1024,
          max_line_bytes: 128,
          mermaid: false,
          ..FencedDetectorOptions::default()
      };'''.replace('          ', '        ').replace('      };', '        };'),
              ),
              (
                  '''        let mut options = FencedDetectorOptions::default();
          options.max_buffer_bytes = 1024;
          options.max_line_bytes = 4;'''.replace('          ', '        '),
                  '''        let options = FencedDetectorOptions {
          max_buffer_bytes: 1024,
          max_line_bytes: 4,
          ..FencedDetectorOptions::default()
      };'''.replace('          ', '        ').replace('      };', '        };'),
              ),
          ]
          for old, new in changes:
              if old not in text:
                  raise SystemExit(f"expected detector initializer was not found: {old!r}")
              text = text.replace(old, new, 1)
          detector.write_text(text)
          PY
          cargo fmt --all

      - name: Capture repaired-tree validation
        shell: bash
        run: |
          set +e
          cargo clippy --locked --all-targets -- -D warnings > repair-clippy.log 2>&1
          clippy_status=$?
          cargo test --locked --all-targets > repair-test.log 2>&1
          test_status=$?
          printf '%s\n' "$clippy_status" > repair-clippy.exit
          printf '%s\n' "$test_status" > repair-test.exit
          cat repair-clippy.log
          cat repair-test.log
          exit 0

      - name: Upload repaired-tree diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-repaired-tree-diagnostics
          path: |
            repair-clippy.log
            repair-clippy.exit
            repair-test.log
            repair-test.exit
          if-no-files-found: error
          retention-days: 3

      - name: Require repaired tree to pass
        run: |
          test "$(cat repair-clippy.exit)" = 0
          test "$(cat repair-test.exit)" = 0

      - name: Commit repaired sources
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/config/resolve.rs src/config/source.rs src/detector.rs
          git commit -m "Satisfy Clippy in configuration skeleton"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
