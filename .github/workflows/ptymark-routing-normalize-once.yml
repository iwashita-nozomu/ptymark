# @dependency-start
# contract workflow
# responsibility Normalizes and validates the hardened render decision and engine handoff API once.
# upstream implementation ../../src/routing.rs owns the new extension boundary.
# upstream test ../../tests/routing_contract.rs validates public substitution and typed transfer.
# downstream workflow ./ptymark-ci.yml remains the repeatable validation path.
# @dependency-end
name: ptymark Routing Normalize Once

on:
  push:
    branches:
      - agent/minimal-pre-display-core
    paths:
      - .github/workflows/ptymark-routing-normalize-once.yml

permissions:
  contents: write

concurrency:
  group: ptymark-routing-normalize-once-${{ github.ref }}
  cancel-in-progress: true

jobs:
  normalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.97.0 --profile minimal --component clippy,rustfmt
          rustup override set 1.97.0

      - name: Normalize and validate
        run: |
          cargo fmt --all
          cargo clippy --fix --locked --all-targets --allow-dirty --allow-staged -- -D warnings
          cargo fmt --all
          cargo fmt --all -- --check
          cargo clippy --locked --all-targets -- -D warnings
          cargo test --locked --all-targets

      - name: Commit passing Rust sources
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- '*.rs'; then
            echo "No Rust source changes were required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- '*.rs'
          git commit -m "Normalize render routing contracts"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_REF_NAME}"
