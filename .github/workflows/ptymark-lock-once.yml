# @dependency-start
# contract workflow
# responsibility Generates and commits the exact npm lockfile for selected ptymark renderer dependencies once.
# upstream environment ../../renderers/package.json declares exact direct renderer versions.
# downstream environment ../../renderers/package-lock.json becomes the canonical transitive resolution.
# @dependency-end
name: ptymark Renderer Lock Once

on:
  push:
    branches:
      - agent/initial-project-docs
    paths:
      - .github/workflows/ptymark-lock-once.yml

permissions:
  contents: write

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: ptymark-renderer-lock-once-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lock:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false
          fetch-depth: 0

      - name: Check out AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash .github/scripts/checkout_agent_canon_submodule.sh

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: Resolve exact renderer dependency graph
        working-directory: renderers
        run: npm install --package-lock-only --ignore-scripts

      - name: Commit package lock
        env:
          PUSH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add renderers/package-lock.json
          git diff --cached --quiet && exit 0
          git commit -m "Lock ptymark renderer dependencies"
          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${GITHUB_REF_NAME}"
