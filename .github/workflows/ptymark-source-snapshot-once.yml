name: ptymark Source Snapshot Once

# Temporary source-export workflow for release hardening. Removed before review completion.
on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/ptymark-source-snapshot-once.yml

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out pull request merge ref
        uses: actions/checkout@v7
        with:
          submodules: false
          persist-credentials: false

      - name: Create source snapshot
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=target \
            --exclude='*.zip' \
            -czf "$RUNNER_TEMP/ptymark-source.tar.gz" .

      - name: Upload source snapshot
        uses: actions/upload-artifact@v7
        with:
          name: ptymark-source-snapshot-once
          path: ${{ runner.temp }}/ptymark-source.tar.gz
          if-no-files-found: error
          retention-days: 1
