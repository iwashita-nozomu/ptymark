name: Bug report
description: Report a reproducible ptymark failure that is not specific to one terminal integration.
title: "bug: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Start with `ptymark doctor` when possible. `ptymark.doctor.v1` excludes semantic source, child environment, secrets, credentials, and raw renderer stderr by default. Do not paste unrestricted environment dumps. Security-sensitive reports belong in the private Security Advisories flow.

  - type: input
    id: version
    attributes:
      label: ptymark version
      description: Paste the output of `ptymark --version`, or identify the commit when testing an unreleased build.
      placeholder: ptymark 0.1.0-alpha.2
    validations:
      required: true

  - type: dropdown
    id: release-channel
    attributes:
      label: Installation or release channel
      options:
        - GitHub prerelease archive
        - source checkout
        - development commit or pull request
        - other
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Invocation mode
      options:
        - doctor or support report
        - preview
        - run -- COMMAND
        - native PTY/ConPTY -- COMMAND
        - install resolve/status
        - managed renderer launcher
        - other
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Operating system and architecture
      placeholder: Ubuntu 24.04 x86_64, macOS 15 arm64, Windows 11 x86_64
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: Terminal and shell
      description: Include terminal, shell, and tmux/SSH/WSL layers when relevant.
      placeholder: WezTerm 2026.x, zsh 5.9, no tmux
    validations:
      required: true

  - type: textarea
    id: doctor-report
    attributes:
      label: Redacted ptymark.doctor.v1 report (recommended)
      description: Paste `ptymark doctor --json`, or attach the file written by `ptymark doctor --support-report PATH`. This field may be omitted when ptymark or doctor cannot start. The default report excludes semantic source, secrets, child environment, and raw renderer stderr.
      placeholder: |
        {
          "schema": "ptymark.doctor.v1",
          "status": "degraded"
        }
      render: json
    validations:
      required: false

  - type: textarea
    id: configuration
    attributes:
      label: Additional redacted configuration context
      description: Include only details not already covered by the doctor report. Replace private paths or values with placeholders.
      render: toml
    validations:
      required: false

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Give exact commands and the smallest safe input that reproduces the problem. Do not include private semantic source.
      placeholder: |
        1. Run `...`
        2. Print a safe fixture such as `...`
        3. Observe `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include exit status and the finding code when available. Do not paste raw source-bearing renderer stderr.
    validations:
      required: true

  - type: checkboxes
    id: modes
    attributes:
      label: Recovery-mode comparison
      description: Check every comparison you performed.
      options:
        - label: The problem also occurs with `--source`.
        - label: The problem also occurs with `--safe`.
        - label: The problem also occurs with `--private`.
        - label: The problem disappears when semantic rendering is bypassed.

  - type: checkboxes
    id: confirmation
    attributes:
      label: Submission checks
      options:
        - label: I did not add semantic source, secrets, credentials, child environment, or raw renderer stderr beyond the redacted doctor report.
          required: true
        - label: This is not a security vulnerability that should be reported privately.
          required: true
        - label: I searched existing issues for the same failure.
          required: true
