[agents]
max_threads = 24
max_depth = 2
job_max_runtime_seconds = 3600

[agents.artifact_reviewer]
description = "Read-only reviewer for code, scripts, raw results, environment capture, and artifact-readiness."
config_file = "agents/artifact_reviewer.toml"

