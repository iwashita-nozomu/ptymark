# Project-scoped Codex settings.
# Keep review fan-out explicit, keep project subagent registration centralized here,
# and use spawned agents in bounded waves instead of starting every available role at once.
# Role-specific behavior lives in .codex/agents/*.toml; this file owns the registry.
# @dependency-start
# contract configuration
# responsibility Documents Project-scoped Codex settings. for this repository.
# upstream design ../agents/task_catalog.yaml workflow family runtime budgets
# upstream design ../agents/canonical/CODEX_SUBAGENTS.md Codex subagent routing
# downstream implementation ./hooks.json injects lifecycle hook context
# downstream implementation ../tools/agent_tools/check_agent_runtime_alignment.py validates agent registry and role TOML
# downstream design ../agents/workflows/token-efficient-codex-workflow.md token-aware runtime modes
# @dependency-end

approval_policy = "never"
sandbox_mode = "danger-full-access"

review_model = "gpt-5.5"
model_context_window = 1000000
tool_output_token_limit = 4096

[features]
hooks = true
goals = true
multi_agent = true

