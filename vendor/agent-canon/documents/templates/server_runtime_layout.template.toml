# @dependency-start
# contract reference
# responsibility Provides the server runtime layout.template configuration template.
# upstream design ../SHARED_RUNTIME_SURFACES.md shared documents ownership policy
# @dependency-end

[server]
id = "main-server"
label = "Main Server"
host_kind = "wsl2"
container_builder = "docker"
codex_cli_required = true
python_bin = "python3"

[paths]
workspace_root = "/mnt/l/workspace"
local_state_root = "/var/lib/project-template"
docker_state_root = "/var/lib/docker"
artifact_root = "/mnt/l/workspace/project_template/reports"

[mounts.workspace_root]
type = "cifs"
required = true

[mounts.local_state_root]
type = "ext4"
required = false

[mounts.docker_state_root]
type = "ext4"
required = true
