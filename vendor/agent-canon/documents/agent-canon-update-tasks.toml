# @dependency-start
# contract reference
# responsibility Defines AgentCanon update TODOs for parent repository agents.
# upstream design agent-canon-parent-repo-latest-checklist.md parent repo latest-state workflow
# downstream implementation ../tools/agent_tools/agent_canon_update_todos.py reads and routes these tasks
# downstream implementation ../tools/agent_tools/agent_canon_preflight.py exposes task-start routing status
# @dependency-end

manifest_kind = "agent_canon_update_tasks"
version = 1

[[task]]
id = "ACUT-20260515-parent-update-state"
title = "Initialize parent repository AgentCanon update TODO state"
introduced_after = "b89cf81f52e7b969926e76af72d3022bfb3989a0"
severity = "S1"
applies_to = ["parent_repo"]
summary = "Parent repositories that vendor AgentCanon must track which AgentCanon update TODOs their local agent has already applied."
actions = [
  "Run `python3 tools/agent_tools/agent_canon_update_todos.py init` once in the parent repository.",
  "Commit `.agent-canon/.gitignore` and `.agent-canon/update-state.toml` as parent-repo state.",
  "Keep generated `.agent-canon/update-todos.generated.md` and `.agent-canon/update-todos.pending.json` ignored.",
  "After each AgentCanon pin update, run `python3 tools/agent_tools/agent_canon_update_todos.py plan --write` and have the parent-repo agent resolve or defer each pending task before starting unrelated work.",
]
acceptance = [
  ".agent-canon/update-state.toml exists in the parent repository and names the AgentCanon commit through which update TODOs are applied.",
  "Task-start output includes AGENT_CANON_UPDATE_TODO_* status lines.",
  "The parent agent treats pending TODOs as first work, not as a stop-only gate.",
]
paths = [
  ".agent-canon/.gitignore",
  ".agent-canon/update-state.toml",
]

[[task]]
id = "ACUT-20260515-update-todo-detail-fields"
title = "Consume detailed AgentCanon update TODO routing fields"
introduced_after = "ebde9bb6c02dbd0fcd84aa4fd8e915e70f8b6ed8"
severity = "S1"
applies_to = ["parent_repo"]
summary = "Parent repositories should consume detailed TODO metadata instead of treating pending AgentCanon update TODOs as opaque IDs."
actions = [
  "Run `python3 tools/agent_tools/agent_canon_update_todos.py plan --write` after updating the AgentCanon pin.",
  "Read `.agent-canon/update-todos.pending.json` and apply, defer, or mark not applicable each `pending_task_details[]` entry before unrelated repo work.",
  "Preserve `AGENT_CANON_UPDATE_TODO_FIRST_*` and `AGENT_CANON_UPDATE_TODO_PENDING_JSON` lines in task-start logs or PR evidence.",
]
acceptance = [
  "Task-start or PR evidence includes `AGENT_CANON_UPDATE_TODO_PENDING_JSON` and `AGENT_CANON_UPDATE_TODO_FIRST_TASK` when pending tasks exist.",
  "The parent agent records either `complete`, `not-applicable`, or `defer` for every pending update TODO before acknowledging `tasks_applied_through`.",
  "Repo-specific update decisions cite the generated JSON task detail rather than only the task ID.",
]
paths = [
  ".agent-canon/update-todos.pending.json",
  ".agent-canon/update-todos.generated.md",
  ".agent-canon/update-state.toml",
]
