# @dependency-start
# contract reference
# responsibility Maps canonical tools to same-named explanatory documents.
# upstream design README.md tool documentation placement policy
# upstream design ../../tools/catalog.yaml structured AgentCanon tool catalog
# downstream implementation ../../tools/agent_tools/tool_catalog.py validates one-to-one tool docs
# @dependency-end

