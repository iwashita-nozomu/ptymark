# @dependency-start
# contract reference
# responsibility Defines AgentCanon expected repository structure profiles.
# upstream design README.md repository entrypoint and shared surface overview
# upstream design SHARED_RUNTIME_SURFACES.md shared root surface policy
# upstream design shared-runtime-surfaces.toml machine-readable shared root surface manifest
# downstream implementation ../tools/agent_tools/repo_structure_contract.py compares observed trees against this contract
# downstream implementation ../tests/agent_tools/test_repo_structure_contract.py tests structure contract validation
# @dependency-end

catalog_kind = "agent_canon_repo_structure_contract"
version = 1

[defaults]
ignore_names = [
  ".agent-canon",
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".state",
  ".venv",
  "__pycache__",
  "build",
  "node_modules",
  "reports",
  "target",
]
ignore_globs = [
  "*/__pycache__",
  "rust/agent-canon/target",
  "rust/agent-canon/target/**",
  "tools/**/__pycache__",
]

[[profile]]
id = "agent_canon_standalone"
summary = "Standalone AgentCanon repository checkout."
detect_all = [
  "ROOT_AGENTS.md",
  "agents/TASK_WORKFLOWS.md",
  "documents/shared-runtime-surfaces.toml",
  "tools/catalog.yaml",
  "rust/agent-canon/Cargo.toml",
]
extra_top_level_severity = "warn"
allowed_top_level = [
  ".agents",
  ".codex",
  ".devcontainer",
  ".dockerignore",
  ".github",
  ".gitignore",
  ".vscode",
  "AGENTS.md",
  "CONTAINER_OPERATIONS.md",
  "LICENSE",
  "PHILOSOPHY.md",
  "README.md",
  "ROOT_AGENTS.md",
  "agent-canon-environment.toml",
  "agents",
  "codex-cli-guide",
  "completion-first-review",
  "documents",
  "evidence",
  "experiments",
  "goal.md",
  "helper_inventory_guard_policy.json",
  "issues",
  "mcp",
  "memory",
  "notes",
  "references",
  "responsibility-scope.toml",
  "rust",
  "tests",
  "tools",
  "vendor",
]

[[profile.required]]
path = "README.md"
kind = "file"
category = "root_document"

[[profile.required]]
path = "ROOT_AGENTS.md"
kind = "file"
category = "agent_instruction"

[[profile.required]]
path = "AGENTS.md"
kind = "file"
category = "agent_instruction"

[[profile.required]]
path = "agents"
kind = "dir"
category = "agent_runtime"

[[profile.required]]
path = "agents/skills"
kind = "dir"
category = "agent_runtime"

[[profile.required]]
path = "agents/internal-routines"
kind = "dir"
category = "agent_runtime"

[[profile.required]]
path = "agents/workflows"
kind = "dir"
category = "agent_runtime"

[[profile.required]]
path = "agents/canonical"
kind = "dir"
category = "agent_runtime"

[[profile.required]]
path = "agents/TASK_WORKFLOWS.md"
kind = "file"
category = "agent_runtime"

[[profile.required]]
path = "documents"
kind = "dir"
category = "documents"

[[profile.required]]
path = "documents/tools"
kind = "dir"
category = "documents"

[[profile.required]]
path = "documents/shared-runtime-surfaces.toml"
kind = "file"
category = "shared_surface_contract"

[[profile.required]]
path = "documents/repo-structure-contract.toml"
kind = "file"
category = "repo_structure_contract"

[[profile.required]]
path = "tools"
kind = "dir"
category = "tooling"

[[profile.required]]
path = "tools/catalog.yaml"
kind = "file"
category = "tooling"

[[profile.required]]
path = "tools/agent_tools"
kind = "dir"
category = "tooling"

[[profile.required]]
path = "tools/user"
kind = "dir"
category = "tooling"

[[profile.required]]
path = "tools/internal"
kind = "dir"
category = "tooling"

[[profile.required]]
path = "tools/ci"
kind = "dir"
category = "tooling"

[[profile.required]]
path = "rust/agent-canon"
kind = "dir"
category = "compiled_tooling"

[[profile.required]]
path = "rust/agent-canon/Cargo.toml"
kind = "file"
category = "compiled_tooling"

[[profile.required]]
path = "tests/agent_tools"
kind = "dir"
category = "tests"

[[profile.required]]
path = "memory"
kind = "dir"
category = "durable_state"

[[profile.required]]
path = "notes"
kind = "dir"
category = "durable_state"

[[profile.required]]
path = "issues"
kind = "dir"
category = "durable_state"

[[profile.optional]]
path = "references"
kind = "dir"
category = "reference_material"

[[profile.optional]]
path = "PHILOSOPHY.md"
kind = "file"
category = "durable_state"

[[profile.optional]]
path = "experiments"
kind = "dir"
category = "research_artifacts"

[[profile.optional]]
path = "vendor"
kind = "dir"
category = "vendored_assets"

[[profile]]
id = "template_or_derived_repo"
summary = "Template or derived repository that consumes AgentCanon as vendor/agent-canon."
detect_all = [
  ".gitmodules",
  "vendor/agent-canon",
]
extra_top_level_severity = "warn"
allowed_top_level = [
  ".agents",
  ".codex",
  ".devcontainer",
  ".dockerignore",
  ".github",
  ".gitignore",
  ".gitmodules",
  ".markdownlint.json",
  ".vscode",
  "AGENTS.md",
  "CMakeLists.txt",
  "LICENSE",
  "Makefile",
  "QUICK_START.md",
  "README.md",
  "agents",
  "cmake",
  "docker",
  "documents",
  "evidence",
  "experiments",
  "goal.md",
  "include",
  "lib",
  "mcp",
  "memory",
  "notes",
  "pyproject.toml",
  "pyrightconfig.json",
  "python",
  "references",
  "responsibility-scope.toml",
  "scripts",
  "src",
  "tests",
  "tools",
  "vendor",
]

[[profile.required]]
path = "README.md"
kind = "file"
category = "parent_document"

[[profile.required]]
path = "AGENTS.md"
kind = "any"
category = "agent_instruction"

[[profile.required]]
path = ".gitmodules"
kind = "file"
category = "agent_canon_submodule"

[[profile.required]]
path = "vendor/agent-canon"
kind = "dir"
category = "agent_canon_submodule"

[[profile.required]]
path = "tools"
kind = "any"
category = "shared_runtime_view"

[[profile.required]]
path = "agents"
kind = "any"
category = "shared_runtime_view"

[[profile.required]]
path = ".codex"
kind = "dir"
category = "shared_runtime_view"

[[profile.required]]
path = ".devcontainer"
kind = "any"
category = "shared_runtime_view"

[[profile.required]]
path = ".vscode"
kind = "any"
category = "shared_runtime_view"

[[profile.required]]
path = "documents/README.md"
kind = "file"
category = "parent_active_contract"

[[profile.required]]
path = "goal.md"
kind = "file"
category = "parent_state"

[[profile.required]]
