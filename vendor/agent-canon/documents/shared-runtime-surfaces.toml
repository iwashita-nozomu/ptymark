# @dependency-start
# contract reference
# responsibility Defines machine-readable AgentCanon root runtime surface ownership.
# upstream design ./SHARED_RUNTIME_SURFACES.md shared runtime surface policy
# downstream implementation ../tools/agent_tools/surface_manifest.py parses this manifest
# downstream implementation ../tools/sync_agent_canon.sh consumes link and copy specs
# @dependency-end

version = 1
prefix = "vendor/agent-canon"

[[surface]]
path = "AGENTS.md"
mode = "symlink"
source = "ROOT_AGENTS.md"
owner = "agent-canon"
class = "runtime_surface"

[[group]]
mode = "symlink"
owner = "agent-canon"
class = "runtime_surface"
paths = [
  "agents",
  ".agents",
  ".vscode",
  ".codex/config.toml",
  ".codex/README.md",
  ".codex/agents",
  ".codex/hooks.json",
