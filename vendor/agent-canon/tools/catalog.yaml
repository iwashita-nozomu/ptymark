# @dependency-start
# contract registry
# responsibility Defines the structured AgentCanon tool catalog.
# upstream design README.md shared tool family ownership
# upstream design ../documents/repo-local-tool-imports.md legacy import disposition ledger
# downstream implementation agent_tools/tool_catalog.py validates this catalog
# downstream implementation agent_tools/tool_drift.py checks catalog drift contracts
# downstream implementation agent_tools/check_design_doc_claims.py validates design-document evidence claims
# downstream design ../documents/tools/tool-docs.toml maps same-named tool docs
# @dependency-end

version: 1
catalog_kind: agent_canon_tool_catalog
scope: shared_canon

status_values:
  - canonical
  - compatibility_wrapper
  - optional
  - maintainer_only
  - retired

family_values:
  - agent_tools
  - ci
  - docs
  - oop_python
  - oop_cpp
  - data
  - hlo
  - audit
  - experiments
  - validation
  - root

role_values:
  - audit
  - catalog
  - checker
  - compatibility
  - docs
  - experiment
  - helper
  - inventory
  - runner
  - sync
  - workflow

audience_values:
  - user
  - agent
  - skill
  - workflow
  - maintainer
  - internal

placement_values:
  - user_entrypoint
  - skill_helper
  - workflow_helper
  - validation_checker
  - ci_gate
  - compatibility_wrapper
  - support_library

families:
  agent_tools:
    root: tools/agent_tools
    summary: Agent workflow, dependency, convention, review, and runtime helpers.
    audience: agent
    placement: workflow_helper
  ci:
    root: tools/ci
    summary: CI, GitHub workflow, container, and repository readiness entrypoints.
    audience: user
    placement: ci_gate
  docs:
    root: tools/docs
    summary: Markdown, link, design-document, and skill-shim maintenance helpers.
    audience: skill
    placement: skill_helper
  oop_python:
    root: tools/oop/python
    summary: Python-specific OOP readability and rule inventory tools.
    audience: user
    placement: validation_checker
  oop_cpp:
    root: tools/oop/cpp
    summary: C++-specific OOP readability and rule inventory tools.
    audience: user
    placement: validation_checker
  data:
    root: tools/data
    summary: Portable result-data transformations.
    audience: agent
    placement: support_library
  hlo:
    root: tools/hlo
    summary: HLO result summarization helpers.
    audience: agent
    placement: support_library
  audit:
    root: tools/audit
    summary: Portable audit log schema and writer helpers.
    audience: internal
    placement: support_library
  experiments:
    root: tools/experiments
    summary: Shared experiment scaffold, registry, and managed-run helpers.
    audience: user
    placement: user_entrypoint
  validation:
    root: tools/validation
    summary: Generic validation helpers used by compatibility wrappers.
    audience: agent
    placement: validation_checker
  root:
    root: tools
    summary: Top-level shared automation entrypoints and compatibility wrappers.
    audience: user
    placement: user_entrypoint

default_wiring_docs:
  - tools/README.md
  - documents/tools/README.md
  - documents/tools/tool-docs.toml

entries:
  - id: tool-catalog
    summary: Validates the structured tool catalog and renders the tool crosswalk.
    path: tools/agent_tools/tool_catalog.py
    family: agent_tools
    role: catalog
    status: canonical
    command: python3 tools/agent_tools/tool_catalog.py
    writes: false
    default_wiring:
      ci: false
      pr_check: false
    docs:
      - tools/README.md
      - documents/tools/README.md
    tests:
      - tests/agent_tools/test_tool_catalog.py

  - id: tool-drift
