# @dependency-start
# contract data
# responsibility Registers issue-derived AgentCanon behavior eval cases.
# upstream design ../../documents/prompt-skill-evaluation-checklist.md defines eval taxonomy and close conditions.
# upstream design ../../issues/README.md defines durable operational issue storage.
# downstream implementation ../../tools/agent_tools/evaluate_skill_workflow_prompts.py consumes skill/workflow eval patterns.
# downstream implementation ../../tools/agent_tools/eval_accumulation_check.py validates eval accumulation surfaces.
# @dependency-end

catalog_kind = "agent_canon_issue_eval_manifest"
version = 1

[[eval]]
id = "helper-change-authority-before-helper"
category = "helper-sprawl"
source_issue = 102
oracle_type = "machine"
protects = [
  "no helper addition without path and qualname authority",
  "no unrelated docs/test/issue edits as helper-first bypass",
]
expected_route = [
  "inspect existing helpers",
  "record helper_change authority with owner, caller, existing-helper gap, and tests",
]
forbidden_route = [
  "add helper-like function with only unrelated boundary evidence",
]
linked_rules = [
  ".codex/hooks/helper_first_guard.py",
  "tools/agent_tools/task_authority.py",
]

