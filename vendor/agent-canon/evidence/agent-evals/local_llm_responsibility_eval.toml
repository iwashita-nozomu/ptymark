# @dependency-start
# contract data
# responsibility Defines local LLM single-file responsibility eval cases.
# upstream design README.md eval directory contract
# upstream design ../../documents/local-llm-responsibility-analysis.md single-file local LLM scope policy
# downstream implementation ../../rust/agent-canon/src/local_llm.rs routes this eval through the Rust CLI
# downstream implementation ../../tools/agent_tools/local_llm_eval.py runs this manifest
# downstream implementation ../../tests/agent_tools/test_local_llm_eval.py tests manifest execution
# @dependency-end

catalog_kind = "agent_canon_local_llm_responsibility_eval"
version = 1

[[evals]]
id = "single-file-responsibility-boundary"
target = "tools/agent_tools/file_responsibility_llm.py"
description = "The local LLM responsibility prompt must stay limited to exactly one file and advisory output."
required_prompt_regex = [
  "Scope: exactly one file",
  "Do not infer repo-wide ownership",
  "Primary authority remains dependency headers, tool catalog, and responsibility manifests",
  "Missing Protecting Tool Or Issue Evidence",
  "Deterministic Follow-Up Checks",
]
forbidden_prompt_regex = [
  "You may edit",
  "Decide repo-wide ownership",
  "CI pass/fail authority",
]
