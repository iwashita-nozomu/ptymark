# @dependency-start
# contract data
# responsibility Defines deterministic prompt-to-workflow routing eval cases.
# upstream design README.md workflow selection eval contract
# upstream implementation ../../.codex/hooks/skill_usage_logger.py owns prompt-intake workflow classification
# downstream implementation ../../tools/agent_tools/evaluate_workflow_selection.py runs these evals
# downstream implementation ../../tests/agent_tools/test_evaluate_workflow_selection.py tests routing eval behavior
# @dependency-end

catalog_kind = "agent_canon_workflow_selection_eval"
version = 2
expected_case_count = 525
expected_generated_case_count = 525

