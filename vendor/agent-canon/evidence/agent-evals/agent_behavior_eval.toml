# @dependency-start
# contract data
# responsibility Defines deterministic run-bundle evals for observable agent behavior.
# upstream design README.md eval directory contract
# upstream design ../../agents/templates/workflow_monitoring.md stores behavior events during a run
# downstream implementation ../../tools/agent_tools/evaluate_agent_run.py consumes these criteria
# downstream implementation ../../tests/agent_tools/test_evaluate_agent_run.py verifies behavior scoring
# @dependency-end

version = 1

[[criteria]]
name = "skill_invocation_recorded"
max_score = 5
feedback = "Record the selected skills and the invoked skill surface in workflow_monitoring.md Behavior Events."
required_all = ["## Behavior Events"]
required_any = ["skill_invocation=", "skill_invocation_not_required"]

[[criteria]]
name = "stage_and_subagent_behavior_recorded"
max_score = 5
feedback = "Record stage ownership and subagent routing or explicit parent-direct rationale as behavior evidence."
required_any = ["subagent_routing=", "stage owner", "parent_direct_reason", "trivial_direct_edit"]

[[criteria]]
name = "tool_gate_behavior_recorded"
max_score = 5
feedback = "Record required tool gates as behavior events before closeout."
required_any = [
  "tool_call=run_repo_dependency_review.sh",
  "repo_dependency_review=pass",
  "tool_call=make ci",
  "static_analysis=pass",
  "tool_call=check_convention_compliance.py",
  "CONVENTION_COMPLIANCE=pass",
]

[[criteria]]
name = "static_analysis_feedback_recorded"
max_score = 5
feedback = "Record static-analysis feedback and the skill/workflow prompt destination that received or explicitly rejected it."
required_any = [
  "static_analysis_feedback=applied",
  "static_analysis_feedback=recorded",
  "static_analysis_feedback_not_applicable",
]
forbidden_any = [
  "static_analysis_feedback=pending",
  "static_analysis_feedback=missing",
]

[[criteria]]
name = "code_checker_results_recorded"
max_score = 5
feedback = "Record code checker results as behavior-eval evidence, or explicitly mark code checkers not required for advisory runs."
required_any = [
  "code_checker=pass",
  "code_checker=fail",
  "code_checker_not_required",
  "tool_call=pyright",
  "tool_call=ruff",
  "tool_call=oop-readability-check",
]
forbidden_any = [
  "code_checker=pending",
  "code_checker=missing",
]

[[criteria]]
name = "validation_failure_response_recorded"
max_score = 5
feedback = "Validation/check failures must record failing_contract, observation_level, cause_classification, intent_preservation, and evidence before weakening or deleting an oracle."
required_any = [
  "validation_failure_not_observed",
  "check_failure=observed",
  "validation_status=fail",
  "code_checker=fail",
  "EVAL_STATUS=fail",
  "CONVENTION_COMPLIANCE=fail",
]
forbidden_any = [
  "oracle_weakening=",
  "oracle_deleted=",
  "test_deleted=",
  "behavior_simplified=",
  "validation_downscope=",
]

[[criteria]]
name = "hook_tool_protocol_feedback_recorded"
max_score = 5
feedback = "Record how hook and tool results changed or explicitly did not change parent and subagent protocol."
required_all = [
  "hook_tool_feedback=",
  "parent_protocol_update=",
  "subagent_protocol_update=",
  "protocol_feedback_reason=",
]
required_any = [
  "hook_tool_feedback=reviewed",
  "hook_tool_feedback_not_required",
]
forbidden_any = [
  "hook_tool_feedback=pending",
  "hook_tool_feedback=missing",
  "parent_protocol_update=pending",
  "parent_protocol_update=missing",
  "subagent_protocol_update=pending",
  "subagent_protocol_update=missing",
]

[[criteria]]
name = "execution_path_efficiency_recorded"
max_score = 5
feedback = "Compare two run paths when behavior may differ, record the selected route, and prevent known inefficient routes."
required_any = [
  "execution_path_comparison=pass",
  "execution_path_comparison_not_required",
]
forbidden_any = [
  "route_efficiency=inefficient",
  "selected_inefficient_route=yes",
]

[[criteria]]
name = "token_efficiency_recorded"
max_score = 5
feedback = "Record baseline and candidate token footprints plus the measured ratio in workflow monitoring."
required_any = [
  "token_footprint_comparison=",
  "TOKEN_FOOTPRINT_COMPARISON=",
  "token_ratio=",
  "TOKEN_FOOTPRINT_RATIO=",
  "token_efficiency_not_required",
]
required_all = [
  "baseline_total",
  "candidate_total",
]

[[criteria]]
name = "prompt_eval_behavior_recorded"
max_score = 5
feedback = "Record accumulated prompt eval behavior whenever a skill is used."
required_any = [
  "tool_call=evaluate_skill_workflow_prompts.py",
  "prompt_eval=pass",
  "EVAL_STATUS=pass",
]
required_all = [
  "EVAL_RUN_ID=",
  "EVAL_USED_SKILLS=",
  "EVAL_ACCUMULATED_REPORT=",
]

[[criteria]]
name = "runtime_feedback_prompt_update_recorded"
max_score = 5
feedback = "Record any user/reviewer runtime feedback as a structured event and route it to a skill, workflow, eval, memory, or explicit no-op decision."
required_any = [
  "runtime_feedback=observed",
  "runtime_feedback_not_observed",
]
forbidden_any = [
  "runtime_feedback=pending",
  "runtime_feedback=missing",
]

[[criteria]]
name = "review_feedback_behavior_recorded"
max_score = 5
feedback = "Record review decisions and feedback resolution as observable behavior."
required_any = [
  "review_decision=approve",
  "review_findings_integrated=yes",
  "feedback_actions_resolved: yes",
]

[[criteria]]
name = "subagent_lifecycle_behavior_recorded"
max_score = 5
feedback = "Record fresh subagent lifecycle policy and closeout evidence, or explicit no-subagent justification."
required_any = [
  "subagents_closed=yes",
  "fresh_subagents_required",
  "subagent_lifecycle=closed",
  "parent_direct_reason",
]

[[criteria]]
name = "diff_check_behavior_recorded"
max_score = 5
feedback = "Record independent diff-check behavior, or explicit no-diff rationale for non-changing advisory tasks."
required_any = [
  "diff_check_agent_complete=yes",
  "diff_check_agent_decision=approve",
  "diff_check_not_required",
]

[[criteria]]
name = "self_improvement_decision_recorded"
max_score = 5
source = "bundle"
feedback = "Record skill/config/workflow/memory improvement decisions after behavior evaluation."
required_all = [
  "skill_improvement_decision:",
  "config_improvement_decision:",
  "workflow_improvement_decision:",
  "memory_learning_decision:",
]
