# @dependency-start
# contract data
# responsibility Defines deterministic evals for skill and workflow prompt drift.
# upstream design README.md prompt eval directory contract
# upstream design ../../agents/skills/adaptive-improvement-loop.md adaptive improvement skill contract
# upstream design ../../agents/skills/academic-writing.md Academic Writing TeX routing contract
# upstream design ../../agents/skills/structure-planning.md reusable structure planning skill contract
# upstream design ../../agents/skills/html-output.md explicit HTML output and browser publication skill contract
# upstream design ../../agents/skills/save-experiment-results.md experiment result saving skill contract
# upstream design ../../agents/internal-routines/README.md internal routine document owner surface
# downstream implementation ../../tools/agent_tools/evaluate_skill_workflow_prompts.py runs these evals
# @dependency-end

version = 1

[[evals]]
id = "all-discoverable-skill-shims"
target_glob = ".agents/skills/*/SKILL.md"
expected_count = 55
kind = "skill"
description = "Every discoverable Codex skill shim must be loadable and dependency-linked."

[[evals.checklist]]
id = "SKILL-SHIM-GENERIC-1"
critical = true
description = "Starts with YAML frontmatter and includes required name/description fields."
required_regex = ["\\A---\\n", "\\nname:\\s*_?[a-z0-9]+(?:-[a-z0-9]+)*", "\\ndescription:\\s*\\S"]

[[evals.checklist]]
id = "SKILL-SHIM-GENERIC-2"
critical = true
description = "Includes dependency manifest markers near the top of the file."
required_regex = ["@dependency-start", "@dependency-end"]

[[evals.checklist]]
id = "SKILL-SHIM-GENERIC-3"
critical = true
description = "Provides an executable numbered instruction list."
required_regex = ["(?m)^1\\.\\s+"]

[[evals]]
id = "all-human-skill-docs"
target_glob = "agents/skills/*.md"
expected_count = 56
kind = "skill"
description = "Every human-facing skill document must be dependency-linked and reader-addressable."

[[evals.checklist]]
id = "SKILL-DOC-GENERIC-1"
critical = true
description = "Includes dependency manifest markers."
required_regex = ["@dependency-start", "@dependency-end"]

[[evals.checklist]]
id = "SKILL-DOC-GENERIC-2"
critical = true
description = "Includes a top-level Markdown title."
required_regex = ["(?m)^#\\s+"]

[[evals]]
id = "all-internal-routine-docs"
target_glob = "agents/internal-routines/*.md"
expected_count = 21
kind = "skill"
description = "Every workflow-owned internal routine document must be dependency-linked and reader-addressable."

[[evals.checklist]]
id = "INTERNAL-ROUTINE-DOC-GENERIC-1"
critical = true
description = "Includes dependency manifest markers."
required_regex = ["@dependency-start", "@dependency-end"]

[[evals.checklist]]
id = "INTERNAL-ROUTINE-DOC-GENERIC-2"
critical = true
description = "Includes a top-level Markdown title."
required_regex = ["(?m)^#\\s+"]

[[evals]]
id = "all-workflow-docs"
target_glob = "agents/workflows/*.md"
expected_count = 21
kind = "workflow"
description = "Every workflow document must be dependency-linked and reader-addressable."

[[evals.checklist]]
id = "WORKFLOW-GENERIC-1"
critical = true
description = "Includes dependency manifest markers."
required_regex = ["@dependency-start", "@dependency-end"]

[[evals.checklist]]
id = "WORKFLOW-GENERIC-2"
critical = true
description = "Includes a top-level Markdown title."
required_regex = ["(?m)^#\\s+"]

[[evals.checklist]]
id = "CONVENTION-WORKFLOW-1"
critical = true
description = "Every workflow calls the convention compliance verifier before closeout or handoff."
required_regex = [
  "run `python3 tools/agent_tools/check_convention_compliance\\.py`",
  "CONVENTION_COMPLIANCE=fail",
]
forbidden_regex = [
  "(?i)(do not|don't|never|skip|omit)\\s+.*check_convention_compliance\\.py",
  "(?i)check_convention_compliance\\.py.*(optional|not required)",
]

