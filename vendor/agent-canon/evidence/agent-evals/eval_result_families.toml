# @dependency-start
# contract data
# responsibility Declares accumulated eval result families and artifact contracts.
# upstream design README.md eval directory and accumulation contract
# upstream design ../../documents/runtime-log-archive.md runtime archive contract
# downstream implementation ../../tools/agent_tools/eval_accumulation_check.py validates these families
# downstream implementation ../../tools/agent_tools/generate_agent_runtime_dashboard.py summarizes these families
# @dependency-end

[[families]]
id = "skill-workflow-prompt"
check_id = "skill_eval"
count_label = "SKILL_REPORTS"
summary = "Skill and workflow prompt checklist eval reports."
producer = "tools/agent_tools/evaluate_skill_workflow_prompts.py --accumulate"
filename_regex = '^skill-eval-\d{8}T\d{12}Z-[0-9a-f]{10}-(?:pass|fail)-[a-z0-9-]+(?:-[a-z0-9-]+)*\.md$'
run_id_regex = '\bEVAL_RUN_ID=([A-Za-z0-9_.:-]+)'
missing_reports_detail = "no-skill-eval-reports"
missing_run_id_detail = "missing-eval-run-id"
duplicate_run_id_detail = "duplicate-eval-run-id"

