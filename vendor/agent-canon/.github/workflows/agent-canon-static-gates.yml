# @dependency-start
# contract configuration
# responsibility Runs lightweight AgentCanon static gates on PRs and branch pushes.
# upstream design ../../agents/workflows/agent-canon-pr-workflow.md agent-canon PR workflow
# upstream implementation ../../tools/agent_tools/tool_catalog.py validates tool catalog shape
# upstream implementation ../../tools/agent_tools/tool_drift.py rejects retired legacy tool surfaces
# upstream implementation ../../tools/agent_tools/responsibility_scope.py validates scope/tool ownership
# upstream implementation ../../tools/agent_tools/import_responsibility.py validates import ownership boundaries
# upstream implementation ../../tools/agent_tools/issue_sync.py validates local issue files
# upstream implementation ../../tools/agent_tools/run_accumulated_agent_evals.py writes required eval family reports before accumulation validation
# upstream implementation ../../tools/agent_tools/eval_accumulation_check.py validates eval result accumulation
# upstream implementation ../../tools/agent_tools/check_agent_runtime_alignment.py validates Codex runtime role config
# upstream implementation ../../tools/agent_tools/evaluate_codex_agent_roles.py validates Codex agent role prompts
# upstream implementation ../../tools/agent_tools/check_skill_frontmatter.py validates runtime skill YAML frontmatter
# upstream implementation ../../tools/agent_tools/smoke_test_research_perspective_pack.py validates research review pack routing
# upstream implementation ../../tools/agent_tools/evaluate_skill_workflow_prompts.py validates skill/workflow prompt surfaces
# upstream implementation ../../tools/agent_tools/check_convention_compliance.py validates convention gate wiring
# upstream implementation ../../rust/agent-canon/src/local_llm.rs validates local LLM Rust CLI routing
# upstream implementation ../../tools/agent_tools/local_llm_eval.py validates local LLM eval prompts
# upstream implementation ../../tools/agent_tools/evaluate_workflow_selection.py validates workflow routing eval prompts
# upstream implementation ../../tools/agent_tools/evaluate_report_quality.py validates report quality checklist prompts
# upstream implementation ../../tools/agent_tools/run_repo_dependency_review.sh checks dependency headers and graph
# upstream implementation ../../tools/ci/check_github_workflows.py validates workflow and PR template conventions
# @dependency-end

name: AgentCanon Static Gates

on:
  pull_request:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: agent-canon-static-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false

      - name: Checkout AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: bash tools/ci/checkout_agent_canon_submodule.sh

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install static gate dependencies
        run: python3 -m pip install --upgrade pyyaml tomli

      - name: Prepare runtime log archive
        run: mkdir -p .agent-canon/log-archive

      - name: Install Rust gate components
        run: rustup component add rustfmt clippy

      - name: Run static gates
        run: |
          cargo fmt --manifest-path rust/agent-canon/Cargo.toml -- --check
          cargo clippy --manifest-path rust/agent-canon/Cargo.toml --all-targets -- -D warnings
          cargo test --manifest-path rust/agent-canon/Cargo.toml
          python3 tools/agent_tools/tool_catalog.py
          python3 tools/agent_tools/tool_drift.py
          python3 tools/agent_tools/responsibility_scope.py
          BASE_REF="${GITHUB_BASE_REF:-main}"
          git fetch origin "${BASE_REF}" --depth=1 || true
          python3 tools/agent_tools/import_responsibility.py --changed --baseline-ref "origin/${BASE_REF}"
          python3 tools/agent_tools/issue_sync.py
          python3 tools/agent_tools/run_accumulated_agent_evals.py --run-id "agent-canon-static-gates-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          python3 tools/agent_tools/eval_accumulation_check.py
          python3 tools/agent_tools/check_agent_runtime_alignment.py
          python3 tools/agent_tools/check_skill_frontmatter.py
          python3 tools/agent_tools/smoke_test_research_perspective_pack.py
          python3 tools/agent_tools/check_convention_compliance.py
          bash tools/agent_tools/run_repo_dependency_review.sh --fail-missing --cycle-report-only
          python3 tools/ci/check_github_workflows.py
          python3 tools/ci/container_config.py
