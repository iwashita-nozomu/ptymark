# @dependency-start
# contract configuration
# responsibility Runs a manual smoke check for changed-path risk/profile classification.
# upstream design ../../documents/tools/classify_path_risk.md path/risk classifier contract
# upstream design ../../agents/workflows/agent-canon-pr-workflow.md PR validation routing
# upstream implementation ../../tools/agent_tools/classify_path_risk.py classifies paths into validation profiles
# upstream implementation ../../tools/ci/checkout_agent_canon_submodule.sh checks out AgentCanon when copied into template repos
# downstream implementation ../../tools/ci/check_github_workflows.py validates workflow conventions
# @dependency-end

name: Path Risk Check Matrix Smoke

on:
  workflow_dispatch:
    inputs:
      changed_paths:
        description: "Newline-delimited changed paths to classify"
        required: true
        type: string

permissions:
  contents: read

env:
  AGENT_CANON_REPO_SSH_KEY: ${{ secrets.AGENT_CANON_REPO_SSH_KEY }}

concurrency:
  group: path-risk-check-matrix-smoke-${{ github.ref }}
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false
          persist-credentials: false

      - name: Checkout AgentCanon submodule
        env:
          AGENT_CANON_REPO_TOKEN: ${{ secrets.AGENT_CANON_REPO_TOKEN }}
        run: |
          if [ -f .github/scripts/checkout_agent_canon_submodule.sh ]; then
            bash .github/scripts/checkout_agent_canon_submodule.sh
          else
            bash tools/ci/checkout_agent_canon_submodule.sh
          fi

      - name: Write changed path fixture
        run: |
          cat > "$RUNNER_TEMP/changed-paths.txt" <<'PATHS'
          ${{ inputs.changed_paths }}
          PATHS
      - name: Classify active risk/check profiles
        run: |
          python3 tools/agent_tools/classify_path_risk.py \
            --paths-file "$RUNNER_TEMP/changed-paths.txt" \
            --format text
