version: 1
# @dependency-start
# contract registry
# responsibility Catalogs canonical agent skills and their descriptions.
# downstream design ../canonical/CODEX_WORKFLOW.md consumes the skill catalog during task routing
# downstream implementation ../../tools/agent_tools/route.py consumes routing and related-skill metadata
# downstream implementation ../../tools/agent_tools/skill_tool_commands.py prints skill command packets with related skills
# downstream implementation ../../tools/agent_tools/check_agent_runtime_alignment.py validates public skill catalog consistency
# @dependency-end

skill_families:
  # Public user-facing skill ids use plain hyphen-case. Runtime-internal skill
  # shims use .agents/skills/_<name>/SKILL.md and stay owner-routed.
  - id: agent-orchestration
    purpose: Mandatory routing skill for repository tasks; selects workflow family, skills, review roles, and runtime entrypoints before execution.
    canonical_doc: agents/skills/agent-orchestration.md
    shim: .agents/skills/agent-orchestration/SKILL.md
    related_skills:
      - task-routing
      - codex-task-workflow
      - owner-bounded-routing
      - subagent-bootstrap
      - dependency-analysis
    routing:
      stage_policy: active
      reason: workflow, skill, subagent, or stage routing is part of the request
