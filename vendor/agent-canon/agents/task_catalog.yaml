# @dependency-start
# contract registry
# responsibility Maps task identifiers to workflow and review defaults.
# downstream design canonical/CODEX_WORKFLOW.md workflow consumes task routing catalog
# downstream design canonical/CODEX_SUBAGENTS.md Codex subagent inventory consumes task routing
# downstream implementation ../.codex/config.toml Codex runtime config consumes task routing
# @dependency-end
version: 2

role_topology_defaults: &standard_role_topology
  role_families:
    intake:
      - requirements_organizer
      - explorer
      - execution_planner
    planning:
      - execution_planner
      - plan_reviewer
    design:
      - detailed_designer
      - detailed_design_reviewer
      - document_flow_reviewer
      - test_designer
    implementation:
      - spark_worker
      - worker
    review:
      - python_reviewer
      - cpp_reviewer
      - diff_triage_reviewer
      - reviewer
      - ship_reviewer
    perspective_review:
      - reproducibility_reviewer
      - artifact_reviewer
      - benchmark_reviewer
      - fair_data_reviewer
      - ml_science_reviewer
      - scientific_computing_reviewer
  same_role_parallel_instances:
    status: allowed_with_distinct_packets
    identity_key: role_type+instance_id
    read_only: allowed_when_input_packets_or_review_focus_are_distinct
    write_capable: allowed_only_with_disjoint_write_scopes_and_parent_integration_order
    collision_policy: serialize_current_checkout_waves
    runtime_threads_are_cardinality_source: false

workflow_families:
  - id: owner_bounded_change
    name: Owner-Bounded Change
    subagent_prompt:
      purpose: Prompt packet for owner-bounded fixes whose replaceable unit, public-impact boundary, and local validation route are already evidenced.
      prompt_preamble:
        - Treat this as an owner-bounded fix; route to `scoped_change` when public API, dependency, workflow, or specification interpretation is involved.
        - Start from the run bundle, user_request_contract.md, schedule.md, and team_manifest.yaml; do not rely on chat-only summaries.
        - Include request_clause_ids, expected artifact path, parent-assigned write scope, validation command, and next review gate in every handoff.
      workflow_focus:
        - Use `explorer`, `test_designer`, `spark_worker`, and language-specific reviewers before broad generic review.
        - Keep this route only when the run's abstract responsibility frame derives a bounded implementation slice with public interface unchanged, no dependency change, no specification interpretation, and local validation. File count is not enough to select or keep this route.
        - Require detailed design review approval before implementation handoff for any produced `design_brief.md` or equivalent detailed design artifact; document-flow and broad design review stay tied to reader-facing docs, new terms, public APIs, or workflow surfaces.
        - Escalate to `scoped_change` when the owner boundary is non-obvious, validation is cross-module, or the diff-triage reviewer returns escalate.
      reviewer_prompt:
        - Prefer language-specific and diff-triage findings before broad review.
        - Block completion if validation is missing, request clauses are not mapped, or write scope expanded beyond the owner-bounded route.
    spawn_budget:
      active_subagents: 4
      max_write_subagents: 2
    role_topology: *standard_role_topology
    roles:
      always_on:
        - manager
        - implementer
        - change_reviewer
        - verifier
        - auditor
      specialists:
        - test_designer
        - python_reviewer
        - cpp_reviewer
        - docs_workflow_steward
    tasks:
      - T1
      - T2

  - id: scoped_change
    name: Scoped Change
    subagent_prompt:
      purpose: Prompt packet for owner-bounded repo changes that still need the full staged gate sequence.
      prompt_preamble:
        - Treat this template repository as the default implementation starting point; do not route work to another repository unless the parent explicitly says so.
        - Start from the run bundle, user_request_contract.md, schedule.md, and team_manifest.yaml; do not rely on chat-only summaries.
        - Include request_clause_ids, expected artifact path, parent-assigned write scope, validation command, and next review gate in every handoff.
      workflow_focus:
        - Follow `.codex/agents/*.toml` model and reasoning settings: keep repo inventory, tool drift survey, machine-report summarization, and execution-only log work on mini helper roles; route review, quality-check, static validation triage, diff-local language review, bounded review, report traceability, and checklist gates to frontier review roles; route Abstract Design Frame-derived eligible bounded implementation slices to `spark_worker`; use frontier roles for review/quality gates, synthesis, design judgment, conflict resolution, and final approval.
        - Treat a bounded implementation slice as Spark-eligible only when it is derived from the Abstract Design Frame and design trace, one file or one abstraction unit, public interface unchanged, no dependency change, no specification interpretation, and locally testable.
        - Keep the diff tied to the assigned responsibility boundary, but do not skip requirements, plan, design, document-flow, test-design, review, validation, or closeout gates when this full scoped route is active.
        - When fix-surface selection is non-obvious, run hypothesis-validation workflow before implementation.
        - Prefer existing names, helpers, tests, and docs over new surfaces; record why reuse is insufficient before proposing new files.
        - Treat one fix, chunk, or checkpoint as internal progress until every active clause and planned work unit is complete.
      reviewer_prompt:
        - Verify behavior, tests, docs, and request-clause coverage rather than only checking style.
        - Block completion if validation is only partial or if review findings were recorded but not integrated.
    spawn_budget:
      active_subagents: 8
      max_write_subagents: 2
    role_topology: *standard_role_topology
    roles:
      always_on:
        - manager
        - manager_reviewer
        - designer
        - design_reviewer
        - document_flow_reviewer
        - implementer
        - change_reviewer
        - final_reviewer
        - verifier
        - auditor
      specialists:
        - scheduler
        - schedule_reviewer
        - docs_workflow_steward
        - test_designer
        - python_reviewer
        - cpp_reviewer
    tasks:
      - T3

  - id: research_driven_change
    name: Research-Driven Change
    subagent_prompt:
      purpose: Prompt packet for research-backed implementation, experiment, benchmark, report, and academic-writing tasks.
      prompt_preamble:
        - Treat this template repository as the default implementation starting point; external sources inform the work but do not replace repo-local artifacts.
        - Emit the skill call sequence with literature-survey before research-workflow when primary sources, prior art, official docs, or source-backed implementation claims are used; carry the source packet and adoption/exclusion decisions into design, implementation, benchmark, and report handoffs.
        - Start from the run bundle, user_request_contract.md, schedule.md, research_notes.md or cited sources, and team_manifest.yaml.
        - Separate correctness evidence, performance evidence, and reporting claims in the handoff.
      workflow_focus:
        - Follow `.codex/agents/*.toml` model and reasoning settings: keep repo inventory, tool drift survey, machine-report summarization, and execution-only log work on mini helper roles; route review, quality-check, static validation triage, diff-local language review, bounded review, report traceability, and checklist gates to frontier review roles; route Abstract Design Frame-derived eligible bounded implementation slices to `spark_worker`; use frontier roles for review/quality gates, synthesis, design judgment, conflict resolution, and final approval.
        - Treat a bounded implementation slice as Spark-eligible only when it is derived from the Abstract Design Frame and design trace, one file or one abstraction unit, public interface unchanged, no dependency change, no specification interpretation, and locally testable.
        - Use primary sources or official docs for external claims, and record search terms, source class, limitations, and contradictory evidence.
        - Treat literature-survey as the source packet owner and research-workflow as the outer loop owner; do not let implementation, experiment, report, or follow-up branches close source-backed claims without source packet evidence, limitations, and adoption/exclusion decisions.
        - Use hypothesis-validation workflow when analysis must decide the code or document surface to modify before the experiment or implementation slice.
        - Keep experiment protocol, code change, runtime flag change, and report interpretation separated unless one explicit clause authorizes combining them.
        - Preserve provenance: commands, seeds, environment, raw result paths, and rerun instructions.
      reviewer_prompt:
        - Block overclaims, spot/debug/partial evidence used as formal evidence, missing baselines, and missing reproducibility artifacts.
        - For paper-like work, keep citation/evidence, notation, logic, and document-flow review as separate passes.
    spawn_budget:
      active_subagents: 12
      max_write_subagents: 3
    role_topology: *standard_role_topology
    roles:
      always_on:
        - manager
        - manager_reviewer
        - designer
        - design_reviewer
        - document_flow_reviewer
        - implementer
        - change_reviewer
        - final_reviewer
        - verifier
        - auditor
      specialists:
        - researcher
        - research_reviewer
        - scheduler
        - schedule_reviewer
        - report_reviewer
        - citation_evidence_reviewer
        - test_designer
        - python_reviewer
        - cpp_reviewer
        - notation_definition_reviewer
        - logic_gap_reviewer
        - experimenter
        - experiment_reviewer
        - reproducibility_reviewer
        - scientific_computing_reviewer
        - benchmark_reviewer
        - artifact_reviewer
        - fair_data_reviewer
        - ml_science_reviewer
    tasks:
      - T4
      - T5
      - T9
      - T10

  - id: large_delivery
    name: Large Delivery
    subagent_prompt:
      purpose: Prompt packet for multi-surface delivery, new feature work, and large refactors.
      prompt_preamble:
        - Treat this template repository as the default implementation starting point and keep durable product state in canonical current-tree paths only.
        - Start from the run bundle, user_request_contract.md, schedule.md, design_brief.md, and team_manifest.yaml.
        - Name the milestone, chunk, request_clause_ids, write scope, rollback point, and next gate in each handoff.
      workflow_focus:
        - Follow `.codex/agents/*.toml` model and reasoning settings: keep repo inventory, tool drift survey, machine-report summarization, and execution-only log work on mini helper roles; route review, quality-check, static validation triage, diff-local language review, bounded review, report traceability, and checklist gates to frontier review roles; route Abstract Design Frame-derived eligible bounded implementation slices to `spark_worker`; use frontier roles for review/quality gates, synthesis, design judgment, conflict resolution, and final approval.
        - Treat a bounded implementation slice as Spark-eligible only when it is derived from the Abstract Design Frame and design trace, one file or one abstraction unit, public interface unchanged, no dependency change, no specification interpretation, and locally testable.
        - Define milestone and chunk boundaries before implementation; chunks are not user-facing completion.
        - Use hypothesis-validation workflow to justify the selected refactor or feature surface before moving code.
        - For refactors, require behavior contract, allowed structural delta, forbidden semantic delta, files to remove or move, and path mapping before editing.
        - Sweep stale references after renames or structure changes before closeout.
      reviewer_prompt:
        - Block hidden semantic changes, incomplete path mapping, stale docs, and parallel durable truth surfaces.
        - Verify every chunk maps back to the umbrella completion boundary.
    spawn_budget:
      active_subagents: 10
      max_write_subagents: 3
    role_topology: *standard_role_topology
    roles:
      always_on:
        - manager
        - manager_reviewer
        - designer
        - design_reviewer
        - document_flow_reviewer
        - implementer
        - change_reviewer
        - final_reviewer
        - verifier
        - auditor
      specialists:
        - scheduler
        - schedule_reviewer
        - test_designer
        - project_reviewer
        - docs_workflow_steward
        - python_reviewer
        - cpp_reviewer
    tasks:
      - T6
      - T7

  - id: platform_and_environment
    name: Platform And Environment
    subagent_prompt:
      purpose: Prompt packet for Docker, CI, dependency, runtime, and development-environment changes.
      prompt_preamble:
        - Treat this template repository as the default implementation starting point; environment changes must support the template workflow first.
        - Start from the run bundle, environment_change_proposal.md, user_request_contract.md, schedule.md, and team_manifest.yaml.
        - State the triggering code requirement, blocked command, source-of-truth surface, rollback path, and validation command in every handoff.
      workflow_focus:
        - Follow `.codex/agents/*.toml` model and reasoning settings: keep repo inventory, tool drift survey, machine-report summarization, and execution-only log work on mini helper roles; route review, quality-check, static validation triage, diff-local language review, bounded review, report traceability, and checklist gates to frontier review roles; route Abstract Design Frame-derived eligible bounded implementation slices to `spark_worker`; use frontier roles for review/quality gates, synthesis, design judgment, conflict resolution, and final approval.
        - Treat a bounded implementation slice as Spark-eligible only when it is derived from the Abstract Design Frame and design trace, one file or one abstraction unit, public interface unchanged, no dependency change, no specification interpretation, and locally testable.
        - Prefer existing dependency surfaces and canonical environment helpers over ad hoc setup.
        - Do not create repo-local virtual environments on host runtime; use the canonical environment policy.
        - Keep Docker, CI, lock/dependency, and runtime-doc changes consistent.
      reviewer_prompt:
        - Block environment changes without a code requirement, rollback path, or validation evidence.
        - Verify docs, CI, Docker packs, and local developer commands remain aligned.
    spawn_budget:
      active_subagents: 10
      max_write_subagents: 2
    role_topology: *standard_role_topology
    roles:
      always_on:
        - manager
        - manager_reviewer
        - designer
        - design_reviewer
        - document_flow_reviewer
        - implementer
        - change_reviewer
        - final_reviewer
        - verifier
        - auditor
      specialists:
        - infra_steward
        - infra_reviewer
        - scheduler
        - schedule_reviewer
        - docs_workflow_steward
        - test_designer
        - python_reviewer
        - cpp_reviewer
    tasks:
      - T8

  - id: comprehensive_development
    name: Comprehensive Development
    subagent_prompt:
      purpose: Prompt packet for repo-wide workflow, tooling, runtime, docs, and canon rearchitecture.
      prompt_preamble:
        - Treat this template repository as the default implementation starting point and the integration reference for derived repos.
        - Start from the run bundle, user_request_contract.md, schedule.md, project_review.md, docs_workflow_review.md, and team_manifest.yaml.
        - Name all affected surfaces, request_clause_ids, canonical paths, expected validation, and next review gate in every handoff.
      workflow_focus:
        - Follow `.codex/agents/*.toml` model and reasoning settings: keep repo inventory, tool drift survey, machine-report summarization, and execution-only log work on mini helper roles; route review, quality-check, static validation triage, diff-local language review, bounded review, report traceability, and checklist gates to frontier review roles; route Abstract Design Frame-derived eligible bounded implementation slices to `spark_worker`; use frontier roles for review/quality gates, synthesis, design judgment, conflict resolution, and final approval.
        - Treat a bounded implementation slice as Spark-eligible only when it is derived from the Abstract Design Frame and design trace, one file or one abstraction unit, public interface unchanged, no dependency change, no specification interpretation, and locally testable.
        - Review repo-wide integration risk through compact tool output, dependency-expanded path lists, and bounded canon slices; do not hand agents the whole repository as their read scope.
        - For AgentCanon tasks, classify whether the change is standalone AgentCanon source, template parent gitlink, root shared-surface sync, or derived repo proposal before editing.
        - For analysis-heavy changes, require separate code dependency and header dependency evidence before design approval.
        - Update docs, tests, runtime helpers, skill shims, mirrors, and validation tools together when the behavior crosses those surfaces.
        - Use `prompt_config_reviewer` before editing prompt, routing, or subagent-config policy surfaces.
        - Preserve parent-managed write-scope discipline; concurrent write-capable agents require disjoint paths in the current checkout, and colliding writers must be serialized into later waves instead of moved to separate worktrees.
      reviewer_prompt:
        - Block changes that work only for the touched diff but leave task catalog, starter tools, mirrors, docs, tests, or runtime validation stale.
        - Verify all workflow families and task ids still bootstrap with usable prompt, packet, role, and validation metadata.
    spawn_budget:
      active_subagents: 12
      max_write_subagents: 4
    role_topology: *standard_role_topology
    roles:
      always_on:
        - manager
        - manager_reviewer
        - designer
        - design_reviewer
        - document_flow_reviewer
        - implementer
        - change_reviewer
        - final_reviewer
        - verifier
        - auditor
      specialists:
        - scheduler
        - schedule_reviewer
        - researcher
        - research_reviewer
        - infra_steward
        - infra_reviewer
        - project_reviewer
        - docs_workflow_steward
        - prompt_config_reviewer
        - test_designer
        - python_reviewer
        - cpp_reviewer
        - report_reviewer
    tasks:
      - T11
      - T12

  - id: adaptive_improvement_loop
    name: Adaptive Improvement Loop
    subagent_prompt:
      purpose: Prompt packet for backlog-driven tuning, exploration, and repeated experiment-backed improvement.
      prompt_preamble:
        - Treat this template repository as the default implementation starting point; each improvement pass must still be a traceable waterfall slice.
        - Start from the run bundle, backlog or decision-state artifact, user_request_contract.md, schedule.md, and team_manifest.yaml.
        - State backlog item, hypothesis, run protocol, success metric, stopping rule, and next decision gate in every handoff.
      workflow_focus:
        - Follow `.codex/agents/*.toml` model and reasoning settings: keep repo inventory, tool drift survey, machine-report summarization, and execution-only log work on mini helper roles; route review, quality-check, static validation triage, diff-local language review, bounded review, report traceability, and checklist gates to frontier review roles; route Abstract Design Frame-derived eligible bounded implementation slices to `spark_worker`; use frontier roles for review/quality gates, synthesis, design judgment, conflict resolution, and final approval.
        - Treat a bounded implementation slice as Spark-eligible only when it is derived from the Abstract Design Frame and design trace, one file or one abstraction unit, public interface unchanged, no dependency change, no specification interpretation, and locally testable.
        - Keep the adaptive outer loop separate from one implementation slice; one iteration is not whole-loop completion.
        - Do not mix code change, experiment protocol change, runtime flag change, and claim/report rewrite in one iteration without an explicit clause.
        - Promote only validated lessons into notes or memory; keep failed attempts traceable.
      reviewer_prompt:
        - Block progress claims from spot runs, partial runs, raw failure counts, or unreviewed protocol changes.
        - Verify the backlog, decision state, reproducibility evidence, and carry-over notes are current.
    spawn_budget:
      active_subagents: 12
      max_write_subagents: 3
    role_topology: *standard_role_topology
    roles:
      always_on:
        - manager
        - manager_reviewer
        - designer
        - design_reviewer
        - document_flow_reviewer
        - implementer
        - change_reviewer
        - final_reviewer
        - verifier
        - auditor
      specialists:
        - researcher
        - research_reviewer
        - scheduler
        - schedule_reviewer
        - experimenter
        - experiment_reviewer
        - report_reviewer
        - test_designer
        - python_reviewer
        - cpp_reviewer
        - reproducibility_reviewer
        - scientific_computing_reviewer
        - benchmark_reviewer
        - artifact_reviewer
        - fair_data_reviewer
        - ml_science_reviewer
    tasks:
      - T13

tasks:
  - id: T1
    name: local bug fix
    family: owner_bounded_change
    specialists:
      - test_designer
      - python_reviewer
  - id: T2
    name: CI or flaky test fix
    family: owner_bounded_change
    specialists:
      - test_designer
      - python_reviewer
  - id: T3
    name: docs and test sync
    family: scoped_change
    specialists:
      - scheduler
      - schedule_reviewer
      - docs_workflow_steward
      - test_designer
      - python_reviewer
  - id: T4
    name: research-backed implementation change
    family: research_driven_change
    specialists:
      - researcher
      - research_reviewer
      - scheduler
      - schedule_reviewer
      - experimenter
      - experiment_reviewer
      - report_reviewer
      - test_designer
      - python_reviewer
  - id: T5
    name: benchmark or experiment-driven optimization
    family: research_driven_change
    specialists:
      - researcher
      - research_reviewer
      - scheduler
      - schedule_reviewer
      - experimenter
      - experiment_reviewer
      - report_reviewer
      - test_designer
      - python_reviewer
  - id: T6
    name: large refactor
    family: large_delivery
    specialists:
      - scheduler
      - schedule_reviewer
      - test_designer
      - project_reviewer
      - docs_workflow_steward
      - python_reviewer
  - id: T7
    name: new feature or API delivery
    family: large_delivery
    specialists:
      - scheduler
      - schedule_reviewer
      - test_designer
      - python_reviewer
  - id: T8
    name: environment, CI, Docker, or dependency update
    family: platform_and_environment
    specialists:
      - infra_steward
      - infra_reviewer
      - scheduler
      - schedule_reviewer
      - docs_workflow_steward
      - test_designer
      - python_reviewer
  - id: T9
    name: research workflow, artifact policy, or reporting policy change
    family: research_driven_change
    specialists:
      - scheduler
      - schedule_reviewer
      - researcher
      - research_reviewer
      - experimenter
      - experiment_reviewer
      - report_reviewer
      - reproducibility_reviewer
      - artifact_reviewer
  - id: T10
    name: academic paper, thesis chapter, or scholarly note
    family: research_driven_change
    specialists:
      - scheduler
      - schedule_reviewer
      - researcher
      - research_reviewer
      - report_reviewer
      - citation_evidence_reviewer
      - notation_definition_reviewer
      - logic_gap_reviewer
  - id: T11
    name: repo-wide integrated delivery across code docs tools and runtime
    family: comprehensive_development
    specialists:
      - scheduler
      - schedule_reviewer
      - project_reviewer
      - docs_workflow_steward
      - prompt_config_reviewer
      - test_designer
      - python_reviewer
      - infra_steward
      - infra_reviewer
  - id: T12
    name: agent workflow tooling, AgentCanon submodule flow, or canon rearchitecture
    family: comprehensive_development
    specialists:
      - scheduler
      - schedule_reviewer
      - project_reviewer
      - docs_workflow_steward
      - prompt_config_reviewer
      - test_designer
      - python_reviewer
      - researcher
      - research_reviewer
      - infra_steward
      - infra_reviewer
  - id: T13
    name: adaptive tuning exploration and experiment-driven improvement loop
    family: adaptive_improvement_loop
    specialists:
      - researcher
      - research_reviewer
      - scheduler
      - schedule_reviewer
      - experimenter
      - experiment_reviewer
      - report_reviewer
      - test_designer
      - python_reviewer
      - reproducibility_reviewer
      - artifact_reviewer

review_packs:
  - id: research_perspective_review
    name: Research Perspective Review
    specialists:
      - reproducibility_reviewer
      - scientific_computing_reviewer
      - benchmark_reviewer
      - artifact_reviewer
      - fair_data_reviewer
      - ml_science_reviewer
    default_for_tasks: []
    optional_for_tasks:
      - T4
      - T5
      - T9
      - T13
    when: full research perspective review is explicitly requested, or triage shows methodology, benchmark, FAIR-data, ML-science, or scientific-computing risk
  - id: research_perspective_triage
    name: Research Perspective Triage
    specialists:
      - reproducibility_reviewer
      - artifact_reviewer
    default_for_tasks:
      - T4
      - T5
      - T9
      - T13
    when: experiment logs, runtime artifacts, or reporting evidence need a minimum reproducibility and artifact-readiness check before selecting extra perspective reviewers
  - id: academic_writing_review
    name: Academic Writing Review
    specialists:
      - citation_evidence_reviewer
      - notation_definition_reviewer
      - logic_gap_reviewer
    default_for_tasks:
      - T10
    optional_for_tasks:
      - T4
      - T5
      - T9
    when: paper-like writing, thesis prose, symbol-dense text, or claim-heavy academic exposition needs separate citation/evidence, notation, and logic review
  - id: repo_integration_review
    name: Repo Integration Review
    specialists:
      - project_reviewer
      - docs_workflow_steward
      - python_reviewer
    default_for_tasks:
      - T11
      - T12
    optional_for_tasks:
      - T3
      - T6
      - T7
      - T8
    when: repo-wide delivery needs integration review across code, docs, workflow, and runtime surfaces
